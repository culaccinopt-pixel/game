<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <title>Gestor Master - Diário & Tarefas</title>
    <style>
        :root { 
            --primary: #1e293b; --accent: #6366f1; --bg: #0f172a; 
            --white: #ffffff; --border: #334155; --card-bg: #1e293b;
            --danger: #ef4444; --success: #22c55e; --warning: #f59e0b;
        }
        
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--white); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: var(--primary); padding: 10px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .btn-home { background: #334155; color: white; text-decoration: none; padding: 8px 15px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; }

        .diary-container {
            max-width: 800px; margin: 20px auto; width: 95%; flex: 1;
            display: flex; flex-direction: column; overflow: hidden;
            background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* NAVEGAÇÃO POR TABS */
        .tabs-main { display: flex; background: #161e2e; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: transparent; color: #94a3b8; cursor: pointer; font-weight: bold; font-size: 0.8rem; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(99, 102, 241, 0.05); }

        .content-section { display: none; flex: 1; flex-direction: column; padding: 20px; overflow-y: auto; }
        .content-section.active { display: flex; }

        /* --- DESIGN DAS TAREFAS --- */
        .task-card { 
            display: flex; flex-direction: column; background: #1e293b; 
            border: 1px solid var(--border); border-radius: 10px; margin-bottom: 20px; padding: 15px;
        }
        .task-card.doing { border-color: var(--warning); border-left: 4px solid var(--warning); background: #2d2010; }

        .task-header { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .task-order { color: var(--accent); font-weight: 900; font-size: 0.85rem; }
        .task-title { font-weight: bold; font-size: 1.1rem; color: var(--white); flex: 1; }
        .task-separator { height: 1px; background: rgba(255,255,255,0.1); width: 100%; margin: 8px 0; }

        .task-time-display h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: var(--white); opacity: 0.7; font-weight: bold; }

        /* Zona visível aumentada para 150px */
        .task-desc-wrapper { max-height: 150px; overflow: hidden; position: relative; transition: max-height 0.3s ease; }
        .task-desc-wrapper.expanded { max-height: 5000px; }
        .task-desc { font-size: 0.9rem; color: var(--white); opacity: 0.9; line-height: 1.5; text-align: justify; white-space: pre-wrap; word-break: break-word; }
        .task-desc h3 { display: none; } 

    .task-footer { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin-top: 15px; 
    padding-top: 12px; 
    border-top: 1px solid rgba(255,255,255,0.05); 
}

        .footer-left, .footer-right { display: flex; gap: 15px; align-items: center; }

        .footer-link { font-size: 0.75rem; font-weight: bold; color: var(--accent); cursor: pointer; text-decoration: none; display: none; }
        .footer-link:hover { text-decoration: underline; }

        .action-btn {
            background: none; border: none; font-size: 0.8rem; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; gap: 5px; padding: 5px 8px; border-radius: 4px;
        }
        .btn-doing { color: var(--warning); }
        .btn-done { color: var(--success); }

        /* --- EDITOR / ABA ESCREVER --- */
        .toolbar { display: flex; gap: 8px; padding: 10px; background: #0f172a; border: 1px solid var(--border); border-radius: 8px 8px 0 0; flex-wrap: wrap; }
        .toolbar button { background: #1e293b; border: 1px solid var(--border); color: white; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .toolbar button.active { background: var(--accent); border-color: var(--accent); font-weight: bold; }

        #editor { flex: 1; min-height: 200px; background: #0f172a; border: 1px solid var(--border); border-top: none; padding: 20px; border-radius: 0 0 8px 8px; outline: none; line-height: 1.6; overflow-y: auto; }
        .btn-save { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }

        /* --- FEED --- */
        .sub-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .sub-btn { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 0.8rem; }
        .sub-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .diary-card { background: #0f172a; border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .badge-container { display: flex; gap: 6px; margin-bottom: 10px; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .badge-author { background: #334155; color: #cbd5e1; }
        .badge-feito { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid var(--success); }
        .badge-ideia { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid var(--warning); }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 600px; max-height: 80vh; border-radius: 15px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; }
  
  /* Efeito de seleção ao passar o rato nos botões de ação */
.action-btn {
    transition: all 0.2s ease; /* Suaviza a transição */
    border: 1px solid transparent;
}

.action-btn.btn-doing:hover {
    background: rgba(245, 158, 11, 0.15); /* Fundo suave cor de aviso */
    border-color: var(--warning);         /* Borda realçada */
    color: #ffb833;                       /* Texto mais brilhante */
}

.action-btn.btn-done:hover {
    background: rgba(34, 197, 94, 0.15);  /* Fundo suave cor de sucesso */
    border-color: var(--success);         /* Borda realçada */
    color: #4ade80;                       /* Texto mais brilhante */
}

/* Estilização do Timestamp (Data) */
.task-time-display h3 { 
    margin: 0; 
    padding-bottom: 4px; /* Espaço entre o texto e a linha */
    font-size: 0.9rem; 
    color: #fef08a; /* Amarelo claro (Tailwind yellow-200) */
    font-weight: bold;
    font-style: italic; /* Itálico solicitado */
    border-bottom: 1px solid rgba(254, 240, 138, 0.3); /* Linha amarela clara subtil */
    display: block;
    width: 100%;
    margin-bottom: 8px; /* Espaço reduzido para o texto de baixo se aproximar */
}

/* Garante que a descrição não tenha margens extras no topo */
.task-desc { 
    font-size: 0.9rem; 
    color: var(--white); 
    opacity: 0.9; 
    line-height: 1.5; 
    text-align: justify; 
    white-space: pre-wrap; 
    word-break: break-word;
    margin-top: 0 !important; /* Força a aproximação do separador */
}

/* Remove estilos padrão que o Firebase possa trazer no h3 */
.task-time-display h3 b, .task-time-display h3 {
    all: inherit;
    display: block;
    border-bottom: 1px solid rgba(254, 240, 138, 0.3);
    padding-bottom: 4px;
    margin-bottom: 8px;
    color: #fef08a;
    font-weight: bold;
    font-style: italic;
}

/* Estilo solicitado para o Timestamp */
.task-time-display h3 { 
    margin: 0 !important;
    padding-bottom: 5px;
    font-size: 0.95rem;
    color: #fef08a !important; /* Amarelo Claro */
    font-weight: bold !important;
    font-style: italic !important;
    border-bottom: 1px solid rgba(254, 240, 138, 0.4); /* Linha separadora */
    margin-bottom: 10px !important; /* Espaço para o texto seguinte */
}

/* Garante que o texto se aproxime do separador */
.task-desc { 
    margin-top: 0 !important;
    padding-top: 0 !important;
}
  
/* Estilo para o Timestamp (Topo e dentro do texto) */
.task-time-display h3, 
.task-desc h3 { 
    margin: 0 !important;
    padding-bottom: 5px;
    font-size: 0.95rem;
    color: #7dd3fc !important; /* Azul Claro (Sky 300) */
    font-weight: bold !important;
    font-style: italic !important;
    border-bottom: 1px solid rgba(125, 211, 252, 0.3); /* Linha azul clara */
    display: block;
    width: 100%;
}

/* Espaçamento específico para o do topo */
.task-time-display h3 { margin-bottom: 10px !important; }

/* Espaçamento para timestamps que apareçam no meio do texto */
.task-desc h3 { 
    margin-top: 15px !important; 
    margin-bottom: 8px !important; 
}

/* Garante que o texto se aproxime do separador */
.task-desc { margin-top: 0 !important; padding-top: 0 !important; }

.tab-btn, .sub-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.tab-btn i, .sub-btn i {
    font-size: 0.9rem; /* Tamanho do ícone */
}

/* Estilo para links de referência dentro do texto */
.ref-inline-link {
    color: var(--accent);
    text-decoration: underline;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s;
}
.ref-inline-link:hover {
    opacity: 0.8;
}


.footer-left { flex: 1; display: flex; justify-content: flex-start; }
.footer-center { flex: 2; display: flex; justify-content: center; gap: 15px; } /* Centraliza e dá espaço entre os dois */
.footer-right { flex: 1; display: flex; justify-content: flex-end; gap: 10px; }

/* Melhoria visual nos links de anexo para parecerem mini-botões */
.footer-link { 
    font-size: 0.75rem; 
    font-weight: bold; 
    padding: 4px 8px;
    background: rgba(255,255,255,0.03);
    border-radius: 5px;
    transition: 0.2s;
}
.footer-link:hover { 
    background: rgba(255,255,255,0.08); 
    text-decoration: none; 
}

  </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-home">🏠 Home</a>
        <span style="font-weight: bold; color: var(--accent);">GESTOR MASTER</span>
    </header>

    <div class="diary-container">
       <div class="tabs-main">
    <button id="tab-tarefas" class="tab-btn active" onclick="switchTab('tarefas')">
        <i class="fa-solid fa-list-check" style="color: white; margin-right: 5px;"></i> TAREFAS
    </button>
    <button id="tab-escrever" class="tab-btn" onclick="switchTab('escrever')">
        <i class="fa-solid fa-pen-fancy" style="color: white; margin-right: 5px;"></i> ESCREVER
    </button>
    <button id="tab-feed" class="tab-btn" onclick="switchTab('feed')">
        <i class="fa-solid fa-book-open" style="color: white; margin-right: 5px;"></i> FEED
    </button>
</div>

        <!-- ABA TAREFAS -->
        <div id="sec-tarefas" class="content-section active">
            <div id="tarefas-lista"></div>
        </div>

        <!-- ABA ESCREVER -->
        <div id="sec-escrever" class="content-section">
            <div class="toolbar">
                <button onclick="format('bold')">B</button>
                <button onclick="format('italic')">I</button>
                <button onclick="format('insertUnorderedList')">• Lista</button>
                <button id="btn-feito" style="color:var(--success)" onclick="setStatus('feito')">✓ Feito</button>
                <button id="btn-ideia" style="color:var(--warning)" onclick="setStatus('ideia')">💡 Ideia</button>
            </div>
            <div id="editor" contenteditable="true"></div>
            <button class="btn-save" onclick="saveDiary()">Gravar no Diário</button>
        </div>

        <!-- ABA FEED -->
        <div id="sec-feed" class="content-section">
         <div class="sub-tabs">
    <button class="sub-btn active" id="sub-meus" onclick="loadFeed('meus')">
        <i class="fa-solid fa-user-check" style="color: white; margin-right: 5px;"></i> Meus Relatos
    </button>
    <button class="sub-btn" id="sub-outros" onclick="loadFeed('outros')">
        <i class="fa-solid fa-users" style="color: white; margin-right: 5px;"></i> Outros
    </button>
</div>
            <div id="feed-lista"></div>
        </div>
    </div>

    <!-- MODAL DE ANEXOS -->
    <div id="anexosModal" class="modal">
        <div class="modal-content">
            <div style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                <b>📎 Anexos</b>
                <button onclick="closeAnexos()" style="background:var(--danger); border:none; color:white; padding:5px 10px; border-radius:4px; cursor:pointer;">Fechar</button>
            </div>
            <div id="anexos-body" style="padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:15px;"></div>
        </div>
    </div>

    <!-- MODAL DE REFERÊNCIAS -->
    <div id="refsModal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <div style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                <b>📚 Referências (World)</b>
                <button onclick="closeRefs()" style="background:var(--danger); border:none; color:white; padding:5px 10px; border-radius:4px; cursor:pointer;">Fechar</button>
            </div>
            <div id="refs-body" style="padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;"></div>
        </div>
    </div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, serverTimestamp, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDPLJ4Ln3Ton-DxsJ0tEKeioWHnV01Plo0",
            authDomain: "politicalgame-30215.firebaseapp.com",
            projectId: "politicalgame-30215",
            storageBucket: "politicalgame-30215.firebasestorage.app",
            messagingSenderId: "736655823319",
            appId: "1:736655823319:web:60ebdc530e101784b9bb92"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let userData = null;
        let activeTasks = {};
        let selectedStatus = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) { 
                currentUser = user; 
                const uSnap = await getDoc(doc(db, "users", user.uid));
                if(uSnap.exists()) userData = uSnap.data();
                loadTasks(); 
            } else { window.location.href = "login.html"; }
        });

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-btn, .content-section').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`sec-${tab}`).classList.add('active');
            if(tab === 'tarefas') loadTasks();
            if(tab === 'feed') loadFeed('meus');
        };

        // --- TAREFAS ---
    window.loadTasks = async () => {
            const container = document.getElementById('tarefas-lista');
            container.innerHTML = "<p style='text-align:center; opacity:0.5'>A carregar tarefas...</p>";
            
            const q = query(collection(db, "tarefas"), where("para", "==", currentUser.uid), orderBy("ordem", "asc"));
            const snap = await getDocs(q);
            container.innerHTML = "";
            
            activeTasks = {};
            snap.forEach(d => {
                const t = d.data();
                if(t.estado === 'feito') return;
                activeTasks[d.id] = t;

                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = t.descricao;

                const firstH3 = tempDiv.querySelector('h3');
                const timeHtml = firstH3 ? firstH3.outerHTML : "";

                let cleanDesc = t.descricao.replace(/<h3.*?>.*?<\/h3>/i, ''); 
                cleanDesc = cleanDesc.replace(/<b>\s*<\/b>/gi, '').trim();

                // --- LÓGICA DE REFERÊNCIAS INLINE ---
                if (t.referencias && t.referencias.length > 0) {
                    t.referencias.forEach((ref, index) => {
                        const numRef = index + 1;
                        const placeholder = `[Referência ${numRef}]`;
                        
                        // Criamos o HTML do link (abre em nova aba para não perder a tarefa)
                        const linkUrl = `worldedit.html?pageId=${ref.id}`;
                        const linkHtml = `<a href="${linkUrl}" target="_blank" class="ref-inline-link" title="Abrir: ${ref.titulo}">${placeholder}</a>`;
                        
                        // Substituímos todas as ocorrências deste placeholder específico
                        // Usamos split/join para substituir todas as instâncias sem regex complexa
                        cleanDesc = cleanDesc.split(placeholder).join(linkHtml);
                    });
                }

                const card = document.createElement('div');
                card.className = `task-card ${t.estado === 'a-fazer' ? 'doing' : ''}`;
                
                card.innerHTML = `
                    <div class="task-header">
                        <span class="task-order">#${t.ordem}</span>
                        <div class="task-title">${t.nome}</div>
                    </div>
                    
                    <div class="task-separator"></div>
                    
                    <div class="task-time-display">${timeHtml}</div>

                    <div id="wrap-${d.id}" class="task-desc-wrapper">
                        <div id="text-${d.id}" class="task-desc">${cleanDesc}</div>
                    </div>

                    <div class="task-footer">
                        <div class="footer-left">
                            <span id="btn-more-${d.id}" class="footer-link" onclick="toggleText('${d.id}')">Ver mais</span>
                            ${t.links && t.links.length > 0 ? `<span class="footer-link" style="display:block" onclick="openAnexos('${d.id}')">Anexos (${t.links.length})</span>` : ''}
                            ${t.referencias && t.referencias.length > 0 ? `<span class="footer-link" style="display:block; color:var(--accent)" onclick="openRefs('${d.id}')">📚 Referências (${t.referencias.length})</span>` : ''}
                        </div>
                        <div class="footer-right">
                            <button class="action-btn btn-doing" onclick="updateTaskState('${d.id}', 'a-fazer')">🚧 A fazer</button>
                            <button class="action-btn btn-done" onclick="completeTask('${d.id}')">✅ Concluído</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);

                setTimeout(() => {
                    const textEl = document.getElementById(`text-${d.id}`);
                    const btnEl = document.getElementById(`btn-more-${d.id}`);
                    if (textEl && textEl.scrollHeight > 150) { btnEl.style.display = "block"; }
                }, 100);
            });
        };

        window.toggleText = (id) => {
            const wrap = document.getElementById(`wrap-${id}`);
            const btn = document.getElementById(`btn-more-${id}`);
            const isExpanded = wrap.classList.toggle('expanded');
            btn.innerText = isExpanded ? "Ver menos" : "Ver mais";
        };

     window.updateTaskState = async (id, state) => {
    // Busca o estado atual no objeto activeTasks que já temos na memória
    const currentState = activeTasks[id].estado;
    
    // Se clicar em 'a-fazer' e já estiver 'a-fazer', muda para 'não-feito'
    // Caso contrário, aplica o novo estado (state)
    const newState = (state === 'a-fazer' && currentState === 'a-fazer') ? 'não-feito' : state;

    await updateDoc(doc(db, "tarefas", id), { estado: newState });
    loadTasks();
};

     window.completeTask = async (id) => {
    const task = activeTasks[id];
    await updateDoc(doc(db, "tarefas", id), { 
        estado: 'feito',
        concluido_por: currentUser.uid, // Guarda o ID de quem fez
        concluido_em: serverTimestamp()  // Guarda a data para o Feed
    });
    loadTasks();
};

        // --- DIÁRIO / ESCREVER ---
        window.format = (cmd) => document.execCommand(cmd, false, null);
        
        window.setStatus = (s) => {
            selectedStatus = (selectedStatus === s) ? null : s;
            document.getElementById('btn-feito').classList.toggle('active', selectedStatus === 'feito');
            document.getElementById('btn-ideia').classList.toggle('active', selectedStatus === 'ideia');
        };

        window.saveDiary = async () => {
            const content = document.getElementById('editor').innerHTML;
            if(!content || content === "<br>") return;
            await addDoc(collection(db, "diario"), {
                userId: currentUser.uid, userName: userData?.nome || "Utilizador",
                contentHtml: content, status: selectedStatus, createdAt: serverTimestamp()
            });
            document.getElementById('editor').innerHTML = "";
            selectedStatus = null;
            document.getElementById('btn-feito').classList.remove('active');
            document.getElementById('btn-ideia').classList.remove('active');
            switchTab('feed');
        };

        // --- FEED ---
     window.loadFeed = async (type) => {
    document.querySelectorAll('.sub-btn').forEach(b => b.classList.toggle('active', b.id === `sub-${type}`));
    const container = document.getElementById('feed-lista');
    container.innerHTML = "<p style='text-align:center; opacity:0.5'>A carregar relatos e tarefas...</p>";
    
    let combinedFeed = [];

    // 1. Puxar Anotações da coleção "diario"
    const qDiario = query(collection(db, "diario"), orderBy("createdAt", "desc"));
    const snapDiario = await getDocs(qDiario);
    snapDiario.forEach(d => {
        const data = d.data();
        if(type === 'meus' && data.userId !== currentUser.uid) return;
        if(type === 'outros' && data.userId === currentUser.uid) return;
        
        combinedFeed.push({
            ...data,
            tipo: 'anotacao',
            timestamp: data.createdAt?.toDate() || new Date()
        });
    });

    // 2. Puxar Tarefas Concluídas da coleção "tarefas"
    const qTarefas = query(collection(db, "tarefas"), where("estado", "==", "feito"), orderBy("concluido_em", "desc"));
    const snapTarefas = await getDocs(qTarefas);
    snapTarefas.forEach(d => {
        const data = d.data();
        if(type === 'meus' && data.concluido_por !== currentUser.uid) return;
        if(type === 'outros' && data.concluido_por === currentUser.uid) return;

        combinedFeed.push({
            userName: type === 'meus' ? (userData?.nome || "Eu") : "Outro Usuário",
            contentHtml: `<b>✅ Tarefa Concluída:</b> ${data.nome}<br><small>${data.descricao}</small>`,
            status: 'feito',
            tipo: 'tarefa',
            timestamp: data.concluido_em?.toDate() || new Date()
        });
    });

    // 3. Ordenar tudo por data (mais recente primeiro)
    combinedFeed.sort((a, b) => b.timestamp - a.timestamp);

    // 4. Renderizar no HTML
    container.innerHTML = combinedFeed.length ? "" : "<p style='text-align:center; opacity:0.5'>Nada para mostrar.</p>";
    combinedFeed.forEach(post => {
        const card = document.createElement('div');
        card.className = 'diary-card';
        card.innerHTML = `
            <div class="badge-container">
                <span class="badge badge-author">${post.userName}</span>
                ${post.status ? `<span class="badge badge-${post.status}">${post.status}</span>` : ''}
            </div>
            <div style="font-size:0.9rem">${post.contentHtml}</div>
            <div style="font-size:0.7rem; opacity:0.4; margin-top:10px; text-align:right;">
                ${post.timestamp.toLocaleDateString()} ${post.timestamp.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
            </div>
        `;
        container.appendChild(card);
    });
};


// --- CONTROLE DE REFERÊNCIAS ---
        window.openRefs = (id) => {
            const task = activeTasks[id];
            const body = document.getElementById('refs-body');
            body.innerHTML = "";
            
            task.referencias.forEach(ref => {
                // Criamos um item clicável que pode levar à página do world ou apenas listar
                const item = document.createElement('div');
                item.className = 'diary-card';
                item.style.margin = "0";
                item.style.cursor = "pointer";
                item.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:bold; font-size:0.9rem;">📄 ${ref.titulo}</span>
                        <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:0.7rem; opacity:0.5"></i>
                    </div>
                `;
                // Se quiser que ao clicar ele vá para o gestor do world:
                item.onclick = () => window.open('worldedit.html?pageId=' + ref.id, '_blank');

                body.appendChild(item);
            });
            
            document.getElementById('refsModal').style.display = 'flex';
        };

        window.closeRefs = () => document.getElementById('refsModal').style.display = 'none';


        // ANEXOS
        window.openAnexos = (id) => {
            const task = activeTasks[id];
            const body = document.getElementById('anexos-body');
            body.innerHTML = "";
            task.links.forEach(url => {
                if (url.match(/\.(jpeg|jpg|gif|png|webp)$/i)) body.innerHTML += `<img src="${url}" style="width:100%; border-radius:8px">`;
                else if (url.includes("youtube.com") || url.includes("youtu.be")) {
                    const vid = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
                    body.innerHTML += `<iframe style="width:100%; aspect-ratio:16/9; border:none; border-radius:8px" src="https://www.youtube.com/embed/${vid}" allowfullscreen></iframe>`;
                } else body.innerHTML += `<a href="${url}" target="_blank" style="display:block; background:#0f172a; padding:15px; border-radius:8px; color:white; text-decoration:none; border:1px solid var(--accent)">🌐 Link: ${url}</a>`;
            });
            document.getElementById('anexosModal').style.display = 'flex';
        };
        window.closeAnexos = () => document.getElementById('anexosModal').style.display = 'none';
    </script>
</body>
