<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor do Manual - Admin</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --bg: #f1f5f9;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background: var(--bg);
        }

        /* Sidebar na Direita */
        .sidebar {
            width: 320px;
            background: var(--white);
            border-left: 2px solid var(--border);
            order: 2;
            overflow-y: auto;
            padding: 20px;
        }

        .main-content {
            flex: 1;
            order: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Árvore de Categorias */
        .tree-node { margin-left: 15px; border-left: 1px dashed #cbd5e1; padding-left: 10px; }
        .tree-label { 
            padding: 5px 8px; cursor: pointer; border-radius: 4px; 
            font-size: 0.9rem; transition: 0.2s; display: block;
        }
        .tree-label:hover { background: #eff6ff; color: var(--accent); }
        .tree-label.active { background: var(--accent); color: white; font-weight: bold; }
        .category-badge { font-size: 0.7rem; opacity: 0.6; text-transform: uppercase; margin-left: 5px; }

        /* Estilo dos "Posts" Existentes */
        .post-card {
            background: white;
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            position: relative;
        }
        .post-date { font-size: 0.75rem; color: #64748b; margin-bottom: 8px; }
        .post-actions { position: absolute; top: 10px; right: 10px; }
        
        /* Formulário de Novo Post */
        .new-post-box {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid var(--accent);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        /* Toolbar Editor */
        .toolbar { display: flex; gap: 5px; margin-bottom: 5px; }
        .toolbar button { cursor: pointer; padding: 5px 10px; border: 1px solid var(--border); background: white; border-radius: 4px; }
        #editor { 
            min-height: 120px; border: 1px solid var(--border); 
            padding: 10px; border-radius: 6px; background: #fff;
        }

        .btn-save {
            background: var(--accent); color: white; border: none;
            padding: 10px 20px; border-radius: 6px; font-weight: bold;
            cursor: pointer; margin-top: 10px; width: 100%;
        }

        .hidden { display: none; }
        h2, h3 { margin-top: 0; }
    </style>
</head>
<body>

    <div class="main-content">
        <div id="editor-header">
            <h2 id="current-category-name">Selecione uma categoria ao lado</h2>
            <p id="category-path" style="color: #64748b; font-size: 0.9rem;"></p>
        </div>

        <!-- Área para adicionar novo post -->
        <div id="add-post-area" class="hidden">
            <div class="new-post-box">
                <h3>Nova Atualização / Post</h3>
                <div class="toolbar">
                    <button onclick="formatDoc('bold')"><b>B</b></button>
                    <button onclick="formatDoc('italic')"><i>I</i></button>
                    <button onclick="formatDoc('formatBlock', 'h3')">Título</button>
                </div>
                <div id="editor" contenteditable="true" placeholder="Escreva a nova atualização aqui..."></div>
                <button class="btn-save" id="btnSalvar">Adicionar ao Manual</button>
            </div>
        </div>

        <hr>

        <div id="posts-history">
            <h3>Histórico de Conteúdo</h3>
            <div id="posts-list">
                <!-- Posts antigos aparecerão aqui -->
            </div>
        </div>
    </div>

    <aside class="sidebar">
        <h3>Estrutura de Dados</h3>
        <div id="tree-container">Carregando...</div>
    </aside>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPLJ4Ln3Ton-DxsJ0tEKeioWHnV01Plo0",
            authDomain: "politicalgame-30215.firebaseapp.com",
            projectId: "politicalgame-30215",
            storageBucket: "politicalgame-30215.firebasestorage.app",
            messagingSenderId: "736655823319",
            appId: "1:736655823319:web:60ebdc530e101784b9bb92"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allDocs = [];
        let selectedCategoryData = null;

        async function loadData() {
            const snap = await getDocs(query(collection(db, "docs"), orderBy("createdAt", "asc")));
            allDocs = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderTree();
        }

        function renderTree() {
            const container = document.getElementById('tree-container');
            container.innerHTML = '';

            // Pegar nomes únicos de tópicos para não repetir na árvore
            const uniqueTopics = [...new Set(allDocs.map(d => d.nome))];
            
            // Organizar por hierarquia
            const pais = allDocs.filter(d => d.categoria === 'pai');
            
            pais.forEach(p => {
                const div = document.createElement('div');
                div.className = 'tree-node';
                div.innerHTML = `<span class="tree-label" onclick="selectTopic('${p.nome}')">${p.nome} <span class="category-badge">Pai</span></span>`;
                
                // Filhos deste pai
                const filhos = allDocs.filter(d => d.categoria === 'filho' && d.categoriaPai === p.nome);
                const uniqueFilhos = [...new Set(filhos.map(f => f.nome))];
                
                uniqueFilhos.forEach(fName => {
                    const fDiv = document.createElement('div');
                    fDiv.className = 'tree-node';
                    fDiv.innerHTML = `<span class="tree-label" onclick="selectTopic('${fName}')">${fName} <span class="category-badge">Filho</span></span>`;
                    
                    // Netos deste filho
                    const netos = allDocs.filter(d => d.categoria === 'neto' && d.categoriaFilho === fName);
                    const uniqueNetos = [...new Set(netos.map(n => n.nome))];
                    
                    uniqueNetos.forEach(nName => {
                        const nDiv = document.createElement('div');
                        nDiv.className = 'tree-node';
                        nDiv.innerHTML = `<span class="tree-label" onclick="selectTopic('${nName}')">${nName} <span class="category-badge">Neto</span></span>`;
                        
                        // Bisnetos deste neto
                        const bis = allDocs.filter(d => d.categoria === 'bisneto' && d.categoriaNeto === nName);
                        const uniqueBis = [...new Set(bis.map(b => b.nome))];
                        uniqueBis.forEach(bName => {
                            const bDiv = document.createElement('div');
                            bDiv.className = 'tree-node';
                            bDiv.innerHTML = `<span class="tree-label" onclick="selectTopic('${bName}')">${bName} <span class="category-badge">Bis</span></span>`;
                            nDiv.appendChild(bDiv);
                        });
                        fDiv.appendChild(nDiv);
                    });
                    div.appendChild(fDiv);
                });
                container.appendChild(div);
            });
        }

        window.selectTopic = (nome) => {
            const posts = allDocs.filter(d => d.nome === nome);
            selectedCategoryData = posts[0]; // Referência para saber a hierarquia

            document.getElementById('current-category-name').innerText = nome;
            document.getElementById('add-post-area').classList.remove('hidden');
            
            const list = document.getElementById('posts-list');
            list.innerHTML = '';

            // Listar posts (Antigos em cima)
            posts.forEach(post => {
                const date = post.createdAt?.toDate ? post.createdAt.toDate().toLocaleString() : 'Recentemente';
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-date">Postado em: ${date}</div>
                    <div>${post.textoHtml}</div>
                `;
                list.appendChild(card);
            });
        };

        window.formatDoc = (cmd, val = null) => document.execCommand(cmd, false, val);

        document.getElementById('btnSalvar').addEventListener('click', async () => {
            if(!selectedCategoryData) return;
            
            const btn = document.getElementById('btnSalvar');
            const editor = document.getElementById('editor');
            
            const novoPost = {
                nome: selectedCategoryData.nome,
                categoria: selectedCategoryData.categoria,
                categoriaPai: selectedCategoryData.categoriaPai || null,
                categoriaFilho: selectedCategoryData.categoriaFilho || null,
                categoriaNeto: selectedCategoryData.categoriaNeto || null,
                tags: selectedCategoryData.tags || "",
                ordem: selectedCategoryData.ordem || "0",
                textoHtml: editor.innerHTML,
                createdAt: serverTimestamp()
            };

            btn.disabled = true;
            try {
                await addDoc(collection(db, "docs"), novoPost);
                editor.innerHTML = '';
                await loadData();
                selectTopic(selectedCategoryData.nome);
            } catch (e) {
                alert("Erro ao salvar");
            } finally {
                btn.disabled = false;
            }
        });

        loadData();
    </script>
</body>
</html>
