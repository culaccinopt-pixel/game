<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor do Manual</title>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --bg: #f1f5f9; --white: #ffffff; --border: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); }
        .sidebar { width: 320px; background: var(--white); border-left: 2px solid var(--border); order: 2; overflow-y: auto; padding: 20px; }
        .main-content { flex: 1; order: 1; overflow-y: auto; padding: 30px; }
        .sidebar-header { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .btn-view { text-decoration: none; background: #64748b; color: white; padding: 8px; border-radius: 6px; text-align: center; font-size: 0.9rem; }
        .btn-add { text-decoration: none; background: #22c55e; color: white; padding: 8px; border-radius: 6px; text-align: center; font-size: 0.9rem; }
        .tree-node { margin-left: 15px; border-left: 1px dashed #cbd5e1; padding-left: 10px; }
        .tree-label { padding: 5px; cursor: pointer; font-size: 0.9rem; display: block; border-radius: 4px; }
        .tree-label:hover { background: #eff6ff; color: var(--accent); }
        .post-card { background: white; border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .post-date { font-size: 0.7rem; color: #94a3b8; }
        .editor-box { background: #fff; padding: 20px; border: 2px solid var(--accent); border-radius: 8px; margin-bottom: 30px; }
        #editor { min-height: 100px; border: 1px solid #ddd; padding: 10px; margin: 10px 0; border-radius: 4px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="main-content">
        <div id="content-header"><h2>Selecione um tópico na árvore</h2></div>
        <div id="add-post-area" class="hidden">
            <div class="editor-box">
                <h3>Nova Atualização</h3>
                <div id="editor" contenteditable="true"></div>
                <button onclick="salvarPost()" id="btnSalvar" style="width:100%; padding:10px; background:var(--accent); color:white; border:none; border-radius:6px; cursor:pointer;">Adicionar Post</button>
            </div>
        </div>
        <div id="posts-list"></div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="btn-view">👁 Ver Manual</a>
            <a href="add.html" class="btn-add">+ Criar Novo Tópico</a>
        </div>
        <h3>Categorias</h3>
        <div id="tree-container">Carregando...</div>
    </aside>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDPLJ4Ln3Ton-DxsJ0tEKeioWHnV01Plo0",
            authDomain: "politicalgame-30215.firebaseapp.com",
            projectId: "politicalgame-30215",
            storageBucket: "politicalgame-30215.firebasestorage.app",
            messagingSenderId: "736655823319",
            appId: "1:736655823319:web:60ebdc530e101784b9bb92"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allDocs = [];
        let selectedTopic = null;

        async function loadData() {
            const snap = await getDocs(query(collection(db, "docs"), orderBy("createdAt", "asc")));
            allDocs = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderTree();
        }

        function renderTree() {
            const container = document.getElementById('tree-container');
            container.innerHTML = '';
            const pais = allDocs.filter(d => d.categoria === 'pai');
            const uniquePais = [...new Set(pais.map(p => p.nome))];

            uniquePais.forEach(pName => {
                const div = document.createElement('div');
                div.className = 'tree-node';
                div.innerHTML = `<span class="tree-label" onclick="selectTopic('${pName}')">📁 ${pName}</span>`;
                
                const filhos = allDocs.filter(d => d.categoria === 'filho' && d.categoriaPai === pName);
                const uniqueFilhos = [...new Set(filhos.map(f => f.nome))];
                uniqueFilhos.forEach(fName => {
                    const fDiv = document.createElement('div');
                    fDiv.className = 'tree-node';
                    fDiv.innerHTML = `<span class="tree-label" onclick="selectTopic('${fName}')">📄 ${fName}</span>`;
                    div.appendChild(fDiv);
                });
                container.appendChild(div);
            });
        }

        window.selectTopic = (nome) => {
            const posts = allDocs.filter(d => d.nome === nome);
            selectedTopic = posts[0];
            document.getElementById('content-header').innerHTML = `<h2>${nome}</h2>`;
            document.getElementById('add-post-area').classList.remove('hidden');
            const list = document.getElementById('posts-list');
            list.innerHTML = '<h3>Histórico</h3>';
            posts.forEach(p => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `<div class="post-date">${p.createdAt?.toDate().toLocaleString() || ''}</div>${p.textoHtml}`;
                list.appendChild(card);
            });
        };

        window.salvarPost = async () => {
            const text = document.getElementById('editor').innerHTML;
            if(!text) return;
            const doc = { ...selectedTopic, textoHtml: text, createdAt: serverTimestamp() };
            delete doc.id;
            await addDoc(collection(db, "docs"), doc);
            document.getElementById('editor').innerHTML = '';
            await loadData();
            selectTopic(selectedTopic.nome);
        };

        loadData();
    </script>
</body>
</html>
