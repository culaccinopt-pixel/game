<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Master - Manual & Regras</title>
    <style>
        :root { 
            --primary: #1e293b; --accent: #6366f1; --bg: #0f172a; 
            --white: #f8fafc; --border: #334155; --card-bg: #1e293b;
            --danger: #ef4444; --success: #16a34a; --warning: #f59e0b;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--white); overflow: hidden; }
        
        /* Sidebars */
        .sidebar { width: 280px; background: #1e293b; padding: 20px; overflow-y: auto; flex-shrink: 0; border-right: 1px solid var(--border); }
        .sidebar-right { border-right: none; border-left: 1px solid var(--border); }
        .main-content { flex: 1; overflow-y: auto; padding: 30px; scroll-behavior: smooth; }
        
        /* Componentes */
        .side-group { background: #0f172a; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
        .side-btn-row { display: flex; gap: 8px; margin-top: 10px; }
        .btn { border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; }
        .btn-icon { width: 38px; height: 38px; font-size: 1.1rem; }
        .btn-add { background: var(--success); }
        .btn-view { background: #475569; }
        .btn-edit { background: var(--warning); padding: 5px 10px; font-size: 0.7rem; }
        .btn-delete { background: var(--danger); padding: 5px 10px; font-size: 0.7rem; }
        .btn-save { background: var(--accent); width: 100%; padding: 12px; margin-top: 10px; }

        /* Árvore */
        .tree-node { margin-left: 15px; border-left: 1px dashed #475569; padding-left: 10px; }
        .tree-label { padding: 5px; cursor: pointer; font-size: 0.85rem; display: block; border-radius: 4px; color: #cbd5e1; }
        .tree-label:hover { background: #334155; color: var(--accent); }

        /* Editor e Itens */
        .editor-box { background: #1e293b; padding: 20px; border: 2px solid var(--accent); border-radius: 8px; margin-bottom: 30px; }
        #editor { min-height: 120px; border: 1px solid var(--border); padding: 10px; margin: 10px 0; border-radius: 4px; background: #0f172a; color: white; outline: none; }
        .post-card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .item-row { background: #1e293b; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }

        /* Modal */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; visibility: hidden; opacity: 0; transition: 0.3s; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 12px; width: 650px; border: 1px solid var(--accent); max-height: 90vh; overflow-y: auto; }
        
        .vinculo-row { background: #0f172a; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); position: relative; }
        .btn-remove-link { position: absolute; top: 5px; right: 5px; background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.2rem; }
        
        label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; margin-top: 8px; display: block; }
        input, textarea, select { width: 100%; background: #0f172a; border: 1px solid var(--border); color: white; padding: 8px; margin-top: 4px; border-radius: 4px; box-sizing: border-box; }
        select:disabled { opacity: 0.2; cursor: not-allowed; }

        .hidden { display: none; }


        /* Estilos para a árvore colapsável */
.tree-branch { display: none; margin-left: 15px; border-left: 1px dashed #475569; }
.tree-branch.open { display: block; }
.tree-node { position: relative; margin-bottom: 2px; }

/* Indicador de expansão (setinha) */
.toggle-icon { 
    cursor: pointer; 
    font-size: 0.7rem; 
    margin-right: 5px; 
    color: var(--accent);
    display: inline-block;
    width: 10px;
}

    </style>
</head>
<body>

 <aside class="sidebar">
    <div class="side-btn-row" style="margin-bottom:20px">
        <a href="index.html" class="btn btn-view btn-icon">👁</a>
        <a href="add.html" class="btn btn-add btn-icon">＋</a>
    </div>

    <!-- Cabeçalho com Ícone de Olho -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h3 style="font-size:0.8rem; color:var(--accent); margin: 0;">ESTRUTURA MANUAL</h3>
        <span id="btn-toggle-tree" style="cursor: pointer; font-size: 1.1rem;" title="Expandir/Recolher">👁️</span>
    </div>

    <!-- Barra de Pesquisa -->
    <input type="text" id="search-manual" placeholder="Pesquisar tópico..." 
           style="margin-bottom: 15px; height: 30px; font-size: 0.8rem; background: #0f172a; border: 1px solid var(--border); border-radius: 4px; color: white; padding: 0 10px;">
    
    <div id="tree-container">Carregando...</div>
</aside>

    <main class="main-content" id="main-scroll">
        <div id="content-header">
            <h2>Gestor Administrativo</h2>
            <p style="color: #94a3b8;">Selecione um tópico ou use as ferramentas laterais.</p>
        </div>

        <div id="editor-area" class="hidden">
            <div class="editor-box">
                <h3 id="editor-title">Nova Atualização</h3>
                <div id="editor" contenteditable="true"></div>
                <button onclick="salvarPost()" id="btnSalvar" class="btn btn-save">Publicar</button>
                <button onclick="cancelarEdicaoManual()" class="btn btn-save" style="background:#475569; margin-top:5px">Cancelar</button>
            </div>
        </div>

        <div id="dynamic-list"></div>
    </main>

<aside class="sidebar sidebar-right">
    <div class="side-group">
        <h4>1. LEGISLAÇÕES</h4>
        <div class="side-btn-row">
            <button class="btn btn-add btn-icon" onclick="abrirModalGestao('legislacoes')">+</button>
            <button class="btn btn-view btn-icon" onclick="listarItensGestao('legislacoes')">!</button>
        </div>
    </div>
    <div class="side-group">
        <h4>2. CONSTRUÇÕES</h4>
        <div class="side-btn-row">
            <button class="btn btn-add btn-icon" onclick="abrirModalGestao('construcoes')">+</button>
            <button class="btn btn-view btn-icon" onclick="listarItensGestao('construcoes')">!</button>
        </div>
    </div>
    <div class="side-group">
        <h4>3. AÇÕES</h4>
        <div class="side-btn-row">
            <button class="btn btn-add btn-icon" onclick="abrirModalGestao('acoes')">+</button>
            <button class="btn btn-view btn-icon" onclick="listarItensGestao('acoes')">!</button>
        </div>
    </div>

    <!-- NOVA SEÇÃO ADICIONADA AQUI -->
    <div class="side-group">
        <h4>4. MÍDIA</h4>
        <div class="side-btn-row">
            <button class="btn btn-add btn-icon" onclick="abrirModalGestao('midia')">+</button>
            <button class="btn btn-view btn-icon" onclick="listarItensGestao('midia')">!</button>
        </div>
    </div>
</aside>


    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h3 id="modal-title">Item</h3>
            <label>Nome</label>
            <input type="text" id="m-nome">
            <label>Descrição</label>
            <textarea id="m-desc" rows="2"></textarea>

            <div id="vinculos-container" style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px;">
                <p style="font-size:0.75rem; color:var(--accent); font-weight:bold;">VÍNCULOS COM O MANUAL</p>
            </div>
            
            <button class="btn btn-view" style="width:100%; margin-top:10px; font-size:0.7rem; height:30px;" onclick="addLinhaVinculo()">+ ADICIONAR OUTRO VÍNCULO</button>
            <button class="btn btn-save" onclick="salvarItemGestao()">Gravar</button>
            <button class="btn btn-save" style="background:#475569; margin-top:5px" onclick="fecharModal()">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDPLJ4Ln3Ton-DxsJ0tEKeioWHnV01Plo0",
            authDomain: "politicalgame-30215.firebaseapp.com",
            projectId: "politicalgame-30215",
            storageBucket: "politicalgame-30215.firebasestorage.app",
            messagingSenderId: "736655823319",
            appId: "1:736655823319:web:60ebdc530e101784b9bb92"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allDocs = [];
        let currentManualTopic = null;
        let manualEditId = null;
        let currentGestaoCol = "";
        let gestaoEditId = null;

        async function carregarTudo() {
            const snap = await getDocs(query(collection(db, "docs"), orderBy("createdAt", "asc")));
            allDocs = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderizarArvore();
        }

        // --- LÓGICA DE PESQUISA ---
document.getElementById('search-manual').addEventListener('input', (e) => {
    const termo = e.target.value.toLowerCase();
    if (termo.length > 0) {
        renderizarArvore(termo); // Passa o termo para a função de renderização
    } else {
        renderizarArvore(); // Volta ao normal
    }
});

// --- LÓGICA DE COLAPSAR LISTA ---
document.getElementById('btn-toggle-tree').addEventListener('click', () => {
    const container = document.getElementById('tree-container');
    const btn = document.getElementById('btn-toggle-tree');
    
    if (container.style.display === "none") {
        container.style.display = "block";
        btn.innerText = "👁️";
        btn.style.opacity = "1";
    } else {
        container.style.display = "none";
        btn.innerText = "🙈";
        btn.style.opacity = "0.5";
    }
});


function renderizarArvore(filtro = "") {
    const container = document.getElementById('tree-container');
    container.innerHTML = '';

    if (filtro !== "") {
        const resultados = allDocs.filter(d => d.nome.toLowerCase().includes(filtro));
        resultados.forEach(res => {
            const div = document.createElement('div');
            div.className = 'tree-node';
            div.innerHTML = `<span class="tree-label" onclick="selecionarTopico('${res.id}')">🔍 ${res.nome}</span>`;
            container.appendChild(div);
        });
        return;
    }

    // Nível 1: PAIS
    const pais = allDocs.filter(d => d.categoria === 'pai').sort((a, b) => a.ordem - b.ordem);
    pais.forEach(p => {
        const pDiv = document.createElement('div');
        pDiv.className = 'tree-node';
        
        // Contêiner para os filhos do Pai
        const pBranch = document.createElement('div');
        pBranch.className = 'tree-branch open'; // PAI E FILHO ABERTOS POR PADRÃO
        
        pDiv.innerHTML = `<span class="toggle-icon" onclick="toggleBranch(this)">▼</span>
                          <span class="tree-label" style="display:inline" onclick="selecionarTopico('${p.id}')">📁 ${p.nome}</span>`;
        
        // Nível 2: FILHOS
        const filhos = allDocs.filter(d => d.categoria === 'filho' && d.categoriaPai === p.nome).sort((a, b) => a.ordem - b.ordem);
        filhos.forEach(f => {
            const fDiv = document.createElement('div');
            fDiv.className = 'tree-node';
            
            // Contêiner para os netos do Filho
            const fBranch = document.createElement('div');
            fBranch.className = 'tree-branch'; // NETO FECHADO POR PADRÃO
            
            fDiv.innerHTML = `<span class="toggle-icon" onclick="toggleBranch(this)">▶</span>
                              <span class="tree-label" style="display:inline" onclick="selecionarTopico('${f.id}')">📄 ${f.nome}</span>`;
            
            // Nível 3: NETOS
            const netos = allDocs.filter(d => d.categoria === 'neto' && d.categoriaFilho === f.nome && d.categoriaPai === p.nome).sort((a, b) => a.ordem - b.ordem);
            netos.forEach(n => {
                const nDiv = document.createElement('div');
                nDiv.className = 'tree-node';
                
                const nBranch = document.createElement('div');
                nBranch.className = 'tree-branch'; // BISNETO FECHADO POR PADRÃO
                
                nDiv.innerHTML = `<span class="toggle-icon" onclick="toggleBranch(this)">▶</span>
                                  <span class="tree-label" style="display:inline" onclick="selecionarTopico('${n.id}')">📜 ${n.nome}</span>`;
                
                // Nível 4: BISNETOS
                const bisnetos = allDocs.filter(d => d.categoria === 'bisneto' && d.categoriaNeto === n.nome).sort((a, b) => a.ordem - b.ordem);
                bisnetos.forEach(b => {
                    const bDiv = document.createElement('div');
                    bDiv.className = 'tree-node';
                    bDiv.style.marginLeft = "15px";
                    bDiv.innerHTML = `<span class="tree-label" onclick="selecionarTopico('${b.id}')">└ ${b.nome}</span>`;
                    nBranch.appendChild(bDiv);
                });

                if(bisnetos.length > 0) nDiv.appendChild(nBranch);
                else nDiv.querySelector('.toggle-icon').style.visibility = 'hidden';
                
                fBranch.appendChild(nDiv);
            });

            if(netos.length > 0) fDiv.appendChild(fBranch);
            else fDiv.querySelector('.toggle-icon').style.visibility = 'hidden';

            pBranch.appendChild(fDiv);
        });

        pDiv.appendChild(pBranch);
        container.appendChild(pDiv);
    });
}

// Função para abrir/fechar ramos individualmente clicando na setinha
window.toggleBranch = (el) => {
    const node = el.parentElement;
    const branch = node.querySelector('.tree-branch');
    if (branch) {
        const isOpen = branch.classList.contains('open');
        branch.classList.toggle('open');
        el.innerText = isOpen ? "▶" : "▼";
    }
};

// BOTÃO DO OLHO: Fecha TUDO, deixando apenas os Pais visíveis
document.getElementById('btn-toggle-tree').addEventListener('click', () => {
    // Busca todos os ramos da árvore
    const allBranches = document.querySelectorAll('.tree-branch');
    const allIcons = document.querySelectorAll('.toggle-icon');
    
    allBranches.forEach(b => b.classList.remove('open')); // Fecha tudo
    allIcons.forEach(i => i.innerText = "▶"); // Reseta setinhas para "fechado"
    
    // Opcional: Se quiser dar um feedback visual no botão
    const btn = document.getElementById('btn-toggle-tree');
    btn.classList.add('pulse'); // Exemplo de efeito
    setTimeout(() => btn.classList.remove('pulse'), 500);
});

   window.selecionarTopico = (id) => {
    const docEncontrado = allDocs.find(d => d.id === id);
    if (!docEncontrado) return;

    currentManualTopic = docEncontrado;
    manualEditId = null; // Reseta o estado de edição

    // Esconde o painel de edição inicialmente
    document.getElementById('editor-area').classList.add('hidden');
    document.getElementById('editor').innerHTML = "";

    const list = document.getElementById('dynamic-list');
    
    // Header com o botão de Adicionar Post
    list.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: #1e293b; padding: 15px; border-radius: 8px; border: 1px solid var(--border);">
            <div>
                <h3 style="margin:0; color:var(--accent)">Tópico: ${docEncontrado.nome}</h3>
                <small style="color:gray">${docEncontrado.categoria.toUpperCase()}</small>
            </div>
            <button class="btn btn-add" onclick="abrirEditorNovoPost()" style="padding: 8px 20px; height: auto;">+ ADICIONAR POST</button>
        </div>
    `;

    // Filtra todos os posts vinculados a esta linhagem exata
    const postsRelacionados = allDocs.filter(d => {
        return d.nome === docEncontrado.nome &&
               d.categoria === docEncontrado.categoria &&
               d.categoriaPai === docEncontrado.categoriaPai &&
               d.categoriaFilho === docEncontrado.categoriaFilho &&
               d.categoriaNeto === docEncontrado.categoriaNeto;
    });

    postsRelacionados.forEach(p => {
        const card = document.createElement('div');
        card.className = 'post-card';
        card.innerHTML = `
            <div style="margin-bottom:15px">${p.textoHtml || '<em>Sem conteúdo.</em>'}</div>
            <div style="border-top: 1px solid var(--border); padding-top: 10px; display: flex; gap: 10px;">
                <button class="btn btn-edit" onclick="editarPostManual('${p.id}')">EDITAR CONTEÚDO</button>
                <button class="btn btn-delete" onclick="excluirPostManual('${p.id}')">EXCLUIR</button>
            </div>
        `;
        list.appendChild(card);
    });
};

        window.editarPostManual = (id) => {
            const p = allDocs.find(x => x.id === id);
            manualEditId = id;
            document.getElementById('editor').innerHTML = p.textoHtml;
            document.getElementById('main-scroll').scrollTop = 0;
        };

window.salvarPost = async () => {
    const html = document.getElementById('editor').innerHTML;
    if(!html.trim()) return alert("O conteúdo não pode estar vazio.");

    try {
        if(manualEditId) {
            await updateDoc(doc(db, "docs", manualEditId), { textoHtml: html });
        } else {
            const d = {...currentManualTopic, textoHtml: html, createdAt: serverTimestamp()};
            delete d.id;
            await addDoc(collection(db, "docs"), d);
        }
        
        // SUCESSO: Esconde editor e atualiza
        document.getElementById('editor-area').classList.add('hidden');
        document.getElementById('editor').innerHTML = "";
        await carregarTudo();
        selecionarTopico(currentManualTopic.id);
        alert("Gravado com sucesso!");
        
    } catch (e) {
        console.error(e);
        alert("Erro ao salvar.");
    }
};

        // --- GESTÃO LEGISLAÇÕES (CORREÇÃO FILTROS) ---
        window.abrirModalGestao = (col, id = null) => {
            currentGestaoCol = col;
            gestaoEditId = id;
            document.getElementById('modal').classList.add('active');
            document.getElementById('vinculos-container').innerHTML = '';
            if(!id) {
                document.getElementById('m-nome').value = "";
                document.getElementById('m-desc').value = "";
                addLinhaVinculo();
            } else {
                carregarParaEditarGestao(id);
            }
        };

        async function carregarParaEditarGestao(id) {
            const snap = await getDocs(collection(db, currentGestaoCol));
            const item = snap.docs.find(d => d.id === id).data();
            document.getElementById('m-nome').value = item.nome;
            document.getElementById('m-desc').value = item.descricao || "";
            if(item.vinculos) item.vinculos.forEach(v => addLinhaVinculo(v));
        }

        window.addLinhaVinculo = (data = null) => {
            const container = document.getElementById('vinculos-container');
            const rowId = "row-" + Date.now() + Math.random();
            const div = document.createElement('div');
            div.className = 'vinculo-row';
            div.id = rowId;
            div.innerHTML = `
                <button class="btn-remove-link" onclick="document.getElementById('${rowId}').remove()">×</button>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                    <div><label>Pai</label><select class="s-p"><option value="">Selecione...</option></select></div>
                    <div><label>Filho</label><select class="s-f" disabled><option value="">Selecione...</option></select></div>
                    <div><label>Neto</label><select class="s-n" disabled><option value="">Selecione...</option></select></div>
                    <div><label>Bisneto</label><select class="s-b" disabled><option value="">Selecione...</option></select></div>
                </div>
            `;
            container.appendChild(div);

            const sp = div.querySelector('.s-p'), sf = div.querySelector('.s-f'), sn = div.querySelector('.s-n'), sb = div.querySelector('.s-b');

            // 1. Popular Pais (docs com categoria "pai")
            const pais = allDocs.filter(d => d.categoria === 'pai').map(d => d.nome).sort();
            pais.forEach(p => sp.innerHTML += `<option value="${p}">${p}</option>`);

            sp.onchange = () => {
                const valP = sp.value;
                sf.innerHTML = '<option value="">Selecione...</option>';
                sf.disabled = !valP;
                if(valP) {
                    // Filhos: documentos que têm categoria "filho" e categoriaPai == valP
                    const filhos = allDocs.filter(d => d.categoria === 'filho' && d.categoriaPai === valP).map(d => d.nome).sort();
                    filhos.forEach(f => sf.innerHTML += `<option value="${f}">${f}</option>`);
                }
                sf.onchange();
            };

            sf.onchange = () => {
                const valP = sp.value, valF = sf.value;
                sn.innerHTML = '<option value="">Selecione...</option>';
                sn.disabled = !valF;
                if(valF) {
                    // Netos: documentos que têm categoria "neto", categoriaPai == valP e categoriaFilho == valF
                    const netos = allDocs.filter(d => d.categoria === 'neto' && d.categoriaPai === valP && d.categoriaFilho === valF).map(d => d.nome).sort();
                    netos.forEach(n => sn.innerHTML += `<option value="${n}">${n}</option>`);
                }
                sn.onchange();
            };

            sn.onchange = () => {
                const valP = sp.value, valF = sf.value, valN = sn.value;
                sb.innerHTML = '<option value="">Selecione...</option>';
                sb.disabled = !valN;
                if(valN) {
                    // Bisnetos: categoria "bisneto" e todos os pais batem
                    const bis = allDocs.filter(d => d.categoria === 'bisneto' && d.categoriaPai === valP && d.categoriaFilho === valF && d.categoriaNeto === valN).map(d => d.nome).sort();
                    bis.forEach(b => sb.innerHTML += `<option value="${b}">${b}</option>`);
                }
            };

            if(data) {
                sp.value = data.pai || ""; sp.onchange();
                sf.value = data.filho || ""; sf.onchange();
                sn.value = data.neto || ""; sn.onchange();
                sb.value = data.bisneto || "";
            }
        };

        window.salvarItemGestao = async () => {
            const vinculos = [];
            document.querySelectorAll('.vinculo-row').forEach(row => {
                const p = row.querySelector('.s-p').value;
                if(p) vinculos.push({
                    pai: p, filho: row.querySelector('.s-f').value,
                    neto: row.querySelector('.s-n').value, bisneto: row.querySelector('.s-b').value
                });
            });
            const payload = { 
                nome: document.getElementById('m-nome').value, 
                descricao: document.getElementById('m-desc').value, 
                vinculos 
            };
            if(gestaoEditId) await updateDoc(doc(db, currentGestaoCol, gestaoEditId), payload);
            else await addDoc(collection(db, currentGestaoCol), {...payload, createdAt: serverTimestamp()});
            fecharModal();
            listarItensGestao(currentGestaoCol);
        };

        window.listarItensGestao = async (col) => {
            currentGestaoCol = col;
            document.getElementById('editor-area').classList.add('hidden');
            const listDiv = document.getElementById('dynamic-list');
            listDiv.innerHTML = "Carregando...";
            const snap = await getDocs(collection(db, col));
            listDiv.innerHTML = `<h2>Lista: ${col}</h2>`;
            snap.forEach(d => {
                const item = d.data();
                const div = document.createElement('div');
                div.className = 'item-row';
                div.innerHTML = `<div>${item.nome}</div>
                <button class="btn btn-edit" onclick="abrirModalGestao('${col}', '${d.id}')">Editar</button>
                <button class="btn btn-delete" onclick="excluirItemGestao('${col}', '${d.id}')">X</button>`;
                listDiv.appendChild(div);
            });
        };

        window.excluirItemGestao = async (col, id) => {
            if(confirm("Excluir?")) {
                await deleteDoc(doc(db, col, id));
                listarItensGestao(col);
            }
        };

        window.fecharModal = () => document.getElementById('modal').classList.remove('active');
        carregarTudo();



        // Abre o editor para criar um NOVO post
window.abrirEditorNovoPost = () => {
    manualEditId = null; // Garante que é uma nova inserção
    document.getElementById('editor').innerHTML = "";
    document.getElementById('editor-title').innerText = "Novo Post para: " + currentManualTopic.nome;
    document.getElementById('editor-area').classList.remove('hidden');
    
    // Scroll suave para o editor
    document.getElementById('main-scroll').scrollTo({ top: 0, behavior: 'smooth' });
};

// Abre o editor para EDITAR um post existente
window.editarPostManual = (id) => {
    const p = allDocs.find(x => x.id === id);
    if(!p) return;

    manualEditId = id; // Define qual documento estamos editando
    document.getElementById('editor').innerHTML = p.textoHtml;
    document.getElementById('editor-title').innerText = "Editando Conteúdo";
    document.getElementById('editor-area').classList.remove('hidden');
    
    // Sobe a página para o usuário ver o editor
    document.getElementById('main-scroll').scrollTo({ top: 0, behavior: 'smooth' });
};

// Função para cancelar (fechar o editor)
window.cancelarEdicaoManual = () => {
    document.getElementById('editor-area').classList.add('hidden');
    document.getElementById('editor').innerHTML = "";
    manualEditId = null;
};

// Função para excluir post (opcional, mas recomendada)
window.excluirPostManual = async (id) => {
    if(confirm("Deseja excluir permanentemente este post do manual?")) {
        await deleteDoc(doc(db, "docs", id));
        await carregarTudo();
        selecionarTopico(currentManualTopic.id);
    }
};


    </script>
