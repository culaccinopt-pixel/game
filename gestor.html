<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor do Manual - Admin Ultra</title>
    <style>
        :root { 
            --primary: #1e293b; --accent: #6366f1; --bg: #0f172a; 
            --white: #f8fafc; --border: #334155; --card-bg: #1e293b;
            --danger: #ef4444; --success: #16a34a; --warning: #f59e0b;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--white); overflow: hidden; }
        
        .sidebar { width: 280px; background: #1e293b; padding: 20px; overflow-y: auto; flex-shrink: 0; border-right: 1px solid var(--border); }
        .sidebar-right { border-right: none; border-left: 1px solid var(--border); }
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }

        .side-group { background: #0f172a; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
        .side-btn-row { display: flex; gap: 8px; margin-top: 10px; }

        .btn { border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; }
        .btn-icon { width: 38px; height: 38px; font-size: 1.1rem; }
        .btn-add { background: var(--success); }
        .btn-view { background: #475569; }
        .btn-edit { background: var(--warning); padding: 5px 10px; font-size: 0.7rem; margin-right: 5px; }
        .btn-delete { background: var(--danger); padding: 5px 10px; font-size: 0.7rem; }
        .btn-save { background: var(--accent); width: 100%; padding: 12px; margin-top: 10px; }

        /* Modal e Vínculos */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; visibility: hidden; opacity: 0; transition: 0.3s; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 12px; width: 600px; border: 1px solid var(--accent); max-height: 90vh; overflow-y: auto; }
        
        .vinculo-row { background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); position: relative; }
        .btn-remove-link { position: absolute; top: 5px; right: 5px; background: none; border: none; color: var(--danger); cursor: pointer; font-weight: bold; }
        
        label { font-size: 0.75rem; color: #94a3b8; display: block; margin-top: 10px; }
        input, textarea, select { width: 100%; background: #0f172a; border: 1px solid var(--border); color: white; padding: 8px; margin-top: 5px; border-radius: 4px; box-sizing: border-box; }
        select:disabled { opacity: 0.3; cursor: not-allowed; }

        .item-row { background: #1e293b; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="side-btn-row" style="margin-bottom:20px">
            <a href="index.html" class="btn btn-view btn-icon">👁</a>
            <a href="add.html" class="btn btn-add btn-icon">＋</a>
        </div>
        <h3>Tópicos</h3>
        <div id="tree-container">Carregando...</div>
    </aside>

    <main class="main-content">
        <div id="content-header"><h2>Painel de Gestão</h2></div>
        <div id="dynamic-list"></div>
    </main>

    <aside class="sidebar sidebar-right">
        <div class="side-group">
            <h4>Legislações</h4>
            <div class="side-btn-row">
                <button class="btn btn-add btn-icon" onclick="openModal('legislacoes')">+</button>
                <button class="btn btn-view btn-icon" onclick="listItems('legislacoes')">!</button>
            </div>
        </div>
        <div class="side-group">
            <h4>Construções</h4>
            <div class="side-btn-row">
                <button class="btn btn-add btn-icon" onclick="openModal('construcoes')">+</button>
                <button class="btn btn-view btn-icon" onclick="listItems('construcoes')">!</button>
            </div>
        </div>
        <div class="side-group">
            <h4>Ações</h4>
            <div class="side-btn-row">
                <button class="btn btn-add btn-icon" onclick="openModal('acoes')">+</button>
                <button class="btn btn-view btn-icon" onclick="listItems('acoes')">!</button>
            </div>
        </div>
    </aside>

    <!-- Modal Multi-Vínculos -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h3 id="modal-title">Editar Item</h3>
            <label>Nome do Item</label>
            <input type="text" id="m-nome">
            <label>Descrição</label>
            <textarea id="m-desc" rows="2"></textarea>

            <div id="vinculos-container" style="margin-top: 20px;">
                <p style="font-size:0.8rem; color:var(--accent)">Vínculos com o Manual:</p>
                <!-- As linhas de dropdown entram aqui -->
            </div>
            
            <button class="btn btn-view" style="width:100%; margin-top:10px; font-size:0.7rem;" onclick="addVinculoRow()">+ Adicionar outro vínculo</button>

            <button class="btn btn-save" id="btn-save-main" onclick="saveItem()">Gravar Alterações</button>
            <button class="btn btn-save" style="background:#475569; margin-top:5px" onclick="closeModal()">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDPLJ4Ln3Ton-DxsJ0tEKeioWHnV01Plo0",
            authDomain: "politicalgame-30215.firebaseapp.com",
            projectId: "politicalgame-30215",
            storageBucket: "politicalgame-30215.firebasestorage.app",
            messagingSenderId: "736655823319",
            appId: "1:736655823319:web:60ebdc530e101784b9bb92"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allDocs = [];
        let currentCol = "";
        let editingId = null;

        async function init() {
            const snap = await getDocs(collection(db, "docs"));
            allDocs = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderTree();
        }

        function renderTree() {
            const container = document.getElementById('tree-container');
            container.innerHTML = '';
            const pais = [...new Set(allDocs.filter(d => d.categoriaPai).map(d => d.categoriaPai))].sort();
            pais.forEach(p => {
                const d = document.createElement('div');
                d.innerHTML = `<span style="font-size:0.8rem; display:block; padding:3px; color:#cbd5e1">📁 ${p}</span>`;
                container.appendChild(d);
            });
        }

        // --- LÓGICA DO MODAL ---
        window.openModal = (col, id = null) => {
            currentCol = col;
            editingId = id;
            document.getElementById('modal').classList.add('active');
            document.getElementById('vinculos-container').innerHTML = '<p style="font-size:0.8rem; color:var(--accent)">Vínculos com o Manual:</p>';
            
            if(!id) {
                document.getElementById('modal-title').innerText = "Novo Item";
                document.getElementById('m-nome').value = "";
                document.getElementById('m-desc').value = "";
                addVinculoRow();
            } else {
                loadItemToEdit(id);
            }
        };

        window.closeModal = () => document.getElementById('modal').classList.remove('active');

        async function loadItemToEdit(id) {
            const snap = await getDocs(query(collection(db, currentCol)));
            const item = snap.docs.find(d => d.id === id).data();
            document.getElementById('modal-title').innerText = "Editando: " + item.nome;
            document.getElementById('m-nome').value = item.nome;
            document.getElementById('m-desc').value = item.descricao || "";
            
            if(item.vinculos && item.vinculos.length > 0) {
                item.vinculos.forEach(v => addVinculoRow(v));
            } else {
                addVinculoRow();
            }
        }

        window.addVinculoRow = (data = null) => {
            const container = document.getElementById('vinculos-container');
            const rowId = Date.now() + Math.random();
            const div = document.createElement('div');
            div.className = 'vinculo-row';
            div.id = `row-${rowId}`;
            div.innerHTML = `
                <button class="btn-remove-link" onclick="document.getElementById('row-${rowId}').remove()">✕</button>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <select class="sel-p"><option value="">Pai...</option></select>
                    <select class="sel-f" disabled><option value="">Filho...</option></select>
                    <select class="sel-n" disabled><option value="">Neto...</option></select>
                    <select class="sel-b" disabled><option value="">Bisneto...</option></select>
                </div>
            `;
            container.appendChild(div);

            const sP = div.querySelector('.sel-p');
            const sF = div.querySelector('.sel-f');
            const sN = div.querySelector('.sel-n');
            const sB = div.querySelector('.sel-b');

            // Popular Pai
            const pais = [...new Set(allDocs.map(d => d.categoriaPai).filter(v => v))].sort();
            pais.forEach(p => sP.innerHTML += `<option value="${p}">${p}</option>`);

            // Eventos Cascata
            sP.onchange = () => {
                const val = sP.value;
                sF.innerHTML = '<option value="">Filho...</option>';
                sF.disabled = !val;
                if(val) {
                    const filhos = [...new Set(allDocs.filter(d => d.categoriaPai === val).map(d => d.categoriaFilho).filter(v => v))].sort();
                    filhos.forEach(f => sF.innerHTML += `<option value="${f}">${f}</option>`);
                }
                sF.onchange(); 
            };

            sF.onchange = () => {
                const valP = sP.value;
                const valF = sF.value;
                sN.innerHTML = '<option value="">Neto...</option>';
                sN.disabled = !valF;
                if(valF) {
                    const netos = [...new Set(allDocs.filter(d => d.categoriaPai === valP && d.categoriaFilho === valF).map(d => d.categoriaNeto).filter(v => v))].sort();
                    netos.forEach(n => sN.innerHTML += `<option value="${n}">${n}</option>`);
                }
                sN.onchange();
            };

            sN.onchange = () => {
                const valP = sP.value;
                const valF = sF.value;
                const valN = sN.value;
                sB.innerHTML = '<option value="">Bisneto...</option>';
                sB.disabled = !valN;
                if(valN) {
                    const bis = [...new Set(allDocs.filter(d => d.categoriaPai === valP && d.categoriaFilho === valF && d.categoriaNeto === valN).map(d => d.categoriaBisneto).filter(v => v))].sort();
                    bis.forEach(b => sB.innerHTML += `<option value="${b}">${b}</option>`);
                }
            };

            // Se for edição, carregar valores
            if(data) {
                sP.value = data.pai || ""; 
                sP.onchange();
                sF.value = data.filho || "";
                sF.onchange();
                sN.value = data.neto || "";
                sN.onchange();
                sB.value = data.bisneto || "";
            }
        };

        window.saveItem = async () => {
            const nome = document.getElementById('m-nome').value.trim();
            const desc = document.getElementById('m-desc').value.trim();
            if(!nome) return alert("Nome é obrigatório");

            const vinculos = [];
            document.querySelectorAll('.vinculo-row').forEach(row => {
                const p = row.querySelector('.sel-p').value;
                if(p) {
                    vinculos.push({
                        pai: p,
                        filho: row.querySelector('.sel-f').value,
                        neto: row.querySelector('.sel-n').value,
                        bisneto: row.querySelector('.sel-b').value
                    });
                }
            });

            try {
                const payload = { nome, descricao: desc, vinculos, updatedAt: serverTimestamp() };
                
                if(editingId) {
                    await updateDoc(doc(db, currentCol, editingId), payload);
                    alert("Atualizado!");
                } else {
                    // Check duplicado apenas em novos
                    const q = query(collection(db, currentCol), where("nome", "==", nome));
                    const check = await getDocs(q);
                    if(!check.empty) return alert("Este nome já existe!");
                    
                    payload.createdAt = serverTimestamp();
                    await addDoc(collection(db, currentCol), payload);
                    alert("Criado!");
                }
                closeModal();
                listItems(currentCol);
            } catch (e) { console.error(e); alert("Erro ao salvar."); }
        };

        window.listItems = async (col) => {
            currentCol = col;
            document.getElementById('content-header').innerHTML = `<h2>Gestão: ${col.toUpperCase()}</h2>`;
            const listDiv = document.getElementById('dynamic-list');
            listDiv.innerHTML = "Carregando...";
            
            const snap = await getDocs(query(collection(db, col), orderBy("nome", "asc")));
            listDiv.innerHTML = "";
            snap.forEach(d => {
                const item = d.data();
                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <div>
                        <strong>${item.nome}</strong><br>
                        <small style="color:#94a3b8">${item.vinculos?.length || 0} vínculos vinculados</small>
                    </div>
                    <div>
                        <button class="btn btn-edit" onclick="openModal('${col}', '${d.id}')">Editar</button>
                        <button class="btn btn-delete" onclick="deleteItem('${col}', '${d.id}')">Excluir</button>
                    </div>
                `;
                listDiv.appendChild(row);
            });
        };

        window.deleteItem = async (col, id) => {
            if(confirm("Tem certeza?")) {
                await deleteDoc(doc(db, col, id));
                listItems(col);
            }
        };

        init();
    </script>
</body>
</html>
