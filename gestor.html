<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Master - Manual & Regras</title>
    <style>
        :root { 
            --primary: #1e293b; --accent: #6366f1; --bg: #0f172a; 
            --white: #f8fafc; --border: #334155; --card-bg: #1e293b;
            --danger: #ef4444; --success: #16a34a; --warning: #f59e0b;
        }
body { 
    font-family: 'Segoe UI', sans-serif; 
    margin: 0; 
    display: flex; 
    height: 100vh; 
    background: var(--bg); 
    color: var(--white); 
    overflow: hidden; 
}

        /* Sidebars */
.sidebar { 
    width: 280px; 
    background: #1e293b; 
    padding: 20px; 
    overflow-y: auto; 
    flex-shrink: 0; 
    border-right: 1px solid var(--border); 
    transition: 0.3s ease;
    z-index: 1001;
}

        .sidebar-right { border-right: none; border-left: 1px solid var(--border); }
        .main-content { 
    flex: 1; 
    overflow-y: auto; 
    padding: 30px; 
    scroll-behavior: smooth; 
}
        
        /* Componentes */
        .side-group { background: #0f172a; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
        .side-btn-row { display: flex; gap: 8px; margin-top: 10px; }
        .btn { border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; }
        .btn-icon { width: 38px; height: 38px; font-size: 1.1rem; }
        .btn-add { background: var(--warning) !important;  }
        .btn-view { background: #475569; }
        .btn-edit { background: var(--warning); padding: 5px 10px; font-size: 0.7rem; }
        .btn-delete { background: var(--danger); padding: 5px 10px; font-size: 0.7rem; }
        .btn-save { 
    background: var(--success) !important; 
    width: 100%; 
    padding: 12px; 
    margin-top: 10px; 
}

        /* Árvore */
        .tree-node { margin-left: 15px; border-left: 1px dashed #475569; padding-left: 10px; }
        .tree-label { padding: 5px; cursor: pointer; font-size: 0.85rem; display: block; border-radius: 4px; color: #cbd5e1; }
        .tree-label:hover { background: #334155; color: var(--accent); }

        /* Editor e Itens */
        .editor-box { background: #1e293b; padding: 20px; border: 2px solid var(--accent); border-radius: 8px; margin-bottom: 30px; }
        #editor { min-height: 120px; border: 1px solid var(--border); padding: 10px; margin: 10px 0; border-radius: 4px; background: #0f172a; color: white; outline: none; }
        .post-card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .item-row { background: #1e293b; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }

        /* Modal */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; visibility: hidden; opacity: 0; transition: 0.3s; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 12px; width: 650px; border: 1px solid var(--accent); max-height: 90vh; overflow-y: auto; }
        
        .vinculo-row { background: #0f172a; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); position: relative; }
        .btn-remove-link { position: absolute; top: 5px; right: 5px; background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.2rem; }
        
        label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; margin-top: 8px; display: block; }
        input, textarea, select { width: 100%; background: #0f172a; border: 1px solid var(--border); color: white; padding: 8px; margin-top: 4px; border-radius: 4px; box-sizing: border-box; }
        select:disabled { opacity: 0.2; cursor: not-allowed; }

        .hidden { display: none; }


        /* Estilos para a árvore colapsável */
.tree-branch { display: none; margin-left: 15px; border-left: 1px dashed #475569; }
.tree-branch.open { display: block; }
.tree-node { position: relative; margin-bottom: 2px; }

/* Indicador de expansão (setinha) */
.toggle-icon { 
    cursor: pointer; 
    font-size: 0.7rem; 
    margin-right: 5px; 
    color: var(--accent);
    display: inline-block;
    width: 10px;
}

/* Estilos para o Check nos Cards de Gestão */
.card-check { position: absolute; top: 10px; right: 10px; cursor: pointer; font-size: 1.2rem; z-index: 5; color: #475569; }
.card-check.checked { color: var(--success); }
.done-card { border: 2px solid var(--success) !important; background: rgba(22, 163, 74, 0.05) !important; }
.post-card, .item-row { position: relative; }

/* Modais de Usuários e Desfazer */
.modal-check { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; }
.check-content { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid var(--accent); width: 320px; text-align: center; }
.user-opt { padding: 12px; margin-bottom: 8px; background: #0f172a; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; }
.user-opt:hover { background: var(--accent); }

/* Barra de Topo exclusiva para Mobile */
.mobile-nav {
    display: none;
    background: #1e293b;
    padding: 10px 15px;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 1002;
}

/* Responsividade Geral */
@media (max-width: 1024px) {
    .sidebar {
        position: fixed;
        top: 0;
        bottom: 0;
        left: -300px; /* Esconde a esquerda */
        width: 260px;
        box-shadow: 10px 0 20px rgba(0,0,0,0.5);
    }
    
    .sidebar-right {
        left: auto;
        right: -300px; /* Esconde a direita */
        border-right: none;
        border-left: 1px solid var(--border);
    }

    .sidebar.active { left: 0; }
    .sidebar-right.active { right: 0; }

    .mobile-nav { display: flex; }
    
    .main-content { padding: 15px; }

    /* Overlay para fechar menus ao clicar fora */
    .overlay-screen {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.6);
        z-index: 1000;
    }
    .overlay-screen.active { display: block; }

    .modal-content { width: 95%; padding: 15px; }
}

/* Ajustes de toque */
.btn-icon { width: 44px; height: 44px; } /* Botões maiores no mobile */
.tree-label { padding: 10px 5px; font-size: 0.95rem; }


:root { 
    --primary: #1e293b; --accent: #6366f1; --bg: #0f172a; 
    --white: #f8fafc; --border: #334155; --card-bg: #1e293b;
    --danger: #ef4444; --success: #16a34a; --warning: #f59e0b;
}

* { box-sizing: border-box; }

body { 
    font-family: 'Segoe UI', system-ui, sans-serif; 
    margin: 0; 
    display: flex; 
    flex-direction: row; /* Desktop padrão */
    height: 100vh; 
    background: var(--bg); 
    color: var(--white); 
    overflow: hidden; 
}

/* Barra de Topo Mobile */
.mobile-nav {
    display: none;
    width: 100%;
    background: var(--primary);
    padding: 12px 15px;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    z-index: 1100;
}

/* Sidebars */
.sidebar { 
    width: 280px; 
    background: var(--primary); 
    padding: 20px; 
    overflow-y: auto; 
    flex-shrink: 0; 
    border-right: 1px solid var(--border); 
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 1001;
}

.sidebar-right { border-right: none; border-left: 1px solid var(--border); }

.main-content { 
    flex: 1; 
    overflow-y: auto; 
    padding: 30px; 
    scroll-behavior: smooth; 
    background: var(--bg);
}

/* Componentes */
.side-group { background: #0f172a; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
.side-btn-row { display: flex; gap: 8px; margin-top: 10px; }
.btn { border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; padding: 10px; }
.btn-icon { width: 40px; height: 40px; font-size: 1.1rem; }
.btn-add { background: var(--success); }
.btn-view { background: #475569; }
.btn-edit { background: var(--warning); padding: 6px 12px; font-size: 0.75rem; }
.btn-delete { background: var(--danger); padding: 6px 12px; font-size: 0.75rem; }
.btn-save { background: var(--accent); width: 100%; padding: 14px; margin-top: 10px; font-size: 1rem; }

/* Árvore */
.tree-node { margin-left: 10px; border-left: 1px dashed #475569; padding-left: 10px; }
.tree-label { padding: 8px 5px; cursor: pointer; font-size: 0.9rem; display: block; border-radius: 4px; color: #cbd5e1; word-break: break-word; }
.tree-label:hover { background: #334155; color: var(--accent); }

/* Editor e Cards */
.editor-box { background: #1e293b; padding: 15px; border: 2px solid var(--accent); border-radius: 8px; margin-bottom: 20px; }
#editor { min-height: 150px; border: 1px solid var(--border); padding: 12px; margin: 10px 0; border-radius: 4px; background: #0f172a; color: white; outline: none; overflow-y: auto; }
.post-card { background: var(--card-bg); border: 1px solid var(--border); padding: 18px; border-radius: 12px; margin-bottom: 15px; position: relative; }
.item-row { background: #1e293b; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; gap: 10px; }

/* Modais */
.modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1200; visibility: hidden; opacity: 0; transition: 0.3s; padding: 15px; }
.modal-overlay.active { visibility: visible; opacity: 1; }
.modal-content { background: #1e293b; padding: 20px; border-radius: 12px; width: 100%; max-width: 600px; border: 1px solid var(--accent); max-height: 90vh; overflow-y: auto; }

/* Estilos de Check */
.card-check { cursor: pointer; font-size: 1.3rem; color: #475569; padding: 5px; transition: 0.2s; }
.card-check.checked { color: var(--success); }
.done-card { border: 2px solid var(--success) !important; background: rgba(22, 163, 74, 0.05) !important; }

/* Overlay de fundo para mobile */
.overlay-screen {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    backdrop-filter: blur(2px);
}

/* RESPONSIVIDADE (MOBILE) */
@media (max-width: 1024px) {
    body { flex-direction: column; }

    .mobile-nav { display: flex; }

    .sidebar {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        width: 280px;
        max-width: 85%;
        transform: translateX(-100%); /* Escondido */
        box-shadow: 10px 0 30px rgba(0,0,0,0.5);
    }
    
    .sidebar-right {
        left: auto;
        right: 0;
        transform: translateX(100%); /* Escondido */
    }

    .sidebar.active { transform: translateX(0); }
    .overlay-screen.active { display: block; }

    .main-content { padding: 15px; padding-bottom: 80px; }

    .item-row { flex-wrap: wrap; }
    .item-row .btn { flex: 1; text-align: center; }

    .vinculo-row { padding: 10px; }
    .vinculo-row div { grid-template-columns: 1fr !important; } /* Coluna única no mobile para vínculos */
}

/* Estilo para o botão X de fechar o modal */
.modal-content {
    position: relative; /* Necessário para posicionar o X em relação ao card */
}

.btn-close-modal {
    position: absolute;
    top: 15px;
    right: 15px;
    background: none;
    border: none;
    color: #94a3b8;
    font-size: 1.8rem;
    line-height: 1;
    cursor: pointer;
    transition: 0.2s;
}

.btn-close-modal:hover {
    color: var(--danger);
}

/* Submenu de Abas */
.tabs-container {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
    overflow-x: auto;
}
.tab-btn {
    background: #1e293b;
    border: 1px solid var(--border);
    color: #94a3b8;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: 0.3s;
    font-size: 0.85rem;
}
.tab-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
}
.tab-btn:hover:not(.active) {
    background: #334155;
}
.badge-count {
    background: rgba(0,0,0,0.3);
    padding: 2px 6px;
    border-radius: 10px;
    margin-left: 5px;
    font-size: 0.7rem;
}

/* RESPONSIVIDADE (MOBILE) */
@media (max-width: 1024px) {
    body { 
        flex-direction: column; 
    }

    .mobile-nav { 
        display: flex; 
        position: fixed; /* Fixa no topo */
        top: 0;
        left: 0;
        right: 0;
        height: 60px; /* Altura definida */
        background: #1e293b;
        border-bottom: 2px solid var(--accent);
        padding: 0 15px;
        justify-content: space-between;
        align-items: center;
        z-index: 1100; /* Garante que fique acima de tudo */
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    /* Ajuste para o conteúdo não começar por baixo da barra fixa */
    .main-content { 
        margin-top: 60px; 
        padding: 15px; 
        padding-bottom: 100px; 
        height: calc(100vh - 60px);
    }

    .sidebar {
        z-index: 1200; /* Sidebar deve abrir por cima da barra */
    }

    /* Botões do topo mais parecidos com a imagem */
    .mobile-nav .btn-view {
        background: #334155;
        border-radius: 8px;
        font-size: 0.8rem;
        padding: 8px 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        line-height: 1;
    }
}

@media (max-width: 1024px) {
    body { flex-direction: column; }

    /* Estilo base para ambas as sidebars no mobile */
    .sidebar {
        position: fixed;
        top: 0;
        bottom: 0;
        width: 280px;
        max-width: 85%;
        z-index: 1200;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    /* Painel da Esquerda (Menu) */
    .sidebar:not(.sidebar-right) {
        left: 0;
        transform: translateX(-100%); /* Esconde para a esquerda */
    }

    /* Painel da Direita (Ferramentas) - O FIX ESTÁ AQUI */
    .sidebar-right {
        left: auto !important; /* Anula o left original */
        right: 0 !important;   /* Fixa na direita */
        transform: translateX(100%) !important; /* Esconde para a direita */
        border-left: 1px solid var(--border);
        border-right: none;
    }

    /* Quando qualquer uma estiver ativa, volta para a posição 0 */
    .sidebar.active {
        transform: translateX(0) !important;
    }

    /* Ajuste da barra do topo mobile para não sobrepor */
    .mobile-nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1100;
        height: 60px;
    }

    .main-content {
        margin-top: 60px;
    }
}


/* Estilo para tabelas dentro do editor e dos cards */
#editor table, .post-card table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0;
    background: #0f172a;
    color: #f8fafc;
    font-size: 0.85rem;
}

#editor th, .post-card th {
    background: #334155;
    color: #6366f1;
    text-align: left;
}

#editor td, #editor th, .post-card td, .post-card th {
    border: 1px solid #334155;
    padding: 10px;
}

#editor td:focus {
    background: #1e293b;
    outline: none;
}

/* Posicionamento relativo para o container do editor */
.editor-box {
    position: relative;
}

/* Novo botão X para o editor */
.btn-close-editor {
    position: absolute;
    top: 15px;
    right: 15px;
    background: none;
    border: none;
    color: #94a3b8;
    font-size: 2rem;
    line-height: 1;
    cursor: pointer;
    transition: 0.2s;
    z-index: 10;
}

.btn-close-editor:hover {
    color: var(--danger);
}

/* Aumento da altura das linhas da tabela */
#editor td, .post-card td {
    padding: 18px 12px !important; /* Aumenta o respiro interno das células */
    min-height: 50px;
}

#editor th, .post-card th {
    padding: 15px 12px !important;
}

/* Estilo para a linha da tabela concluída */
tr.row-done {
    background-color: rgba(22, 163, 74, 0.15) !important; /* Verde suave */
    text-decoration: line-through;
    color: #94a3b8;
}

/* Célula de check na tabela */
.td-check {
    cursor: pointer;
    text-align: center;
    font-size: 1.2rem;
    user-select: none;
    transition: 0.2s;
    width: 50px;
}

.td-check:hover {
    transform: scale(1.2);
    background: rgba(255,255,255,0.05);
}

/* Esconde botões de controle que foram salvos por erro dentro do conteúdo do post */
.post-content-body #table-controls, 
.post-content-body button[onclick*="LinhaTabela"] {
    display: none !important;
}

/* Impede a seleção de texto no cabeçalho da tabela */
table thead {
    user-select: none;
    -webkit-user-select: none;
    pointer-events: none; /* Opcional: ignora cliques no header */
}

/* Garante que as células de dados sejam selecionáveis */
table tbody td {
    user-select: text;
}

/* Bloqueio total no cabeçalho */
table thead {
    user-select: none !important;
    pointer-events: none;
    background: #1e293b;
}

/* Impede selecionar a estrutura da tabela, mas permite o conteúdo */
table {
    user-select: none !important;
}

/* Reativa a seleção apenas nas células de texto */
table td {
    user-select: text !important;
}

/* Estilo para a coluna de Status (não deve ser selecionável) */
.td-check {
    user-select: none !important;
    pointer-events: auto; /* Permite o clique, mas não a seleção de texto */
}

/* Bloqueia seleção em toda a estrutura */
#editor table, 
#editor table thead, 
#editor table tr, 
#editor table tbody {
    user-select: none !important;
    -webkit-user-select: none !important;
}

/* Libera seleção APENAS dentro da célula que está sendo editada */
#editor table td[contenteditable="true"] {
    user-select: text !important;
    -webkit-user-select: text !important;
    pointer-events: auto !important;
}

/* Bloqueia a célula de check */
.td-check {
    user-select: none !important;
    pointer-events: auto !important;
}

/* Impede que o cabeçalho seja selecionado ou editado visualmente */
#editor thead, #editor th {
    user-select: none !important;
    -webkit-user-select: none !important;
    pointer-events: auto; /* Permite cliques, mas o JS acima bloqueia a digitação */
    cursor: default;
}

/* Garante que o cursor de texto apareça apenas nas células editáveis */
#editor td[contenteditable="true"] {
    cursor: text;
}

/* Bloqueia seleção de texto nos controles do editor */
#table-tools-container, 
#table-tools-container button, 
#editor-title {
    user-select: none !important;
    -webkit-user-select: none !important;
    -moz-user-select: none !important;
    -ms-user-select: none !important;
}

/* Garante que os botões não herdem comportamentos de edição */
#table-tools-container [contenteditable="true"] {
    contenteditable: false !important;
}


/* Remove qualquer contorno de edição ou foco dos botões e títulos */
#table-tools-container, 
#table-tools-container button, 
#editor-title {
    outline: none !important;
    -webkit-user-modify: read-only !important; /* Trava específica para Chrome/Safari */
}

/* Garante que o cursor não vire aquela "barrinha de texto" nos botões */
#table-tools-container button {
    cursor: pointer !important;
}

/* Bloqueia seleção de texto e cursor de edição nos controles */
#table-tools-container, 
#table-tools-container button, 
#editor-title {
    user-select: none !important;
    -webkit-user-select: none !important;
    -webkit-user-modify: read-only !important; /* Força somente leitura */
    pointer-events: auto !important; /* Mantém o clique funcionando */
    cursor: default;
}

#table-tools-container button {
    cursor: pointer !important; /* Garante que o botão ainda pareça um botão */
}

/* Bloqueio total de edição e seleção na interface do editor */
#table-tools-container, 
#table-tools-container button, 
#editor-title {
    user-select: none !important;
    -webkit-user-select: none !important;
    -moz-user-select: none !important;
    -ms-user-select: none !important;
    
    /* Impede modificação de texto no Chrome/Safari */
    -webkit-user-modify: read-only !important; 
    
    /* Remove o cursor de texto (I-beam) e força a seta */
    cursor: pointer !important; 
}

/* Garante que o título não pareça editável */
#editor-title {
    cursor: default !important;
}

/* Remove o contorno de foco azul que alguns navegadores colocam */
#table-tools-container button:focus, #editor-title:focus {
    outline: none !important;
    box-shadow: none !important;
}

/* BLINDAGEM TOTAL DA INTERFACE */
#table-tools-container, 
#table-tools-container button, 
#editor-title {
    user-select: none !important;
    -webkit-user-select: none !important;
    -moz-user-select: none !important;
    -ms-user-select: none !important;
    
    /* Impede que o navegador trate como área de texto */
    -webkit-user-modify: read-only !important; 
    
    /* Força o cursor de seta, impedindo o cursor de "I" de digitação */
    cursor: default !important;
    pointer-events: auto !important;
}

#table-tools-container button {
    cursor: pointer !important; /* Botões continuam com a mãozinha */
}

/* Remove qualquer contorno de foco ou corretor ortográfico */
#table-tools-container button:focus, 
#editor-title:focus {
    outline: none !important;
}

// Função para bloquear qualquer tentativa de escrita nos controles
const bloquearEdicaoInterface = (e) => {
    const alvo = e.target.closest('#table-tools-container') || e.target.closest('#editor-title');
    if (alvo) {
        // Bloqueia teclas de digitação, Enter, Espaço e Apagar
        // Mas permite cliques (que não disparam keydown de caracteres)
        if (e.type === 'keydown' || e.type === 'keypress' || e.type === 'input') {
            e.preventDefault();
            e.stopImmediatePropagation();
        }
    }
};

// Aplica o bloqueio em múltiplos eventos para garantir segurança total
['keydown', 'keypress', 'input', 'paste', 'beforeinput'].forEach(event => {
    document.addEventListener(event, bloquearEdicaoInterface, true);
});

function renderizarArvore(filtro = "") {
    const container = document.getElementById('tree-container');
    container.innerHTML = '';

    // --- NÍVEL 1: PAIS ---
    const pais = allDocs.filter(d => d.categoria === 'pai').sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
    
    pais.forEach(p => {
        const pDiv = document.createElement('div');
        pDiv.className = 'tree-node';
        
        // Verifica se este pai deve estar aberto (se é o pai do item selecionado ou se é um Pai padrão)
        const isParentOfSelected = currentManualTopic && (currentManualTopic.categoriaPai === p.nome || currentManualTopic.nome === p.nome);
        const isOpenP = isParentOfSelected ? 'open' : 'open'; // Mantemos 'open' pois você quer os pais sempre abertos
        const iconP = '▼';

        const isActiveP = (currentManualTopic && currentManualTopic.id === p.id) ? 'active' : '';
        const pBranch = document.createElement('div');
        pBranch.className = `tree-branch ${isOpenP}`; 

        pDiv.innerHTML = `
            <div style="display: flex; align-items: center;">
                <span class="toggle-icon" onclick="toggleBranch(this)">${iconP}</span>
                <span class="tree-label ${isActiveP}" data-id="${p.id}" onclick="selecionarTopico('${p.id}')">📂 ${p.nome}</span>
            </div>`;
        
        // --- NÍVEL 2: FILHOS ---
        const filhos = allDocs.filter(d => d.categoria === 'filho' && d.categoriaPai === p.nome).sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
        
        filhos.forEach(f => {
            const fDiv = document.createElement('div');
            fDiv.className = 'tree-node';
            
            // LÓGICA DE PERSISTÊNCIA: Verifica se este Filho é pai do item selecionado
            const isParentOfSelectedF = currentManualTopic && (currentManualTopic.categoriaFilho === f.nome || currentManualTopic.nome === f.nome);
            const isOpenF = isParentOfSelectedF ? 'open' : ''; 
            const iconF = isParentOfSelectedF ? '▼' : '▶';

            const isActiveF = (currentManualTopic && currentManualTopic.id === f.id) ? 'active' : '';
            const fBranch = document.createElement('div');
            fBranch.className = `tree-branch ${isOpenF}`; 

            fDiv.innerHTML = `
                <div style="display: flex; align-items: center;">
                    <span class="toggle-icon" onclick="toggleBranch(this)">${iconF}</span>
                    <span class="tree-label ${isActiveF}" data-id="${f.id}" onclick="selecionarTopico('${f.id}')">📄 ${f.nome}</span>
                </div>`;
            
            // --- NÍVEL 3: NETOS ---
            const netos = allDocs.filter(d => d.categoria === 'neto' && d.categoriaFilho === f.nome && d.categoriaPai === p.nome).sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
            
            netos.forEach(n => {
                const nDiv = document.createElement('div');
                nDiv.className = 'tree-node';

                // LÓGICA DE PERSISTÊNCIA: Verifica se este Neto é pai do Bisneto selecionado
                const isParentOfSelectedN = currentManualTopic && (currentManualTopic.categoriaNeto === n.nome || currentManualTopic.nome === n.nome);
                const isOpenN = isParentOfSelectedN ? 'open' : '';
                const iconN = isParentOfSelectedN ? '▼' : '▶';

                const isActiveN = (currentManualTopic && currentManualTopic.id === n.id) ? 'active' : '';
                const nBranch = document.createElement('div');
                nBranch.className = `tree-branch ${isOpenN}`;

                nDiv.innerHTML = `
                    <div style="display: flex; align-items: center;">
                        <span class="toggle-icon" onclick="toggleBranch(this)">${iconN}</span>
                        <span class="tree-label ${isActiveN}" data-id="${n.id}" onclick="selecionarTopico('${n.id}')">📜 ${n.nome}</span>
                    </div>`;
                
                // --- NÍVEL 4: BISNETOS ---
                const bisnetos = allDocs.filter(d => d.categoria === 'bisneto' && d.categoriaNeto === n.nome).sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
                
                bisnetos.forEach(b => {
                    const isActiveB = (currentManualTopic && currentManualTopic.id === b.id) ? 'active' : '';
                    const bDiv = document.createElement('div');
                    bDiv.className = 'tree-node';
                    bDiv.style.borderLeft = "none";
                    bDiv.innerHTML = `
                        <div style="display: flex; align-items: center; padding-left: 12px;">
                            <span class="tree-label ${isActiveB}" data-id="${b.id}" onclick="selecionarTopico('${b.id}')">└ ${b.nome}</span>
                        </div>`;
                    nBranch.appendChild(bDiv);
                });

                if(bisnetos.length > 0) nDiv.appendChild(nBranch);
                else nDiv.querySelector('.toggle-icon').style.visibility = 'hidden';
                fBranch.appendChild(nDiv);
            });

            if(netos.length > 0) fDiv.appendChild(fBranch);
            else fDiv.querySelector('.toggle-icon').style.visibility = 'hidden';
            pBranch.appendChild(fDiv);
        });

        if(filhos.length > 0) pDiv.appendChild(pBranch);
        else pDiv.querySelector('.toggle-icon').style.visibility = 'hidden';
        container.appendChild(pDiv);
    });
}

    renderizarConteudoAba(abaAtiva);

function renderizarConteudoAba(aba) {
    const container = document.getElementById('tab-content');
    container.innerHTML = "";

    // Unificar o que será exibido
    let itensParaExibir = [];

    if (aba === 'tudo' || aba === 'posts') {
        currentViewData.posts.forEach(p => itensParaExibir.push({ ...p, type: 'post' }));
    }
    
    const colecoes = ['legislacoes', 'construcoes', 'acoes', 'midia'];
    colecoes.forEach(col => {
        if (aba === 'tudo' || aba === col) {
            currentViewData[col].forEach(item => itensParaExibir.push({ ...item, type: 'gestao', colOrigem: col }));
        }
    });

    // Renderizar na tela
    itensParaExibir.forEach(item => {
        const isDone = item.status === 'done';
        const card = document.createElement('div');
        
        if (item.type === 'post') {
            card.className = `post-card ${isDone ? 'done-card' : ''}`;
            card.innerHTML = `
                <div class="card-check ${isDone ? 'checked' : ''}" onclick="openCheckModal('docs', '${item.id}', ${isDone})">${isDone ? '✅' : '⬜'}</div>
                <div style="margin-bottom:15px">${item.textoHtml || ''}</div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-edit" onclick="editarPostManual('${item.id}')">EDITAR</button>
                </div>`;
        } else {
            card.className = `item-row ${isDone ? 'done-card' : ''}`;
            card.style.flexDirection = "column";
            card.style.alignItems = "flex-start";
            card.innerHTML = `
                <div style="display:flex; width:100%; justify-content:space-between; align-items:center">
                    <div style="display:flex; align-items:center">
                        <div class="card-check ${isDone ? 'checked' : ''}" onclick="openCheckModal('${item.colOrigem}', '${item.id}', ${isDone})">${isDone ? '✅' : '⬜'}</div>
                        <strong style="color:var(--accent)">[${item.colOrigem.toUpperCase()}] ${item.nome}</strong>
                    </div>
                    <button class="btn btn-edit" onclick="abrirModalGestao('${item.colOrigem}', '${item.id}')">Ver Detalhes</button>
                </div>
                <p style="font-size:0.8rem; color:#94a3b8; margin: 10px 0 0 35px;">${item.descricao || ''}</p>
            `;
        }
        container.appendChild(card);
    });
}


async function executarToggleFinal(cell, novoEstado) {
    const userLogado = allUsers.find(u => u.id === currentUserId);
    const userName = userLogado ? userLogado.nome : "Membro";
    const row = cell.parentElement;

    if (novoEstado === true) {
        row.classList.add('row-done');
        cell.innerHTML = `✅<br><small style="font-size:0.65rem; display:block; line-height:1; font-weight:bold;">${userName}</small>`;
    } else {
        row.classList.remove('row-done');
        cell.innerHTML = "⬜";
    }

    // Salva no Firebase se estiver fora do editor
    const editorArea = document.getElementById('editor-area');
    if (editorArea.classList.contains('hidden')) {
        const postCard = cell.closest('.post-card');
        if (postCard) {
            const docId = postCard.getAttribute('data-id');
            const contentBody = postCard.querySelector('.post-content-body');
            try {
                await updateDoc(doc(db, "docs", docId), { textoHtml: contentBody.innerHTML });
            } catch (e) { console.error(e); }
        }
    }
}

    const branch = node.querySelector('.tree-branch');
    
    if (branch) {
        const isOpen = branch.classList.contains('open');
        if (isOpen) {
            branch.classList.remove('open');
            el.innerText = "▶";
        } else {
            branch.classList.add('open');
            el.innerText = "▼";
        }
    }
};

window.salvarPost = async () => {
    const html = document.getElementById('editor').innerHTML;
    
    // Validação básica: não permite salvar post vazio
    if (!html || html.trim() === "" || html === "<br>") {
        alert("O conteúdo não pode estar vazio.");
        return;
    }

    try {
        if (manualEditId) {
            // --- MODO EDIÇÃO ---
            await updateDoc(doc(db, "docs", manualEditId), { 
                textoHtml: html,
                updatedBy: currentUserId // Registra quem editou por último
            });
        } else {
            // --- MODO NOVO POST ---
            // Verifica se existe um "placeholder" (item na árvore que ainda não tem conteúdo)
            const placeholder = allDocs.find(d =>
                d.nome === currentManualTopic.nome &&
                d.categoria === currentManualTopic.categoria &&
                d.categoriaPai === (currentManualTopic.categoriaPai || null) &&
                d.categoriaFilho === (currentManualTopic.categoriaFilho || null) &&
                d.categoriaNeto === (currentManualTopic.categoriaNeto || null) &&
                (!d.textoHtml || d.textoHtml.trim() === "")
            );

            if (placeholder) {
                // Atualiza o placeholder existente
                await updateDoc(doc(db, "docs", placeholder.id), { 
                    textoHtml: html, 
                    createdAt: serverTimestamp(),
                    userId: currentUserId 
                });
            } else {
                // Cria um documento totalmente novo se necessário
                const novoPost = {
                    ...currentManualTopic,
                    textoHtml: html,
                    createdAt: serverTimestamp(),
                    userId: currentUserId
                };
                delete novoPost.id; // Remove o ID antigo para o Firebase gerar um novo
                await addDoc(collection(db, "docs"), novoPost);
            }
        }

        // --- LIMPEZA DA INTERFACE ---
        
        // 1. Esconde a área do editor
        document.getElementById('editor-area').classList.add('hidden');
        document.getElementById('editor').innerHTML = "";
        manualEditId = null; 

        // 2. Esconde as ferramentas de tabela (Topo e Fundo)
        document.getElementById('table-tools-container').style.display = 'none';
        if (document.getElementById('table-bottom-tools-container')) {
            document.getElementById('table-bottom-tools-container').style.display = 'none';
        }

        // --- ATUALIZAÇÃO E SINCRONIZAÇÃO ---

        // 3. Recarrega todos os documentos do banco para atualizar a árvore e a lista local
        await carregarTudo();

        // 4. Sincroniza o currentManualTopic com a nova versão baixada do banco
        if (currentManualTopic) {
            const versaoNova = allDocs.find(d => d.id === currentManualTopic.id);
            if (versaoNova) {
                currentManualTopic = versaoNova; // Atualiza a referência local
            }
            
            // 5. Re-seleciona o tópico para atualizar os posts na tela e manter o destaque na árvore
            selecionarTopico(currentManualTopic.id);
        }

        console.log("Post publicado e interface sincronizada.");

    } catch (e) {
        console.error("Erro ao salvar post:", e);
        alert("Erro técnico ao salvar. Verifique o console.");
    }
};

                vinculoInicial.neto = nome;

                vinculoInicial.neto = currentManualTopic.categoriaNeto;

        async function carregarParaEditarGestao(id) {
            const snap = await getDocs(collection(db, currentGestaoCol));
            const item = snap.docs.find(d => d.id === id).data();
            document.getElementById('m-nome').value = item.nome;
            document.getElementById('m-desc').value = item.descricao || "";
            if(item.vinculos) item.vinculos.forEach(v => addLinhaVinculo(v));
        }

        window.addLinhaVinculo = (data = null) => {
            const container = document.getElementById('vinculos-container');
            const rowId = "row-" + Date.now() + Math.random();
            const div = document.createElement('div');
            div.className = 'vinculo-row';
            div.id = rowId;
            div.innerHTML = `
                <button class="btn-remove-link" onclick="document.getElementById('${rowId}').remove()">×</button>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                    <div><label>Pai</label><select class="s-p"><option value="">Selecione...</option></select></div>
                    <div><label>Filho</label><select class="s-f" disabled><option value="">Selecione...</option></select></div>
                    <div><label>Neto</label><select class="s-n" disabled><option value="">Selecione...</option></select></div>
                    <div><label>Bisneto</label><select class="s-b" disabled><option value="">Selecione...</option></select></div>
                </div>
            `;
            container.appendChild(div);

            const sp = div.querySelector('.s-p'), sf = div.querySelector('.s-f'), sn = div.querySelector('.s-n'), sb = div.querySelector('.s-b');

            // 1. Popular Pais (docs com categoria "pai")
            const pais = allDocs.filter(d => d.categoria === 'pai').map(d => d.nome).sort();
            pais.forEach(p => sp.innerHTML += `<option value="${p}">${p}</option>`);

            sp.onchange = () => {
                const valP = sp.value;
                sf.innerHTML = '<option value="">Selecione...</option>';
                sf.disabled = !valP;
                if(valP) {
                    // Filhos: documentos que têm categoria "filho" e categoriaPai == valP
                    const filhos = allDocs.filter(d => d.categoria === 'filho' && d.categoriaPai === valP).map(d => d.nome).sort();
                    filhos.forEach(f => sf.innerHTML += `<option value="${f}">${f}</option>`);
                }
                sf.onchange();
            };

            sf.onchange = () => {
                const valP = sp.value, valF = sf.value;
                sn.innerHTML = '<option value="">Selecione...</option>';
                sn.disabled = !valF;
                if(valF) {
                    // Netos: documentos que têm categoria "neto", categoriaPai == valP e categoriaFilho == valF
                    const netos = allDocs.filter(d => d.categoria === 'neto' && d.categoriaPai === valP && d.categoriaFilho === valF).map(d => d.nome).sort();
                    netos.forEach(n => sn.innerHTML += `<option value="${n}">${n}</option>`);
                }
                sn.onchange();
            };

            sn.onchange = () => {
                const valP = sp.value, valF = sf.value, valN = sn.value;
                sb.innerHTML = '<option value="">Selecione...</option>';
                sb.disabled = !valN;
                if(valN) {
                    // Bisnetos: categoria "bisneto" e todos os pais batem
                    const bis = allDocs.filter(d => d.categoria === 'bisneto' && d.categoriaPai === valP && d.categoriaFilho === valF && d.categoriaNeto === valN).map(d => d.nome).sort();
                    bis.forEach(b => sb.innerHTML += `<option value="${b}">${b}</option>`);
                }
            };

            if(data) {
                sp.value = data.pai || ""; sp.onchange();
                sf.value = data.filho || ""; sf.onchange();
                sn.value = data.neto || ""; sn.onchange();
                sb.value = data.bisneto || "";
            }
        };

// Função para excluir post (opcional, mas recomendada)
window.excluirPostManual = async (id) => {
    const docParaExcluir = allDocs.find(x => x.id === id);
    if(!docParaExcluir) return;

    if(confirm("Deseja excluir permanentemente este post do manual?")) {
        // Busca todos os posts que pertencem a esta mesma categoria exata
        const postsDaMesmaCategoria = allDocs.filter(d =>
            d.nome === docParaExcluir.nome &&
            d.categoria === docParaExcluir.categoria &&
            d.categoriaPai === docParaExcluir.categoriaPai &&
            d.categoriaFilho === docParaExcluir.categoriaFilho &&
            d.categoriaNeto === docParaExcluir.categoriaNeto
        );

        try {
            if (postsDaMesmaCategoria.length > 1) {
                // Se existem outros posts para esta categoria, podemos apagar este documento
                await deleteDoc(doc(db, "docs", id));
                console.log("Documento removido (havia mais de um).");
            } else {
                // SE FOR O ÚLTIMO: Não apagamos o documento, apenas limpamos o conteúdo.
                // Isso mantém a categoria visível na árvore lateral.
                await updateDoc(doc(db, "docs", id), {
                    textoHtml: "",
                    status: "",
                    concluidoPor: ""
                });
                console.log("Conteúdo limpo, mas categoria preservada na árvore.");
            }

            // Recarregar dados e atualizar a tela
            await carregarTudo();
            selecionarTopico(currentManualTopic.id);
            
        } catch (e) {
            console.error("Erro ao excluir/limpar post:", e);
            alert("Erro ao processar exclusão.");
        }
    }
};

window.processarCheck = async (userName) => {
    const { col, docId } = currentTaskRef;
    const novosDados = userName ? { status: 'done', concluidoPor: userName } : { status: '', concluidoPor: '' };

    try {
        // 1. Grava no Firebase
        await updateDoc(doc(db, col, docId), novosDados);

        // 2. Atualiza o dado na nossa lista local (sem precisar baixar tudo de novo)
        const atualizarLocal = (lista) => {
            const item = lista.find(d => d.id === docId);

        const matchesPai = d.categoriaPai === docEncontrado.categoriaPai;
        const matchesFilho = d.categoriaFilho === docEncontrado.categoriaFilho;
        const matchesNeto = d.categoriaNeto === docEncontrado.categoriaNeto;
        return matchesNome && matchesCat && matchesPai && matchesFilho && matchesNeto;
    });
    console.log(`✅ Posts Encontrados (${currentViewData.posts.length}):`, currentViewData.posts);

    // 2. BUSCAR ANEXOS (Leis, Obras, etc)
    const colecoes = ['legislacoes', 'construcoes', 'acoes', 'midia'];

 for (const col of colecoes) {

                    if (docEncontrado.categoria === 'pai') {
                        match = (v.pai === docEncontrado.nome);
                    } 
                    else if (docEncontrado.categoria === 'filho') {
                        match = (v.pai === docEncontrado.categoriaPai && v.filho === docEncontrado.nome);
                    }
                    else if (docEncontrado.categoria === 'neto') {
                        // LOG DE DIAGNÓSTICO PARA NETO
                        match = (v.pai === docEncontrado.categoriaPai && 
                                 v.filho === docEncontrado.categoriaFilho && 
                                 v.neto === docEncontrado.nome);
                        
                        // Se não bateu, vamos ver o que tem no banco vs o que clicamos
                        if (!match && v.neto === docEncontrado.nome) {

                        match = (v.pai === docEncontrado.categoriaPai && 
                                 v.filho === docEncontrado.categoriaFilho && 
                                 v.neto === docEncontrado.categoriaNeto && 
                                 v.bisneto === docEncontrado.nome);
                    }

                    return match;
                });
            });

            console.log(`✅ Finalizado ${col}: ${currentViewData[col].length} itens encontrados.`);

        } catch (e) {
            console.error(`❌ Erro em ${col}:`, e);
            currentViewData[col] = [];

    if (aba === 'tudo') {
        currentViewData.posts.forEach(p => itensParaExibir.push({ ...p, type: 'post' }));

    // 2. Coleta os itens das outras coleções (Leis, Obras, etc)
    const colecoes = ['legislacoes', 'construcoes', 'acoes', 'midia'];
    colecoes.forEach(col => {
        if (aba === 'tudo' || aba === col) {
            currentViewData[col].forEach(item => itensParaExibir.push({ ...item, type: 'gestao', colOrigem: col }));

    itensParaExibir.sort((a, b) => {
        // Pega o tempo em segundos ou usa 0 se não houver data definida
        const timeA = a.createdAt?.seconds || 0;
        const timeB = b.createdAt?.seconds || 0;
        
        // Ordem crescente (Antigo -> Novo)

// Monitora a seleção de texto no documento
document.addEventListener('selectionchange', () => {
    const selection = window.getSelection();
    
    if (selection.rangeCount > 0) {
        const range = selection.getRangeAt(0);
        
        // Encontra o elemento onde a seleção começou e onde terminou
        const startNode = range.startContainer.nodeType === 3 ? range.startContainer.parentElement : range.startContainer;
        const endNode = range.endContainer.nodeType === 3 ? range.endContainer.parentElement : range.endContainer;

        // Verifica se ambos estão dentro de uma tabela
        const startRow = startNode.closest('tr');
        const endRow = endNode.closest('tr');

        // LÓGICA DE BLOQUEIO:
        // Se a seleção começou em uma linha e terminou em outra (ou fora dela)
        if (startRow) {
            if (startRow !== endRow) {
                // Cancela a seleção cruzada
                selection.collapseToStart();
                console.warn("⚠️ Seleção bloqueada: Não é permitido selecionar múltiplas linhas ou cabeçalhos.");
            }
        }
    }
});


document.getElementById('dynamic-list').addEventListener('mousedown', (e) => {

    rowSelectionStarted = e.target.closest('tr');
});

document.addEventListener('mouseup', () => {
    const selection = window.getSelection();
    if (selection.isCollapsed) return; // Se for só um clique, não faz nada

    const range = selection.getRangeAt(0);
    const ancestor = range.commonAncestorContainer;
    const ancestorElement = ancestor.nodeType === 3 ? ancestor.parentElement : ancestor;

    // Se a seleção terminou englobando mais do que uma única célula ou linha
    if (ancestorElement.tagName === 'TR' || ancestorElement.tagName === 'TBODY' || ancestorElement.tagName === 'TABLE') {
        // Se a seleção for "suja" (pegou mais de uma célula), nós limpamos
        if (range.startContainer.parentElement.closest('td') !== range.endContainer.parentElement.closest('td')) {
            selection.removeAllRanges();
            console.warn("Seleção multi-célula bloqueada para manter a estrutura.");
        }
    }
    rowSelectionStarted = null;
});

        const selection = window.getSelection();
        if (!selection.isCollapsed) {
            // removeAllRanges limpa a seleção sem dar o "pulo" de foco do collapseToStart
            selection.removeAllRanges(); 
        }
    }
});

// 3. Reseta ao soltar o botão
document.addEventListener('mouseup', () => {
    isSelecting = false;
    cellDeOrigem = null;
});

// BLOQUEIO DE DELEÇÃO DE LINHAS PELO TECLADO
document.getElementById('editor').addEventListener('keydown', (e) => {
    const selection = window.getSelection();
    if (!selection.rangeCount) return;

    // Encontra onde o cursor ou a seleção está
    const container = selection.anchorNode.nodeType === 3 ? selection.anchorNode.parentElement : selection.anchorNode;
    
    // 1. Verifica se o usuário está tentando digitar DENTRO de um TH ou THEAD
    if (container.closest('thead') || container.closest('th')) {
        // Permitir apenas teclas de navegação (setas)
        const permitidas = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Tab'];
        if (!permitidas.includes(e.key)) {
            e.preventDefault();
            console.log("%c🚫 BLOQUEADO: Tentativa de editar o cabeçalho!", "color: red; font-weight: bold;");
            return;
        }
    }

    // 2. Proteção Extra: Se a seleção for a tabela inteira e o usuário tentar digitar
    const range = selection.getRangeAt(0);
    const fragment = range.cloneContents();
    if (fragment.querySelector('thead') || fragment.querySelector('th')) {
        if (e.key.length === 1 || ['Backspace', 'Delete', 'Enter'].includes(e.key)) {
            e.preventDefault();
            console.log("%c🚫 BLOQUEADO: Seleção envolve cabeçalho. Substituição negada.", "background: red; color: white;");
            return;
        }
    }
}, true);



// Reforço: Impede recortar (Ctrl+X) se a seleção envolver a estrutura da tabela
document.getElementById('editor').addEventListener('cut', (e) => {
    const selection = window.getSelection();
    const container = selection.getRangeAt(0).commonAncestorContainer;
    const element = container.nodeType === 3 ? container.parentElement : container;

    if (element.closest('table') && (element.tagName === 'TR' || element.tagName === 'TBODY' || element.tagName === 'TABLE')) {
        e.preventDefault();
        alert("Para remover linhas, use o botão específico.");
    }
});


// FORÇAR COLAGEM COMO TEXTO SIMPLES (REMOVE FORMATAÇÃO EXTERNA)
document.getElementById('editor').addEventListener('paste', (e) => {
    const selection = window.getSelection();
    if (!selection.rangeCount) return;

    const range = selection.getRangeAt(0);
    
    // Identifica as células de início e fim da seleção
    const startCell = range.startContainer.nodeType === 3 ? range.startContainer.parentElement.closest('td') : range.startContainer.closest('td');
    const endCell = range.endContainer.nodeType === 3 ? range.endContainer.parentElement.closest('td') : range.endContainer.closest('td');

    // Se a seleção cruzar fronteiras de células, bloqueia a colagem
    if (startCell !== endCell) {
        e.preventDefault();
        console.log("%c🚫 COLAGEM BLOQUEADA: Seleção cruzada detectada. Não é permitido sobrescrever a estrutura!", "background: red; color: white; padding: 2px 5px;");
        alert("Ação Bloqueada: Você não pode colar sobre várias células ao mesmo tempo para não quebrar a tabela.");
        return;
    }

    // Se estiver tudo ok (uma única célula), prossegue com o texto simples
    e.preventDefault();
    const text = (e.originalEvent || e).clipboardData.getData('text/plain');
    document.execCommand('insertText', false, text);
    console.log("%c✅ COLAGEM PERMITIDA: Texto simples inserido na célula.", "color: green;");
});

// BLOQUEIO TOTAL DE INPUT EM ÁREAS PROIBIDAS (BOTÕES E TÍTULOS)
document.addEventListener('keydown', (e) => {
    // 1. Verifica se o elemento que recebeu o clique/foco é um botão de ferramenta ou o título
    const areaProibida = e.target.closest('#table-tools-container') || e.target.closest('#editor-title');
    
    if (areaProibida) {
        // Se for uma tecla de comando (como F5, ou setas), permite. 
        // Se for letra, número, Enter, Backspace ou Delete, BLOQUEIA.
        const teclasDeEscrita = e.key.length === 1 || ['Enter', 'Backspace', 'Delete'].includes(e.key);
        
        if (teclasDeEscrita) {
            e.preventDefault();
            e.stopPropagation();
            console.warn("🛡️ Bloqueio de Segurança: Tentativa de editar interface protegida.");
        }
    }
}, true); // O 'true' garante que o JS capture o evento antes do navegador agir

// BLOQUEIO TOTAL DE EDIÇÃO EM ÁREAS DE INTERFACE (BOTÕES E TÍTULOS)
['keydown', 'input', 'beforeinput'].forEach(eventType => {
    document.addEventListener(eventType, (e) => {
        // Verifica se o alvo do evento é a área dos botões ou o título
        const areaProtegida = e.target.closest('#table-tools-container') || e.target.closest('#editor-title');
        
        if (areaProtegida) {
            // Se o usuário tentar digitar, dar enter ou apagar (backspace/delete)
            const teclasProibidas = e.key.length === 1 || ['Enter', 'Backspace', 'Delete'].includes(e.key);
            
            if (teclasProibidas) {
                e.preventDefault();
                e.stopImmediatePropagation();
            }
        }
    }, true); // O 'true' captura o evento antes dele chegar ao editor
});

// Impede que o usuário "arraste" conteúdo para dentro dos botões
document.addEventListener('drop', (e) => {
    if (e.target.closest('#table-tools-container') || e.target.closest('#editor-title')) {
        e.preventDefault();
    }
}, true);

// --- SISTEMA DE PROTEÇÃO ANTI-EDIÇÃO DE INTERFACE ---

const bloquearAcoesProibidas = (e) => {
    // Identifica se o evento ocorreu dentro de alguma área que deve ser protegida
    const alvoProtegido = e.target.closest('#table-tools-container') || 
                         e.target.closest('#table-bottom-tools-container') || 
                         e.target.closest('#editor-title');
    
    if (alvoProtegido) {
        // Lista de eventos que tentam modificar o conteúdo
        const eventosDeModificacao = ['keydown', 'keypress', 'input', 'paste', 'beforeinput'];

        if (eventosDeModificacao.includes(e.type)) {
            // Bloqueia se for uma tecla de caractere (length 1) ou teclas de edição (Enter, Back, Del)
            // Permite teclas de comando puras (como F5, setas de navegação, Tab)
            if (e.key && (e.key.length === 1 || ['Enter', 'Backspace', 'Delete'].includes(e.key))) {
                e.preventDefault();
                e.stopImmediatePropagation(); // Impede que outros scripts processem a tecla
                console.warn("🛡️ Interface Blindada: Edição de controles proibida.");
            }
        }
    }
};

// Aplica a proteção em todos os eventos de entrada de dados
// O uso do 'true' no final (capture phase) garante que o bloqueio ocorra antes de qualquer outra ação
['keydown', 'keypress', 'input', 'paste', 'beforeinput'].forEach(event => {
    document.addEventListener(event, bloquearAcoesProibidas, true);
});

// Impede que o usuário arraste e solte (drag and drop) textos ou arquivos para dentro dos botões
document.addEventListener('drop', (e) => {
    if (e.target.closest('#table-tools-container') || 
        e.target.closest('#table-bottom-tools-container') || 
        e.target.closest('#editor-title')) {
        e.preventDefault();
        e.stopImmediatePropagation();
    }
}, true);

// "Ejetor de Foco": Se por algum erro do navegador o cursor de texto (caret) 
// entrar no título ou nos botões, ele é expulso de volta para o editor principal.
document.addEventListener('focusin', (e) => {
    const alvo = e.target.closest('#editor-title') || 
                 e.target.closest('#table-tools-container') || 
                 e.target.closest('#table-bottom-tools-container');
                 
    if (alvo) {
        const editorPrincipal = document.getElementById('editor');
        if (editorPrincipal) {
            // Pequeno delay para garantir que o navegador processe o foco antes de mover
            setTimeout(() => editorPrincipal.focus(), 10);
        }
    }
}, true);



    </script>
