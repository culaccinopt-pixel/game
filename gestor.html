        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDPLJ4Ln3Ton-DxsJ0tEKeioWHnV01Plo0",
            authDomain: "politicalgame-30215.firebaseapp.com",
            projectId: "politicalgame-30215",
            storageBucket: "politicalgame-30215.firebasestorage.app",
            messagingSenderId: "736655823319",
            appId: "1:736655823319:web:60ebdc530e101784b9bb92"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allDocs = [];
        let currentManualTopic = null;
        let manualEditId = null;
        let currentGestaoCol = "";
        let gestaoEditId = null;
let allUsers = [];
let currentTaskRef = null;
let currentViewData = { posts: [], legislacoes: [], construcoes: [], acoes: [], midia: [] };

async function carregarTudo() {
    // Busca os documentos do manual
    const snapManual = await getDocs(query(collection(db, "docs"), orderBy("createdAt", "asc")));
    allDocs = snapManual.docs.map(d => ({id: d.id, ...d.data()}));

    // Busca os usuários para o check
    const uSnap = await getDocs(collection(db, "users"));
    allUsers = uSnap.docs.map(d => ({id: d.id, nome: d.data().nome}));

    renderizarArvore();
}

        // --- LÓGICA DE PESQUISA ---
document.getElementById('search-manual').addEventListener('input', (e) => {
    const termo = e.target.value.toLowerCase();
    if (termo.length > 0) {
        renderizarArvore(termo); // Passa o termo para a função de renderização
    } else {
        renderizarArvore(); // Volta ao normal
    }
});

// --- LÓGICA DE COLAPSAR LISTA ---
document.getElementById('btn-toggle-tree').addEventListener('click', () => {
    const container = document.getElementById('tree-container');
    const btn = document.getElementById('btn-toggle-tree');
    
    if (container.style.display === "none") {
        container.style.display = "block";
        btn.innerText = "👁️";
        btn.style.opacity = "1";
    } else {
        container.style.display = "none";
        btn.innerText = "🙈";
        btn.style.opacity = "0.5";
    }
});


function renderizarArvore(filtro = "") {
    const container = document.getElementById('tree-container');
    container.innerHTML = '';

    if (filtro !== "") {
        const resultados = allDocs.filter(d => d.nome.toLowerCase().includes(filtro));
        resultados.forEach(res => {
            const div = document.createElement('div');
            div.className = 'tree-node';
            div.innerHTML = `<span class="tree-label" onclick="selecionarTopico('${res.id}')">🔍 ${res.nome}</span>`;
            container.appendChild(div);
        });
        return;
    }

    // Nível 1: PAIS
    const pais = allDocs.filter(d => d.categoria === 'pai').sort((a, b) => a.ordem - b.ordem);
    pais.forEach(p => {
        const pDiv = document.createElement('div');
        pDiv.className = 'tree-node';
        
        // Contêiner para os filhos do Pai
        const pBranch = document.createElement('div');
        pBranch.className = 'tree-branch open'; // PAI E FILHO ABERTOS POR PADRÃO
        
        pDiv.innerHTML = `<span class="toggle-icon" onclick="toggleBranch(this)">▼</span>
                          <span class="tree-label" style="display:inline" onclick="selecionarTopico('${p.id}')">📁 ${p.nome}</span>`;
        
        // Nível 2: FILHOS
        const filhos = allDocs.filter(d => d.categoria === 'filho' && d.categoriaPai === p.nome).sort((a, b) => a.ordem - b.ordem);
        filhos.forEach(f => {
            const fDiv = document.createElement('div');
            fDiv.className = 'tree-node';
            
            // Contêiner para os netos do Filho
            const fBranch = document.createElement('div');
            fBranch.className = 'tree-branch'; // NETO FECHADO POR PADRÃO
            
            fDiv.innerHTML = `<span class="toggle-icon" onclick="toggleBranch(this)">▶</span>
                              <span class="tree-label" style="display:inline" onclick="selecionarTopico('${f.id}')">📄 ${f.nome}</span>`;
            
            // Nível 3: NETOS
            const netos = allDocs.filter(d => d.categoria === 'neto' && d.categoriaFilho === f.nome && d.categoriaPai === p.nome).sort((a, b) => a.ordem - b.ordem);
            netos.forEach(n => {
                const nDiv = document.createElement('div');
                nDiv.className = 'tree-node';
                
                const nBranch = document.createElement('div');
                nBranch.className = 'tree-branch'; // BISNETO FECHADO POR PADRÃO
                
                nDiv.innerHTML = `<span class="toggle-icon" onclick="toggleBranch(this)">▶</span>
                                  <span class="tree-label" style="display:inline" onclick="selecionarTopico('${n.id}')">📜 ${n.nome}</span>`;
                
                // Nível 4: BISNETOS
                const bisnetos = allDocs.filter(d => d.categoria === 'bisneto' && d.categoriaNeto === n.nome).sort((a, b) => a.ordem - b.ordem);
                bisnetos.forEach(b => {
                    const bDiv = document.createElement('div');
                    bDiv.className = 'tree-node';
                    bDiv.style.marginLeft = "15px";
                    bDiv.innerHTML = `<span class="tree-label" onclick="selecionarTopico('${b.id}')">└ ${b.nome}</span>`;
                    nBranch.appendChild(bDiv);
                });

                if(bisnetos.length > 0) nDiv.appendChild(nBranch);
                else nDiv.querySelector('.toggle-icon').style.visibility = 'hidden';
                
                fBranch.appendChild(nDiv);
            });

            if(netos.length > 0) fDiv.appendChild(fBranch);
            else fDiv.querySelector('.toggle-icon').style.visibility = 'hidden';

            pBranch.appendChild(fDiv);
        });

        pDiv.appendChild(pBranch);
        container.appendChild(pDiv);
    });
}

function renderizarPaginaTopico(abaAtiva) {
    const list = document.getElementById('dynamic-list');
    
    // Header
    let html = `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #1e293b; padding: 15px; border-radius: 8px; border: 1px solid var(--border);">
            <div>
                <h3 style="margin:0; color:var(--accent)">${currentManualTopic.nome}</h3>
                <small style="color:gray">${currentManualTopic.categoria.toUpperCase()}</small>
            </div>
            <button class="btn btn-add" onclick="abrirEditorNovoPost()" style="padding: 8px 20px; height: auto;">+ POST</button>
        </div>
    `;

    // Renderizar Submenu de Abas
    html += `<div class="tabs-container">`;
    html += `<button class="tab-btn ${abaAtiva === 'tudo' ? 'active' : ''}" onclick="renderizarPaginaTopico('tudo')">Tudo</button>`;
    
    const labels = { legislacoes: 'Leis', construcoes: 'Construções', acoes: 'Ações', midia: 'Mídia' };
    
    for (const key in labels) {
        const qtd = currentViewData[key].length;
        if (qtd > 0) {
            html += `
                <button class="tab-btn ${abaAtiva === key ? 'active' : ''}" onclick="renderizarPaginaTopico('${key}')">
                    ${labels[key]} <span class="badge-count">${qtd}</span>
                </button>`;
        }
    }
    html += `</div><div id="tab-content"></div>`;
    list.innerHTML = html;

    renderizarConteudoAba(abaAtiva);
}

function renderizarConteudoAba(aba) {
    const container = document.getElementById('tab-content');
    container.innerHTML = "";

    // Unificar o que será exibido
    let itensParaExibir = [];

    if (aba === 'tudo' || aba === 'posts') {
        currentViewData.posts.forEach(p => itensParaExibir.push({ ...p, type: 'post' }));
    }
    
    const colecoes = ['legislacoes', 'construcoes', 'acoes', 'midia'];
    colecoes.forEach(col => {
        if (aba === 'tudo' || aba === col) {
            currentViewData[col].forEach(item => itensParaExibir.push({ ...item, type: 'gestao', colOrigem: col }));
        }
    });

    // Renderizar na tela
    itensParaExibir.forEach(item => {
        const isDone = item.status === 'done';
        const card = document.createElement('div');
        
        if (item.type === 'post') {
            card.className = `post-card ${isDone ? 'done-card' : ''}`;
            card.innerHTML = `
                <div class="card-check ${isDone ? 'checked' : ''}" onclick="openCheckModal('docs', '${item.id}', ${isDone})">${isDone ? '✅' : '✔️'}</div>
                <div style="margin-bottom:15px">${item.textoHtml || ''}</div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-edit" onclick="editarPostManual('${item.id}')">EDITAR</button>
                </div>`;
        } else {
            card.className = `item-row ${isDone ? 'done-card' : ''}`;
            card.style.flexDirection = "column";
            card.style.alignItems = "flex-start";
            card.innerHTML = `
                <div style="display:flex; width:100%; justify-content:space-between; align-items:center">
                    <div style="display:flex; align-items:center">
                        <div class="card-check ${isDone ? 'checked' : ''}" onclick="openCheckModal('${item.colOrigem}', '${item.id}', ${isDone})">${isDone ? '✅' : '✔️'}</div>
                        <strong style="color:var(--accent)">[${item.colOrigem.toUpperCase()}] ${item.nome}</strong>
                    </div>
                    <button class="btn btn-edit" onclick="abrirModalGestao('${item.colOrigem}', '${item.id}')">Ver Detalhes</button>
                </div>
                <p style="font-size:0.8rem; color:#94a3b8; margin: 10px 0 0 35px;">${item.descricao || ''}</p>
            `;
        }
        container.appendChild(card);
    });
}

window.abrirModalGestao = (col, id = null) => {
    currentGestaoCol = col;
    gestaoEditId = id;
    
    // 1. Montar o título dinâmico com a hierarquia
    let tituloBreadcrumb = "Item";
    if (currentManualTopic) {
        let partes = [];
        // Adicionamos os nomes conforme a hierarquia existente
        if (currentManualTopic.categoriaPai) partes.push(currentManualTopic.categoriaPai);
        if (currentManualTopic.categoriaFilho) partes.push(currentManualTopic.categoriaFilho);
        if (currentManualTopic.categoriaNeto) partes.push(currentManualTopic.categoriaNeto);
        
        // O nome do tópico atual (seja ele pai, filho, neto ou bisneto)
        partes.push(currentManualTopic.nome);
        
        tituloBreadcrumb = "Item: " + partes.join(" > ");
    }

    // 2. Aplicar o título no HTML
    const modalTitleEl = document.getElementById('modal-title');
    modalTitleEl.innerText = tituloBreadcrumb;
    modalTitleEl.style.fontSize = "0.85rem"; // Ajuste para caber nomes longos
    modalTitleEl.style.color = "var(--accent)";

    // 3. Abrir o modal e limpar/preencher campos
    document.getElementById('modal').classList.add('active');
    document.getElementById('vinculos-container').innerHTML = '';

    if(!id) {
        // NOVO ITEM
        document.getElementById('m-nome').value = "";
        document.getElementById('m-desc').value = "";

        let vinculoInicial = null;
        if (currentManualTopic) {
            vinculoInicial = { pai: "", filho: "", neto: "", bisneto: "" };
            const cat = currentManualTopic.categoria;
            const nome = currentManualTopic.nome;

            if (cat === 'pai') {
                vinculoInicial.pai = nome;
            } else if (cat === 'filho') {
                vinculoInicial.pai = currentManualTopic.categoriaPai;
                vinculoInicial.filho = nome;
            } else if (cat === 'neto') {
                vinculoInicial.pai = currentManualTopic.categoriaPai;
                vinculoInicial.filho = currentManualTopic.categoriaFilho;
                vinculoInicial.neto = nome;
            } else if (cat === 'bisneto') {
                vinculoInicial.pai = currentManualTopic.categoriaPai;
                vinculoInicial.filho = currentManualTopic.categoriaFilho;
                vinculoInicial.neto = currentManualTopic.categoriaNeto;
                vinculoInicial.bisneto = nome;
            }
        }
        addLinhaVinculo(vinculoInicial);
    } else {
        // EDIÇÃO
        carregarParaEditarGestao(id);
    }
};

        async function carregarParaEditarGestao(id) {
            const snap = await getDocs(collection(db, currentGestaoCol));
            const item = snap.docs.find(d => d.id === id).data();
            document.getElementById('m-nome').value = item.nome;
            document.getElementById('m-desc').value = item.descricao || "";
            if(item.vinculos) item.vinculos.forEach(v => addLinhaVinculo(v));
        }

        window.addLinhaVinculo = (data = null) => {
            const container = document.getElementById('vinculos-container');
            const rowId = "row-" + Date.now() + Math.random();
            const div = document.createElement('div');
            div.className = 'vinculo-row';
            div.id = rowId;
            div.innerHTML = `
                <button class="btn-remove-link" onclick="document.getElementById('${rowId}').remove()">×</button>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                    <div><label>Pai</label><select class="s-p"><option value="">Selecione...</option></select></div>
                    <div><label>Filho</label><select class="s-f" disabled><option value="">Selecione...</option></select></div>
                    <div><label>Neto</label><select class="s-n" disabled><option value="">Selecione...</option></select></div>
                    <div><label>Bisneto</label><select class="s-b" disabled><option value="">Selecione...</option></select></div>
                </div>
            `;
            container.appendChild(div);

            const sp = div.querySelector('.s-p'), sf = div.querySelector('.s-f'), sn = div.querySelector('.s-n'), sb = div.querySelector('.s-b');

            // 1. Popular Pais (docs com categoria "pai")
            const pais = allDocs.filter(d => d.categoria === 'pai').map(d => d.nome).sort();
            pais.forEach(p => sp.innerHTML += `<option value="${p}">${p}</option>`);

            sp.onchange = () => {
                const valP = sp.value;
                sf.innerHTML = '<option value="">Selecione...</option>';
                sf.disabled = !valP;
                if(valP) {
                    // Filhos: documentos que têm categoria "filho" e categoriaPai == valP
                    const filhos = allDocs.filter(d => d.categoria === 'filho' && d.categoriaPai === valP).map(d => d.nome).sort();
                    filhos.forEach(f => sf.innerHTML += `<option value="${f}">${f}</option>`);
                }
                sf.onchange();
            };

            sf.onchange = () => {
                const valP = sp.value, valF = sf.value;
                sn.innerHTML = '<option value="">Selecione...</option>';
                sn.disabled = !valF;
                if(valF) {
                    // Netos: documentos que têm categoria "neto", categoriaPai == valP e categoriaFilho == valF
                    const netos = allDocs.filter(d => d.categoria === 'neto' && d.categoriaPai === valP && d.categoriaFilho === valF).map(d => d.nome).sort();
                    netos.forEach(n => sn.innerHTML += `<option value="${n}">${n}</option>`);
                }
                sn.onchange();
            };

            sn.onchange = () => {
                const valP = sp.value, valF = sf.value, valN = sn.value;
                sb.innerHTML = '<option value="">Selecione...</option>';
                sb.disabled = !valN;
                if(valN) {
                    // Bisnetos: categoria "bisneto" e todos os pais batem
                    const bis = allDocs.filter(d => d.categoria === 'bisneto' && d.categoriaPai === valP && d.categoriaFilho === valF && d.categoriaNeto === valN).map(d => d.nome).sort();
                    bis.forEach(b => sb.innerHTML += `<option value="${b}">${b}</option>`);
                }
            };

            if(data) {
                sp.value = data.pai || ""; sp.onchange();
                sf.value = data.filho || ""; sf.onchange();
                sn.value = data.neto || ""; sn.onchange();
                sb.value = data.bisneto || "";
            }
        };

window.processarCheck = async (userName) => {
    const { col, docId } = currentTaskRef;
    const novosDados = userName ? { status: 'done', concluidoPor: userName } : { status: '', concluidoPor: '' };

    try {
        // 1. Grava no Firebase
        await updateDoc(doc(db, col, docId), novosDados);

        // 2. Atualiza o dado na nossa lista local (sem precisar baixar tudo de novo)
        const atualizarLocal = (lista) => {
            const item = lista.find(d => d.id === docId);
            if (item) {
                item.status = novosDados.status;
                item.concluidoPor = novosDados.concluidoPor;
            }
        };
        atualizarLocal(allDocs);

        // 3. Fecha os modais de check
        fecharModaisCheck();
        
        // 4. Atualiza a visualização atual (sem recarregar a árvore)
        // Se o que foi alterado foi um POST do manual (coleção docs)
        if (col === 'docs' && currentManualTopic) {
            selecionarTopico(currentManualTopic.id);
        } 
        // Se o que foi alterado foi um item das listas da direita (Leis, Obras, etc)
        else if (currentGestaoCol === col) {
            listarItensGestao(currentGestaoCol);
        }

    } catch (e) {
        console.error("Erro ao processar check:", e);
        alert("Erro ao salvar alteração.");
    }
};

window.selecionarTopico = async (id) => {
    const docEncontrado = allDocs.find(d => d.id === id);
    if (!docEncontrado) return;

    currentManualTopic = docEncontrado;
    manualEditId = null;
    document.getElementById('editor-area').classList.add('hidden');

    // --- LOGS DE INÍCIO ---
    console.group("🔍 FILTRANDO CONTEÚDO PARA O TÓPICO");
    console.log("ID Selecionado:", id);
    console.log("Nome:", docEncontrado.nome);
    console.log("Categoria:", docEncontrado.categoria);
    console.log("Hierarquia Completa:", {
        pai: docEncontrado.categoriaPai || "N/A",
        filho: docEncontrado.categoriaFilho || "N/A",
        neto: docEncontrado.categoriaNeto || "N/A"
    });

    // 1. FILTRAR POSTS DO MANUAL (Docs)
    // Filtramos para garantir que o post pertence EXATAMENTE a este nível e linhagem
    currentViewData.posts = allDocs.filter(d => {
        const matchesNome = d.nome === docEncontrado.nome;
        const matchesCat = d.categoria === docEncontrado.categoria;
        const matchesPai = d.categoriaPai === docEncontrado.categoriaPai;
        const matchesFilho = d.categoriaFilho === docEncontrado.categoriaFilho;
        const matchesNeto = d.categoriaNeto === docEncontrado.categoriaNeto;
        return matchesNome && matchesCat && matchesPai && matchesFilho && matchesNeto;
    });
    console.log(`✅ Posts Encontrados (${currentViewData.posts.length}):`, currentViewData.posts);

    // 2. BUSCAR ANEXOS (Leis, Obras, etc)
    const colecoes = ['legislacoes', 'construcoes', 'acoes', 'midia'];
    document.getElementById('dynamic-list').innerHTML = "<p style='padding:20px; color:gray;'>Buscando anexos...</p>";

 for (const col of colecoes) {
        try {
            const snap = await getDocs(collection(db, col));
            const todosItensDaColecao = snap.docs.map(d => ({id: d.id, ...d.data()}));
            
            console.log(`--- Analisando coleção: ${col.toUpperCase()} ---`);

            currentViewData[col] = todosItensDaColecao.filter(item => {
                if (!item.vinculos || item.vinculos.length === 0) return false;

                return item.vinculos.some(v => {
                    let match = false;

                    if (docEncontrado.categoria === 'pai') {
                        match = (v.pai === docEncontrado.nome);
                    } 
                    else if (docEncontrado.categoria === 'filho') {
                        match = (v.pai === docEncontrado.categoriaPai && v.filho === docEncontrado.nome);
                    }
                    else if (docEncontrado.categoria === 'neto') {
                        // LOG DE DIAGNÓSTICO PARA NETO
                        match = (v.pai === docEncontrado.categoriaPai && 
                                 v.filho === docEncontrado.categoriaFilho && 
                                 v.neto === docEncontrado.nome);
                        
                        // Se não bateu, vamos ver o que tem no banco vs o que clicamos
                        if (!match && v.neto === docEncontrado.nome) {
                            console.warn(`⚠️ Quase deu Match em ${item.nome}! Nome do Neto bate, mas Pai ou Filho são diferentes.`);
                            console.log(`Esperado: Pai(${docEncontrado.categoriaPai}), Filho(${docEncontrado.categoriaFilho})`);
                            console.log(`No Banco: Pai(${v.pai}), Filho(${v.filho})`);
                        }
                    }
                    else if (docEncontrado.categoria === 'bisneto') {
                        match = (v.pai === docEncontrado.categoriaPai && 
                                 v.filho === docEncontrado.categoriaFilho && 
                                 v.neto === docEncontrado.categoriaNeto && 
                                 v.bisneto === docEncontrado.nome);
                    }

                    return match;
                });
            });

            console.log(`✅ Finalizado ${col}: ${currentViewData[col].length} itens encontrados.`);

        } catch (e) {
            console.error(`❌ Erro em ${col}:`, e);
            currentViewData[col] = [];
        }
    }

    console.groupEnd();
    window.renderizarPaginaTopico('tudo');
};


// EXPOSTA AO WINDOW PARA O ONCLICK FUNCIONAR
window.renderizarPaginaTopico = (abaAtiva) => {
    const list = document.getElementById('dynamic-list');
    
    let html = `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #1e293b; padding: 15px; border-radius: 8px; border: 1px solid var(--border);">
            <div>
                <h3 style="margin:0; color:var(--accent)">${currentManualTopic.nome}</h3>
                <small style="color:gray">${currentManualTopic.categoria.toUpperCase()}</small>
            </div>
            <button class="btn btn-add" onclick="abrirEditorNovoPost()" style="padding: 8px 20px; height: auto;">+ POST</button>
        </div>
    `;

    // Submenu de Abas
    html += `<div class="tabs-container" style="display:flex; gap:10px; margin-bottom:20px; border-bottom:1px solid #334155; padding-bottom:10px; overflow-x:auto;">`;
    
    // Aba Tudo sempre existe
    const activeStyle = "background:var(--accent); color:white; border-color:var(--accent);";
    const normalStyle = "background:#1e293b; color:#94a3b8; border:1px solid #334155;";
    
    html += `<button class="tab-btn" style="padding:8px 16px; border-radius:20px; cursor:pointer; font-size:0.8rem; ${abaAtiva === 'tudo' ? activeStyle : normalStyle}" onclick="renderizarPaginaTopico('tudo')">Tudo</button>`;
    
    const labels = { legislacoes: 'Leis', construcoes: 'Obras', acoes: 'Ações', midia: 'Mídia' };
    
    for (const key in labels) {
        const qtd = currentViewData[key].length;
        if (qtd > 0) {
            html += `
                <button class="tab-btn" style="padding:8px 16px; border-radius:20px; cursor:pointer; font-size:0.8rem; ${abaAtiva === key ? activeStyle : normalStyle}" onclick="renderizarPaginaTopico('${key}')">
                    ${labels[key]} <span style="background:rgba(0,0,0,0.3); padding:2px 6px; border-radius:10px; font-size:0.7rem;">${qtd}</span>
                </button>`;
        }
    }
    html += `</div><div id="tab-content"></div>`;
    list.innerHTML = html;

    window.renderizarConteudoAba(abaAtiva);
};

// EXPOSTA AO WINDOW
window.renderizarConteudoAba = (aba) => {
    const container = document.getElementById('tab-content');
    container.innerHTML = "";

    let itensParaExibir = [];

    // Adiciona os posts do manual se for "tudo" ou a aba "posts" (opcional)
    if (aba === 'tudo') {
        currentViewData.posts.forEach(p => itensParaExibir.push({ ...p, type: 'post' }));
    }

    // Adiciona itens das outras coleções
    const colecoes = ['legislacoes', 'construcoes', 'acoes', 'midia'];
    colecoes.forEach(col => {
        if (aba === 'tudo' || aba === col) {
            currentViewData[col].forEach(item => itensParaExibir.push({ ...item, type: 'gestao', colOrigem: col }));
        }
    });

    if (itensParaExibir.length === 0) {
        container.innerHTML = "<p style='color:gray; padding:20px;'>Nenhum item encontrado nesta categoria.</p>";
        return;
    }

    itensParaExibir.forEach(item => {
        const isDone = item.status === 'done';
        const card = document.createElement('div');
        
        if (item.type === 'post') {
            card.className = `post-card ${isDone ? 'done-card' : ''}`;
            card.innerHTML = `
                <div class="card-check ${isDone ? 'checked' : ''}" onclick="openCheckModal('docs', '${item.id}', ${isDone})">${isDone ? '✅' : '✔️'}</div>
                <div style="margin-bottom:15px">${item.textoHtml || ''}</div>
                <div style="display: flex; gap: 10px; border-top:1px solid #334155; padding-top:10px;">
                    <button class="btn btn-edit" onclick="editarPostManual('${item.id}')">EDITAR</button>
                    <button class="btn btn-delete" onclick="excluirPostManual('${item.id}')">EXCLUIR</button>
                </div>`;
        } else {
            // CARD DE GESTÃO (Leis, Obras, etc)
            card.className = `item-row ${isDone ? 'done-card' : ''}`;
            card.style.display = "block"; // Garante que a descrição fique embaixo
            
            // Define uma cor para o Badge baseada na coleção
            const cores = { legislacoes: '#6366f1', construcoes: '#f59e0b', acoes: '#16a34a', midia: '#ec4899' };
            const corBadge = cores[item.colOrigem] || 'var(--accent)';

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <div style="display:flex; align-items:center">
                        <!-- Checkbox -->
                        <div class="card-check ${isDone ? 'checked' : ''}" onclick="openCheckModal('${item.colOrigem}', '${item.id}', ${isDone})">
                            ${isDone ? '✅' : '✔️'}
                        </div>
                        
                        <!-- Badge da Categoria (O "card pequeno") -->
                        <span style="background: ${corBadge}; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: bold; margin: 0 12px; text-transform: uppercase; letter-spacing: 0.5px; display: inline-block;">
                            ${item.colOrigem === 'legislacoes' ? 'LEI' : item.colOrigem === 'construcoes' ? 'OBRA' : item.colOrigem.toUpperCase()}
                        </span>

                        <!-- Título do Item -->
                        <strong style="color:var(--white); font-size: 0.9rem;">${item.nome}</strong>
                    </div>

                    <!-- Botão Editar Simplificado -->
                    <button class="btn btn-edit" style="padding: 5px 15px; font-size: 0.7rem;" onclick="abrirModalGestao('${item.colOrigem}', '${item.id}')">
                        EDITAR
                    </button>
                </div>
                
                <!-- Descrição -->
                <div style="margin: 8px 0 0 45px; color:#94a3b8; font-size:0.8rem; font-style: italic;">
                    ${item.descricao || 'Sem descrição definida.'}
                </div>
            `;
        }
        container.appendChild(card);
    });
};
