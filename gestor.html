<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor do Manual - Admin</title>
    <style>
        :root { 
            --primary: #1e293b; 
            --accent: #6366f1; 
            --bg: #0f172a; 
            --white: #f8fafc; 
            --border: #334155; 
            --card-bg: #1e293b;
            --danger: #ef4444;
            --success: #16a34a;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--white); overflow: hidden; }
        
        /* Sidebars */
        .sidebar { width: 280px; background: #1e293b; padding: 20px; overflow-y: auto; flex-shrink: 0; }
        .sidebar-left { border-right: 2px solid var(--border); }
        .sidebar-right { border-left: 2px solid var(--border); }
        
        .sidebar h3, .sidebar h4 { margin-top: 0; color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Botões laterais */
        .side-group { background: #0f172a; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
        .side-btn-row { display: flex; gap: 8px; margin-top: 10px; }

        /* Conteúdo Principal */
        .main-content { flex: 1; overflow-y: auto; padding: 30px; scroll-behavior: smooth; }
        
        /* Árvore Categorias */
        .tree-node { margin-left: 15px; border-left: 1px dashed #475569; padding-left: 10px; }
        .tree-label { padding: 5px; cursor: pointer; font-size: 0.9rem; display: block; border-radius: 4px; color: #cbd5e1; }
        .tree-label:hover { background: #334155; color: var(--accent); }

        /* Cards */
        .post-card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 12px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid var(--accent); }

        /* Botões */
        .btn { border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
        .btn-icon { width: 38px; height: 38px; font-size: 1.1rem; }
        .btn-add { background: var(--success); }
        .btn-view { background: #475569; }
        .btn-edit { background: #f59e0b; padding: 5px 10px; font-size: 0.7rem; }
        .btn-delete { background: var(--danger); padding: 5px 10px; font-size: 0.7rem; }
        .btn-save { background: var(--accent); width: 100%; padding: 12px; margin-top: 10px; }
        
        /* Modal */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; visibility: hidden; opacity: 0; transition: 0.3s; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 12px; width: 400px; border: 1px solid var(--accent); }
        .modal-content input, .modal-content textarea { width: 100%; background: #0f172a; border: 1px solid var(--border); color: white; padding: 10px; margin: 10px 0; border-radius: 6px; box-sizing: border-box; }

        /* Editor */
        .editor-box { background: #1e293b; padding: 20px; border: 2px solid var(--accent); border-radius: 8px; margin-bottom: 30px; }
        #editor { min-height: 120px; border: 1px solid var(--border); padding: 10px; margin: 10px 0; border-radius: 4px; background: #0f172a; color: white; outline: none; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- Sidebar Esquerda (Tópicos) -->
    <aside class="sidebar sidebar-left">
        <div class="side-btn-row" style="margin-bottom: 20px;">
            <a href="index.html" class="btn btn-view btn-icon" title="Ver Manual Público">👁</a>
            <a href="add.html" class="btn btn-add btn-icon" title="Criar Novo Tópico">＋</a>
        </div>
        <h3>Estrutura do Manual</h3>
        <div id="tree-container">Carregando...</div>
    </aside>

    <!-- Conteúdo Central -->
    <main class="main-content" id="main-scroll">
        <div id="content-header">
            <h2>Gestor de Conteúdo</h2>
            <p style="color: #94a3b8;">Selecione uma opção nas laterais para gerenciar.</p>
        </div>

        <!-- Área do Editor (Posts do Manual) -->
        <div id="editor-area" class="hidden">
            <div class="editor-box" id="editor-container">
                <h3 id="editor-title">Nova Atualização</h3>
                <div id="editor" contenteditable="true"></div>
                <button onclick="salvarPost()" id="btnSalvar" class="btn btn-save">Publicar Atualização</button>
                <button onclick="cancelarEdicao()" id="btnCancelar" class="btn btn-save" style="background:#475569;">Cancelar</button>
            </div>
        </div>

        <div id="dynamic-list"></div>
    </main>

    <!-- Sidebar Direita (Legislações / Construções / Ações) -->
    <aside class="sidebar sidebar-right">
        
        <div class="side-group">
            <h4>1. Legislações</h4>
            <div class="side-btn-row">
                <button class="btn btn-add btn-icon" onclick="abrirModal('legislacoes')" title="Adicionar">+</button>
                <button class="btn btn-view btn-icon" onclick="listarDados('legislacoes', 'Legislações')" title="Gerir Lista">!</button>
            </div>
        </div>

        <div class="side-group">
            <h4>2. Construção</h4>
            <div class="side-btn-row">
                <button class="btn btn-add btn-icon" onclick="abrirModal('construcoes')" title="Adicionar">+</button>
                <button class="btn btn-view btn-icon" onclick="listarDados('construcoes', 'Construções')" title="Gerir Lista">!</button>
            </div>
        </div>

        <div class="side-group">
            <h4>3. Ações</h4>
            <div class="side-btn-row">
                <button class="btn btn-add btn-icon" onclick="abrirModal('acoes')" title="Adicionar">+</button>
                <button class="btn btn-view btn-icon" onclick="listarDados('acoes', 'Ações')" title="Gerir Lista">!</button>
            </div>
        </div>

    </aside>

    <!-- Modal Genérico -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h3 id="modal-title">Adicionar Novo</h3>
            <input type="text" id="modal-nome" placeholder="Nome / Título">
            <textarea id="modal-desc" rows="4" placeholder="Descrição (Opcional)"></textarea>
            <button class="btn btn-save" onclick="salvarModal()">Gravar no Banco</button>
            <button class="btn btn-save" style="background:#475569; margin-top:5px" onclick="fecharModal()">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDPLJ4Ln3Ton-DxsJ0tEKeioWHnV01Plo0",
            authDomain: "politicalgame-30215.firebaseapp.com",
            projectId: "politicalgame-30215",
            storageBucket: "politicalgame-30215.firebasestorage.app",
            messagingSenderId: "736655823319",
            appId: "1:736655823319:web:60ebdc530e101784b9bb92"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allDocs = [];
        let currentCollection = "";
        let selectedTopicBaseData = null;
        let editId = null;

        // --- CARREGAMENTO INICIAL ---
        async function loadManualData() {
            const snap = await getDocs(query(collection(db, "docs"), orderBy("createdAt", "asc")));
            allDocs = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderTree();
        }

        function renderTree() {
            const container = document.getElementById('tree-container');
            container.innerHTML = '';
            const paisNames = [...new Set(allDocs.filter(d => d.categoria === 'pai').map(p => p.nome))];

            paisNames.forEach(pName => {
                const div = document.createElement('div');
                div.className = 'tree-node';
                div.innerHTML = `<span class="tree-label" onclick="selectTopic('${pName}')">📁 ${pName}</span>`;
                const filhos = [...new Set(allDocs.filter(d => d.categoria === 'filho' && d.categoriaPai === pName).map(f => f.nome))];
                filhos.forEach(fName => {
                    const fDiv = document.createElement('div');
                    fDiv.className = 'tree-node';
                    fDiv.innerHTML = `<span class="tree-label" onclick="selectTopic('${fName}')">📄 ${fName}</span>`;
                    div.appendChild(fDiv);
                });
                container.appendChild(div);
            });
        }

        // --- GESTÃO DE TÓPICOS (CENTRO) ---
        window.selectTopic = (nome) => {
            document.getElementById('dynamic-list').innerHTML = "";
            const posts = allDocs.filter(d => d.nome === nome);
            selectedTopicBaseData = posts[0];
            
            document.getElementById('content-header').innerHTML = `<h2>Tópico: ${nome}</h2>`;
            document.getElementById('editor-area').classList.remove('hidden');
            
            const list = document.getElementById('dynamic-list');
            posts.forEach(p => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div style="font-size:0.7rem; color:#94a3b8; margin-bottom:10px">ID: ${p.id}</div>
                    <div>${p.textoHtml}</div>
                    <div style="margin-top:10px; border-top:1px solid #334155; padding-top:10px">
                        <button class="btn btn-edit" onclick="carregarParaEditar('${p.id}')">Editar</button>
                        <button class="btn btn-delete" onclick="excluirPost('${p.id}')">Excluir</button>
                    </div>
                `;
                list.appendChild(card);
            });
        };

        // --- GESTÃO DAS NOVAS SEÇÕES (MODAL & LISTAS) ---
        window.abrirModal = (colecao) => {
            currentCollection = colecao;
            document.getElementById('modal-title').innerText = "Adicionar a " + colecao.charAt(0).toUpperCase() + colecao.slice(1);
            document.getElementById('modal').classList.add('active');
        };

        window.fecharModal = () => {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('modal-nome').value = "";
            document.getElementById('modal-desc').value = "";
        };

        window.salvarModal = async () => {
            const nome = document.getElementById('modal-nome').value.trim();
            const desc = document.getElementById('modal-desc').value.trim();
            
            if(!nome) return alert("O nome é obrigatório!");

            try {
                // 1. Verificar se já existe
                const q = query(collection(db, currentCollection), where("nome", "==", nome));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    return alert("Erro: Já existe um item com este nome nesta categoria!");
                }

                // 2. Salvar
                await addDoc(collection(db, currentCollection), {
                    nome: nome,
                    descricao: desc,
                    createdAt: serverTimestamp()
                });

                alert("Salvo com sucesso!");
                fecharModal();
                listarDados(currentCollection, currentCollection);
            } catch (e) {
                console.error(e);
                alert("Erro ao salvar dados.");
            }
        };

        window.listarDados = async (colecao, tituloAmigavel) => {
            document.getElementById('editor-area').classList.add('hidden');
            document.getElementById('content-header').innerHTML = `<h2>Gerir: ${tituloAmigavel}</h2>`;
            const listDiv = document.getElementById('dynamic-list');
            listDiv.innerHTML = "Carregando lista...";

            const snap = await getDocs(query(collection(db, colecao), orderBy("nome", "asc")));
            listDiv.innerHTML = "";

            if(snap.empty) listDiv.innerHTML = "<p>Nenhum item encontrado.</p>";

            snap.forEach(docSnap => {
                const data = docSnap.data();
                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <div>
                        <strong>${data.nome}</strong><br>
                        <small style="color:#94a3b8">${data.descricao || 'Sem descrição'}</small>
                    </div>
                    <button class="btn btn-delete" onclick="excluirItemGenerico('${colecao}', '${docSnap.id}')">Excluir</button>
                `;
                listDiv.appendChild(row);
            });
        };

        window.excluirItemGenerico = async (colecao, id) => {
            if(!confirm("Deseja mesmo excluir este item?")) return;
            await deleteDoc(doc(db, colecao, id));
            listarDados(colecao, colecao);
        };

        // Funções de apoio do Editor (já existentes)
        window.salvarPost = async () => {
            const html = document.getElementById('editor').innerHTML;
            if(!html.trim()) return;
            if(editId) {
                await updateDoc(doc(db, "docs", editId), { textoHtml: html });
            } else {
                const d = {...selectedTopicBaseData, textoHtml: html, createdAt: serverTimestamp()};
                delete d.id;
                await addDoc(collection(db, "docs"), d);
            }
            document.getElementById('editor').innerHTML = "";
            editId = null;
            await loadManualData();
            selectTopic(selectedTopicBaseData.nome);
        };

        window.excluirPost = async (id) => {
            if(!confirm("Excluir post?")) return;
            await deleteDoc(doc(db, "docs", id));
            await loadManualData();
            selectTopic(selectedTopicBaseData.nome);
        };

        window.carregarParaEditar = (id) => {
            const p = allDocs.find(x => x.id === id);
            editId = id;
            document.getElementById('editor').innerHTML = p.textoHtml;
            document.getElementById('main-scroll').scrollTop = 0;
        };

        window.cancelarEdicao = () => {
            editId = null;
            document.getElementById('editor').innerHTML = "";
        };

        loadManualData();
    </script>
</body>
</html>
