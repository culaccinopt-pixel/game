<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor do Manual - Dark Mode</title>
    <style>
        :root { 
            --primary: #1e293b; 
            --accent: #6366f1; 
            --bg: #0f172a; 
            --white: #f8fafc; 
            --border: #334155; 
            --card-bg: #1e293b;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--white); }
        .sidebar { width: 320px; background: #1e293b; border-left: 2px solid var(--border); order: 2; overflow-y: auto; padding: 20px; }
        .main-content { flex: 1; order: 1; overflow-y: auto; padding: 30px; }
        .sidebar-header { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .btn-view { text-decoration: none; background: #475569; color: white; padding: 8px; border-radius: 6px; text-align: center; font-size: 0.9rem; }
        .btn-add { text-decoration: none; background: #16a34a; color: white; padding: 8px; border-radius: 6px; text-align: center; font-size: 0.9rem; }
        .tree-node { margin-left: 15px; border-left: 1px dashed #475569; padding-left: 10px; }
        .tree-label { padding: 5px; cursor: pointer; font-size: 0.9rem; display: block; border-radius: 4px; color: #cbd5e1; }
        .tree-label:hover { background: #334155; color: var(--accent); }
        .post-card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .post-date { font-size: 0.7rem; color: #94a3b8; margin-bottom: 10px; }
        .editor-box { background: #1e293b; padding: 20px; border: 2px solid var(--accent); border-radius: 8px; margin-bottom: 30px; }
        #editor { min-height: 120px; border: 1px solid var(--border); padding: 10px; margin: 10px 0; border-radius: 4px; background: #0f172a; color: white; outline: none; }
        .hidden { display: none; }
        h2 { color: var(--accent); }
    </style>
</head>
<body>
    <div class="main-content">
        <div id="content-header"><h2>Gestor de Conteúdo</h2><p>Selecione um tópico na árvore à direita para editar.</p></div>
        <div id="add-post-area" class="hidden">
            <div class="editor-box">
                <h3>Nova Atualização para este Tópico</h3>
                <div id="editor" contenteditable="true"></div>
                <button onclick="salvarPost()" id="btnSalvar" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">Publicar Atualização</button>
            </div>
        </div>
        <div id="posts-list"></div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="btn-view">👁 Ver Manual Público</a>
            <a href="add.html" class="btn-add">+ Criar Novo Tópico</a>
        </div>
        <h3>Árvore de Categorias</h3>
        <div id="tree-container">Carregando categorias...</div>
    </aside>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDPLJ4Ln3Ton-DxsJ0tEKeioWHnV01Plo0",
            authDomain: "politicalgame-30215.firebaseapp.com",
            projectId: "politicalgame-30215",
            storageBucket: "politicalgame-30215.firebasestorage.app",
            messagingSenderId: "736655823319",
            appId: "1:736655823319:web:60ebdc530e101784b9bb92"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allDocs = [];
        let selectedTopicData = null;

        async function loadData() {
            const snap = await getDocs(query(collection(db, "docs"), orderBy("createdAt", "asc")));
            allDocs = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderTree();
        }

        function renderTree() {
            const container = document.getElementById('tree-container');
            container.innerHTML = '';
            const pais = [...new Set(allDocs.filter(d => d.categoria === 'pai').map(p => p.nome))];

            pais.forEach(pName => {
                const div = document.createElement('div');
                div.className = 'tree-node';
                div.innerHTML = `<span class="tree-label" onclick="selectTopic('${pName}')">📁 ${pName}</span>`;
                
                const filhos = [...new Set(allDocs.filter(d => d.categoria === 'filho' && d.categoriaPai === pName).map(f => f.nome))];
                filhos.forEach(fName => {
                    const fDiv = document.createElement('div');
                    fDiv.className = 'tree-node';
                    fDiv.innerHTML = `<span class="tree-label" onclick="selectTopic('${fName}')">📄 ${fName}</span>`;
                    div.appendChild(fDiv);
                });
                container.appendChild(div);
            });
        }

        window.selectTopic = (nome) => {
            const posts = allDocs.filter(d => d.nome === nome);
            selectedTopicData = posts[0];
            document.getElementById('content-header').innerHTML = `<h2>Editando: ${nome}</h2>`;
            document.getElementById('add-post-area').classList.remove('hidden');
            const list = document.getElementById('posts-list');
            list.innerHTML = '<h3>Posts Atuais (Ordem Cronológica)</h3>';
            posts.forEach(p => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `<div class="post-date">${p.createdAt?.toDate().toLocaleString() || 'Agora'}</div>${p.textoHtml}`;
                list.appendChild(card);
            });
        };

        window.salvarPost = async () => {
            const editor = document.getElementById('editor');
            if(!editor.innerText.trim()) return;
            const doc = { ...selectedTopicData, textoHtml: editor.innerHTML, createdAt: serverTimestamp() };
            delete doc.id;
            await addDoc(collection(db, "docs"), doc);
            editor.innerHTML = '';
            await loadData();
            selectTopic(selectedTopicData.nome);
        };

        loadData();
    </script>
</body>
</html>
