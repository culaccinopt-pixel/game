<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestor Master</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: var(--card); padding: 40px; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #94a3b8; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { filter: brightness(1.2); }
        .toggle-link { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #94a3b8; cursor: pointer; }
        .toggle-link span { color: var(--primary); font-weight: bold; }
        #msg { padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 0.85rem; display: none; text-align: center; }
        .error { background: #ef444422; color: #ef4444; border: 1px solid #ef4444; }
        .success { background: #10b98122; color: #10b981; border: 1px solid #10b981; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 id="title">Entrar</h2>
    <div id="msg"></div>

    <form id="auth-form">
        <div class="form-group" id="name-field" style="display: none;">
            <label>Nome Completo</label>
            <input type="text" id="name" placeholder="Seu nome">
        </div>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="email" required placeholder="exemplo@email.com">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="password" required placeholder="******">
        </div>
        <button type="submit" id="btn-submit">Entrar</button>
    </form>

    <div class="toggle-link" id="toggle-auth">
        Não tem conta? <span>Cadastre-se</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPLJ4Ln3Ton-DxsJ0tEKeioWHnV01Plo0",
        authDomain: "politicalgame-30215.firebaseapp.com",
        projectId: "politicalgame-30215",
        storageBucket: "politicalgame-30215.firebasestorage.app",
        messagingSenderId: "736655823319",
        appId: "1:736655823319:web:60ebdc530e101784b9bb92"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isLogin = true;

    const form = document.getElementById('auth-form');
    const toggleBtn = document.getElementById('toggle-auth');
    const msgDiv = document.getElementById('msg');

    // Alternar entre Login e Cadastro
    toggleBtn.onclick = () => {
        isLogin = !isLogin;
        document.getElementById('title').innerText = isLogin ? 'Entrar' : 'Criar Conta';
        document.getElementById('name-field').style.display = isLogin ? 'none' : 'block';
        document.getElementById('btn-submit').innerText = isLogin ? 'Entrar' : 'Cadastrar';
        toggleBtn.innerHTML = isLogin ? 'Não tem conta? <span>Cadastre-se</span>' : 'Já tem conta? <span>Entrar</span>';
    };

    form.onsubmit = async (e) => {
        e.preventDefault();
        msgDiv.style.display = 'none';
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const nome = document.getElementById('name').value;

        try {
            if (isLogin) {
                // LOGIN
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                checkStatus(userCredential.user.uid);
            } else {
                // CADASTRO
                if(!nome) throw new Error("Preencha o nome");
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCredential.user.uid;

                // Criar documento do usuário no Firestore
                await setDoc(doc(db, "users", uid), {
                    nome: nome,
                    email: email,
                    status: false, // Inicia como falso
                    createdAt: new Date()
                });

                showMessage("Conta criada! Aguarde a aprovação de um administrador.", "success");
                form.reset();
                setTimeout(() => { isLogin = false; toggleBtn.click(); }, 3000);
            }
        } catch (error) {
            console.error(error);
            showMessage("Erro: " + error.message, "error");
        }
    };

    async function checkStatus(uid) {
        const userDoc = await getDoc(doc(db, "users", uid));
        if (userDoc.exists()) {
            if (userDoc.data().status === true) {
                window.location.href = "index.html";
            } else {
                auth.signOut();
                showMessage("Sua conta ainda não foi aprovada pelo administrador.", "error");
            }
        } else {
            showMessage("Perfil de usuário não encontrado.", "error");
        }
    }

    function showMessage(text, type) {
        msgDiv.innerText = text;
        msgDiv.className = type;
        msgDiv.style.display = 'block';
    }
</script>
</body>
</html>
