
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Leitor de Notícias Fiscais - MODO INDESTRUTÍVEL</title>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --card: #1e293b; --text: #f1f5f9; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; }
        .sidebar { width: 350px; background: #020617; padding: 20px; border-right: 1px solid #334155; display: flex; flex-direction: column; }
        textarea { flex: 1; background: #000; color: #10b981; border: 1px solid #334155; padding: 10px; font-family: monospace; font-size: 11px; border-radius: 5px; resize: none; outline: none; }
        .viewer { flex: 1; overflow-y: auto; padding: 30px; }
        .tax-header { font-size: 1.8rem; font-weight: bold; color: var(--accent); margin-top: 40px; border-bottom: 2px solid #334155; padding-bottom: 10px; text-transform: uppercase; }
        .card { background: var(--card); border: 1px solid #334155; border-radius: 10px; padding: 18px; margin-top: 15px; border-left: 5px solid var(--accent); }
        .card-titulo { font-weight: bold; font-size: 1.1rem; color: #fff; margin-bottom: 5px; }
        .card-sub { color: #94a3b8; font-size: 0.9rem; margin-bottom: 12px; line-height: 1.4; }
        .tag { font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 4px; background: #0f172a; border: 1px solid #444; text-transform: uppercase; margin-right: 5px; }
        .tom-positivo { color: #4ade80; } .tom-negativo { color: #f87171; } .tom-alarmista { color: #fbbf24; }
        #counter { background: #064e3b; color: #34d399; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="sidebar">
    <div id="counter">Cole o texto abaixo</div>
    <textarea id="input" placeholder="Cole o código do ficheiro aqui..."></textarea>
</div>

<div class="viewer" id="viewer">
    <div style="text-align: center; margin-top: 15vh; opacity: 0.5;">
        <h1>Modo de Extração Ativo</h1>
        <p>Este leitor extrai os dados mesmo que o código esteja incompleto ou com erros.</p>
    </div>
</div>

<script>
    const input = document.getElementById('input');
    const viewer = document.getElementById('viewer');
    const counter = document.getElementById('counter');

    input.addEventListener('input', () => {
        const text = input.value;
        if (!text) return;

        // 1. EXTRAÇÃO DOS IMPOSTOS (Nomes das categorias)
        // Procura por -> nome:"NOME DO IMPOSTO"
        const taxRegex = /nome\s*:\s*["']([^"']+)["']/g;
        
        // 2. EXTRAÇÃO DAS NOTÍCIAS
        // Procura por blocos que tenham titulo, subtitulo, etc.
        const newsRegex = /\{\s*trigger\s*:\s*["']([^"']+)["']\s*,\s*titulo\s*:\s*["']([^"']+)["']\s*,\s*subtitulo\s*:\s*["']([^"']+)["']\s*,\s*fonte\s*:\s*["']([^"']+)["']\s*,\s*tom\s*:\s*["']([^"']+)["']\s*\}/g;

        // Vamos separar o texto por categorias para organizar a visualização
        const blocks = text.split(/\{\s*id\s*:/);
        viewer.innerHTML = '';
        let totalNews = 0;

        blocks.forEach(block => {
            const taxNameMatch = block.match(/nome\s*:\s*["']([^"']+)["']/);
            if (!taxNameMatch) return;

            const section = document.createElement('div');
            section.innerHTML = `<div class="tax-header">${taxNameMatch[1]}</div>`;
            
            // Procurar notícias dentro deste bloco
            let m;
            let newsFound = false;
            while ((m = newsRegex.exec(block)) !== null) {
                newsFound = true;
                totalNews++;
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-titulo">${m[2]}</div>
                    <div class="card-sub">${m[3]}</div>
                    <div>
                        <span class="tag tom-${m[5]}">${m[5]}</span>
                        <span class="tag">Trigger: ${m[1]}</span>
                        <span class="tag">Fonte: ${m[4]}</span>
                    </div>
                `;
                section.appendChild(card);
            }

            if (newsFound) viewer.appendChild(section);
        });

        counter.innerText = `✅ ${totalNews} Notícias Extraídas`;
    });
</script>

</body>
</html>
