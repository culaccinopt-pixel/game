<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Master - Sistema de Comando</title>
    <style>
        :root {
            --bg-deep: #05080f;
            --bg-panel: #0a111d;
            --bg-card: #111a27;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --border: #1e293b;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }

        /* --- LAYOUT PRINCIPAL --- */
        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            border-bottom: 2px solid var(--border);
        }

        /* COLUNA ESQUERDA: DEPARTAMENTOS (PAI) */
        .sidebar-pai {
            width: 110px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 15px;
        }

        .dept-btn {
            width: 80px;
            height: 80px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            color: var(--text-dim);
            text-decoration: none;
        }

        .dept-btn i { font-size: 1.5rem; margin-bottom: 5px; }
        .dept-btn span { font-size: 0.65rem; text-transform: uppercase; font-weight: bold; text-align: center; }

        .dept-btn:hover, .dept-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
            background: #16243a;
        }

        /* COLUNA CENTRAL: ÁREA DINÂMICA */
        .main-workspace {
            flex: 1;
            background: radial-gradient(circle at top left, #0f172a, #05080f);
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .workspace-header {
            margin-bottom: 30px;
            border-left: 4px solid var(--accent);
            padding-left: 20px;
        }

        .workspace-header h1 {
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.8rem;
        }

        /* GRID DE CARDS (FILHOS) */
        .filho-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .filho-card {
            background: var(--bg-card);
            aspect-ratio: 1/1;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            padding: 20px;
        }

        .filho-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            background: #1a2536;
        }

        .filho-card .icon-box {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--accent);
        }

        /* SUBMENU SUPERIOR (NETOS) */
        .neto-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 8px;
        }

        .neto-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .neto-btn.active {
            background: var(--accent);
            color: black;
            font-weight: bold;
        }

        /* COLUNA DIREITA (AGREGAÇÃO) */
        .sidebar-right {
            width: 320px;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .right-tabs {
            display: flex;
            background: #000;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 0.75rem;
            text-transform: uppercase;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: var(--text-dim);
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: var(--bg-panel);
        }

        .tab-content { padding: 20px; overflow-y: auto; flex: 1; }

        /* BARRA INFERIOR */
        .bottom-nav {
            height: 60px;
            background: var(--bg-panel);
            border-top: 1px solid var(--accent);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 10px;
        }

        .nav-item {
            padding: 8px 20px;
            border-radius: 6px;
            background: #111a27;
            color: var(--text-main);
            font-size: 0.8rem;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .nav-item.active {
            background: var(--accent);
            color: #000;
            font-weight: bold;
        }

        /* AJUSTES DE TABELA E POSTS */
        .post-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--accent); font-size: 0.8rem; padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        .hidden { display: none !important; }

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


        const firebaseConfig = {
            apiKey: "AIzaSyDPLJ4Ln3Ton-DxsJ0tEKeioWHnV01Plo0",
            authDomain: "politicalgame-30215.firebaseapp.com",
            projectId: "politicalgame-30215",
            storageBucket: "politicalgame-30215.firebasestorage.app",
            messagingSenderId: "736655823319",
            appId: "1:736655823319:web:60ebdc530e101784b9bb92"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);



const auth = getAuth(app);
let currentUserName = "Membro";

// 1. Pegar o nome do usuário logado
onAuthStateChanged(auth, async (user) => {
    if (user) {
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        if (userSnap.exists()) currentUserName = userSnap.data().nome;
    }
});

// 2. Ouvinte Global para os cliques na tabela
document.getElementById('posts-container').addEventListener('click', async (e) => {
    // Agora ele procura por ⬜ ou pelo ícone antigo ⬜ para manter compatibilidade
    const cell = e.target.closest('.td-check') || 
                 (e.target.tagName === 'TD' && (e.target.innerText.includes('⬜') || e.target.innerText.includes('⬜')));
    
    const isDone = e.target.innerText.includes('✅');

    if (cell || isDone) {
        const targetCell = cell || e.target;
        const row = targetCell.parentElement;
        const postCard = targetCell.closest('.post-card');
        const docId = postCard.getAttribute('data-id');
        const contentBody = postCard.querySelector('.post-content-body');

        if (!targetCell.innerText.includes('✅')) {
            // MARCAR COMO FEITO
            row.classList.add('row-done');
            targetCell.innerHTML = `✅<br><small style="font-size:0.6rem; display:block; line-height:1;">${currentUserName}</small>`;
        } else {
            // DESMARCAR (VOLTA PARA O QUADRADO ⬜)
            row.classList.remove('row-done');
            targetCell.innerHTML = `⬜`; // MUDEI AQUI
        }

        // Salva no Firebase...
        try {
            await updateDoc(doc(db, "docs", docId), { textoHtml: contentBody.innerHTML });
        } catch (error) { console.error(error); }
    }
});



        let allDocs = [];
        let state = {
            pai: null,
            filho: null,
            neto: null,
             bisneto: null
        };

        async function init() {
            const snap = await getDocs(query(collection(db, "docs"), orderBy("createdAt", "asc")));
            allDocs = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderPais();
        }

        // 1. RENDERIZA OS BOTÕES DA ESQUERDA (PAI)
function renderPais() {
    const container = document.getElementById('sidebar-pais');
    const pais = allDocs
        .filter(d => d.categoria === 'pai')
        .sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
    
    container.innerHTML = pais.map(p => `
        <div class="dept-btn ${state.pai === p.nome ? 'active' : ''}" onclick="selecionarPai('${p.nome}')">
            <i>${getIcon(p.nome)}</i>
            <span>${p.nome}</span>
        </div>
    `).join('');
}

        // 2. CLIQUE NO PAI -> MOSTRA GRID DE FILHOS NO CENTRO
window.selecionarPai = (paiNome) => {
    state.pai = paiNome;
    state.filho = null;
    state.neto = null;
    state.bisneto = null; // Adicione isso para resetar bisnetos ao trocar de categoria
    
    // ATUALIZA O DESTAQUE NA ESQUERDA
    renderPais(); 
    
    atualizarNavegacao();
    
    const filhos = allDocs
        .filter(d => d.categoria === 'filho' && d.categoriaPai === paiNome)
        .sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
    
    const grid = document.getElementById('filho-grid');
    const content = document.getElementById('content-view');
    
    grid.classList.remove('hidden');
    content.classList.add('hidden');

    grid.innerHTML = filhos.map(f => `
        <div class="filho-card" onclick="selecionarFilho('${f.nome}')">
            <div class="icon-box">📂</div>
            <div style="font-weight: bold; text-transform: uppercase; font-size: 0.65rem;">${f.nome}</div>
        </div>
    `).join('');
};

        // 3. CLIQUE NO FILHO -> MOSTRA NETOS NO TOPO E CONTEÚDO
window.selecionarFilho = (filhoNome) => {
    state.filho = filhoNome;
    
    const grid = document.getElementById('filho-grid');
    const content = document.getElementById('content-view');
    grid.classList.add('hidden');
    content.classList.remove('hidden');

    // Busca o primeiro Neto para auto-selecionar
    const netosParaEsteFilho = allDocs
        .filter(d => d.categoria === 'neto' && d.categoriaFilho === state.filho && d.categoriaPai === state.pai)
        .sort((a, b) => (a.ordem || 0) - (b.ordem || 0));

    if (netosParaEsteFilho.length > 0) {
        state.neto = netosParaEsteFilho[0].nome;
    } else {
        state.neto = null;
    }

    atualizarNavegacao();
    renderNetos();
    renderPosts();
};

        // 4. RENDERIZA NETOS COMO SUBMENU
  function renderNetos() {
    const container = document.getElementById('neto-nav');
    const netos = allDocs
        .filter(d => d.categoria === 'neto' && d.categoriaFilho === state.filho && d.categoriaPai === state.pai)
        .sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
    
    if (netos.length === 0) {
        container.classList.add('hidden');
        return;
    }

    container.classList.remove('hidden');
    
    // Gerar apenas os botões dos netos, sem o "Ver Todos"
    container.innerHTML = netos.map(n => `
        <button class="neto-btn ${state.neto === n.nome ? 'active' : ''}" 
                onclick="filtrarPorNeto('${n.nome}')">
            ${n.nome}
        </button>
    `).join('');
}

        // 5. RENDERIZA OS POSTS/TABELAS
function renderPosts() {
    const container = document.getElementById('posts-container');
    console.group("🔍 FILTRANDO POSTS");

    const posts = allDocs.filter(d => {
        if (!d.textoHtml) return false;

        // --- NORMALIZAÇÃO DA HIERARQUIA DO DOCUMENTO ---
        
        // Se o doc é categoria 'pai', o nome dele é o Pai. Senão, usamos categoriaPai.
        const docPai = (d.categoria === 'pai' ? d.nome : d.categoriaPai || "").toUpperCase().trim();
        
        // Se o doc é categoria 'filho', o nome dele é o Filho. Senão, usamos categoriaFilho.
        const docFilho = (d.categoria === 'filho' ? d.nome : d.categoriaFilho || "").toUpperCase().trim();
        
        // Se o doc é categoria 'neto', o nome dele é o Neto. Senão, usamos categoriaNeto.
        const docNeto = (d.categoria === 'neto' ? d.nome : d.categoriaNeto || "").toUpperCase().trim();
        
        // Se o doc é categoria 'bisneto', o nome dele é o Bisneto. Senão, usamos categoriaBisneto.
        const docBis = (d.categoria === 'bisneto' ? d.nome : d.categoriaBisneto || "").toUpperCase().trim();

        // --- VALORES SELECIONADOS NO SISTEMA ---
        const statePai = (state.pai || "").toUpperCase().trim();
        const stateFilho = (state.filho || "").toUpperCase().trim();
        const stateNeto = (state.neto || "").toUpperCase().trim();
        const stateBis = (state.bisneto || "").toUpperCase().trim();

        // --- CONDIÇÕES DE FILTRO ---
        const mPai = docPai === statePai;
        const mFilho = docFilho === stateFilho;
        const mNeto = docNeto === stateNeto;
        
        let mBisneto = false;
        if (stateBis !== "") {
            // Se o usuário selecionou um Bisneto, o doc deve bater exatamente com esse Bisneto
            mBisneto = docBis === stateBis;
        } else {
            // Se NÃO há bisneto selecionado, mostramos apenas posts que pertencem ao Neto 
            // e que NÃO sejam de nenhum Bisneto específico
            mBisneto = docBis === "";
        }

        const passes = mPai && mFilho && mNeto && mBisneto;
        return passes;
    });

    console.log(`Filtro atual: ${state.pai} > ${state.filho} > ${state.neto} > ${state.bisneto || '(Nenhum)'}`);
    console.log(`Documentos encontrados: ${posts.length}`);

    if (posts.length === 0) {
        container.innerHTML = `<p style="color: var(--text-dim); padding: 20px; text-align: center;">Nenhum conteúdo disponível para esta categoria.</p>`;
    } else {
        container.innerHTML = posts.map(p => {
            // BLOQUEIO DE EDIÇÃO (LEITURA APENAS)
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = p.textoHtml;
            tempDiv.querySelectorAll('*').forEach(el => el.setAttribute('contenteditable', 'false'));
            
            return `
                <div class="post-card" data-id="${p.id}">
                    <div class="post-content-body">${tempDiv.innerHTML}</div>
                </div>
            `;
        }).join('');
    }
    console.groupEnd();
}

function atualizarNavegacao() {
    const header = document.querySelector('.workspace-header');
    const showBack = state.pai ? '' : 'hidden';

    let html = `
        <div class="back-container">
            <button class="back-btn ${showBack}" onclick="goBack()">
                <i>←</i> Voltar
            </button>
            <div class="breadcrumb">
    `;
    
    html += `<span class="path-item" onclick="location.reload()">SISTEMA</span>`;
    
    if (state.pai) {
        html += `<span class="separator">></span><span class="path-item" onclick="selecionarPai('${state.pai}')">${state.pai}</span>`;
    }
    
    if (state.filho) {
        html += `<span class="separator">></span><span class="path-item" onclick="selecionarFilho('${state.filho}')">${state.filho}</span>`;
    }
    
    if (state.neto) {
        // Se houver bisneto, o Neto vira um link clicável. Se não, ele é o "atual".
        if (state.bisneto) {
            html += `<span class="separator">></span><span class="path-item" onclick="filtrarPorNeto('${state.neto}')">${state.neto}</span>`;
        } else {
            html += `<span class="separator">></span><span class="current">${state.neto}</span>`;
        }
    }

    // NOVA PARTE: Adiciona o Bisneto na trilha
    if (state.bisneto) {
        html += `<span class="separator">></span><span class="current">${state.bisneto}</span>`;
    }
    
    html += `</div></div>`;
    header.innerHTML = html;
}


window.filtrarPorNeto = (netoNome) => {
    // 1. Atualiza o estado do Neto selecionado
    state.neto = netoNome;
    
    // 2. Busca todos os bisnetos que pertencem a este Neto e a este Pai
    // E ordena pelo campo 'ordem' (do menor para o maior)
    const bisnetos = allDocs
        .filter(d => 
            d.categoria === 'bisneto' && 
            d.categoriaNeto === netoNome && 
            d.categoriaPai === state.pai
        )
        .sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
    
    // 3. Auto-seleciona o primeiro bisneto da lista (se houver algum)
    // Normalizamos para maiúsculo para garantir que o filtro e o CSS funcionem
    if (bisnetos.length > 0) {
        state.bisneto = bisnetos[0].nome.toUpperCase().trim();
    } else {
        state.bisneto = null;
    }
    
    // 4. Atualiza a trilha de navegação (Breadcrumb) no topo
    atualizarNavegacao();

    // 5. Destaque visual: marca o botão do Neto (ex: EXÉRCITO) como ativo
    document.querySelectorAll('.neto-btn').forEach(btn => {
        // Compara ignorando espaços e maiúsculas
        const textoBotao = btn.innerText.trim().toUpperCase();
        const textoSelecionado = netoNome.toUpperCase().trim();
        btn.classList.toggle('active', textoBotao === textoSelecionado);
    });

    // 6. Renderiza os botões dos Bisnetos (as tags logo abaixo dos netos)
    const bisArea = document.getElementById('bisneto-area');
    
    if (bisnetos.length > 0) {
        bisArea.classList.remove('hidden');
        bisArea.innerHTML = bisnetos.map(b => {
            const nomeBis = b.nome.toUpperCase().trim();
            // Verifica se este bisneto é o que foi auto-selecionado no passo 3
            const isActive = state.bisneto === nomeBis;

            return `
                <div onclick="filtrarPorBisneto('${b.nome}')" 
                     class="bisneto-tag ${isActive ? 'active' : ''}">
                    ${b.nome}
                </div>
            `;
        }).join('');
    } else {
        // Se não houver bisnetos, limpa e esconde a área
        bisArea.innerHTML = '';
        bisArea.classList.add('hidden');
    }

    // 7. Chama a renderização dos posts (tabelas) já com o novo filtro aplicado
    console.log(`Auto-selecionado Neto: ${state.neto} > Bisneto: ${state.bisneto}`);
    renderPosts();
};


window.filtrarPorBisneto = (bisnetoNome) => {
    console.group("🎯 SELEÇÃO DE BISNETO");
    
    // Forçamos o estado a salvar em Maiúsculo para padronizar
    state.bisneto = bisnetoNome.toUpperCase().trim();
    console.log("Normalizado para:", state.bisneto);
    
    atualizarNavegacao();

    // Atualiza o visual comparando tudo em maiúsculo
    let botoesEncontrados = 0;
    document.querySelectorAll('.bisneto-tag').forEach(tag => {
        const textoTag = tag.innerText.toUpperCase().trim();
        if (textoTag === state.bisneto) {
            tag.classList.add('active');
            botoesEncontrados++;
        } else {
            tag.classList.remove('active');
        }
    });

    console.log(`Botões destacados: ${botoesEncontrados}`);
    console.groupEnd();

    renderPosts();
};


window.goBack = () => {
    if (state.neto && state.filho) {
        // Se está vendo o conteúdo (Neto), volta para o grid de pastas (Filho)
        selecionarPai(state.pai);
    } else if (state.filho || state.pai) {
        // Se está no grid de pastas, volta para a tela inicial limpa
        state.pai = null;
        state.filho = null;
        state.neto = null;
        document.getElementById('filho-grid').innerHTML = '';
        document.getElementById('content-view').classList.add('hidden');
        document.getElementById('filho-grid').classList.remove('hidden');
        atualizarNavegacao();
    }
};
