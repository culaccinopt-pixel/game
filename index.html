<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual - Visualizador Completo</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <style>
        :root { 
            --primary: #6366f1; --bg: #0f172a; --sidebar-bg: #1e293b;
            --white: #f8fafc; --border: #334155; --text-muted: #94a3b8;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: var(--bg); color: var(--white); }
        
        .sidebar { width: 300px; background: var(--sidebar-bg); border-left: 1px solid var(--border); padding: 20px; order: 2; overflow-y: auto; display: flex; flex-direction: column; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; order: 1; scroll-behavior: smooth; }
        .content-wrapper { max-width: 1000px; margin: 0 auto; }

        /* Navegação Sidebar (4 Botões) */
        .sidebar-nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 25px; }
        .nav-filter-btn { background: #0f172a; border: 1px solid var(--border); color: var(--text-muted); padding: 10px 5px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: 0.3s; }
        .nav-filter-btn:hover { border-color: var(--primary); color: var(--white); }
        .nav-filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Menu de Árvore */
        .tree-parent { padding: 8px; cursor: pointer; font-weight: bold; border-radius: 6px; color: #e2e8f0; font-size: 0.9rem; margin-top: 5px; }
        .tree-parent:hover { background: #334155; color: var(--primary); }
        .tree-children { margin-left: 20px; display: none; border-left: 1px solid #475569; }
        .tree-children.show { display: block; }
        .tree-child { padding: 4px 15px; cursor: pointer; color: var(--text-muted); font-size: 0.8rem; }
        .tree-child:hover { color: var(--white); }

        /* Sub-Abas Dinâmicas */
        .sub-tabs-container { display: flex; gap: 15px; border-bottom: 1px solid var(--border); margin: 20px 0 30px 0; }
        .tab-item { padding: 10px 5px; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-item.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* Navegação por Cards Superior */
.cards-grid { 
    display: grid; 
    /* Diminuído de 160px para 120px para caberem mais na mesma linha */
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
    gap: 8px; 
    margin-bottom: 20px; 
}
        .nav-card { 
    background: #1e293b; 
    border: 1px solid var(--border); 
    /* Diminuído o padding de 18px para 8px */
    padding: 8px 10px; 
    border-radius: 6px; 
    cursor: pointer; 
    text-align: center; 
    font-weight: 600; 
    /* Diminuído levemente a fonte */
    font-size: 0.75rem; 
    transition: 0.3s; 
    /* Diminuído a altura mínima de 50px para 35px */
    min-height: 35px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
}

        .nav-card:hover { border-color: var(--primary); transform: translateY(-2px); background: #334155; }
        
        /* Blocos de Conteúdo */
        .post-block { background: #1e293b; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); line-height: 1.6; }
        .item-list-card { background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid var(--border); border-left: 4px solid var(--primary); margin-bottom: 15px; }
        .item-list-card h3 { margin: 0 0 8px 0; font-size: 1.1rem; color: var(--white); }
        .item-list-card p { margin: 0; color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }

        .tag { background: #312e81; color: #c7d2fe; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; margin-right: 8px; font-weight: 600; }
        h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 10px; margin-top: 0; }
        .hidden { display: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    
    /* Ajuste para múltiplos níveis na árvore */
.tree-children { margin-left: 15px; display: none; border-left: 1px solid #334155; }
.tree-children.show { display: block; }
.tree-child { padding: 4px 10px; cursor: pointer; color: var(--text-muted); font-size: 0.8rem; transition: 0.2s; }
.tree-child:hover { color: var(--primary); background: rgba(99, 102, 241, 0.1); }
.tree-child.active-text { color: var(--primary); font-weight: bold; }

/* Estilo para o card selecionado no topo */
.nav-card.active-card { border-color: var(--primary); background: var(--primary); color: white; }

/* Cor de destaque para o item selecionado no menu */
.tree-active { 
    color: var(--primary) !important; 
    font-weight: 700 !important;
    background: rgba(99, 102, 241, 0.1); /* Um fundo leve para destacar */
    border-radius: 4px;
}
.btn-back {
    background: #1e293b;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.75rem;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 15px;
    transition: 0.3s;
}

.btn-back:hover {
    background: #334155;
    color: var(--primary);
    border-color: var(--primary);
}

    </style>
</head>
<body>
    <main class="main-content">
        <div class="content-wrapper">
             <div id="back-container"></div>
            <div id="cards-container" class="cards-grid"></div>
            <div id="main-display">
                <div id="topic-header">
                    <h1>Manual do Jogo</h1>
                    <p style="color: var(--text-muted);">Explore a documentação navegando pelas categorias.</p>
                </div>
                <div id="sub-tabs" class="sub-tabs-container hidden"></div>
                <div id="content-area"></div>
            </div>
        </div>
    </main>

    <aside class="sidebar">
        <!-- 4 Botões Principais -->
        <div class="sidebar-nav-grid">
            <button class="nav-filter-btn" onclick="viewLatest()">Últimas</button>
            <button class="nav-filter-btn" onclick="viewCollection('legislacoes', 'Legislações')">Leis</button>
            <button class="nav-filter-btn" onclick="viewCollection('construcoes', 'Construções')">Obras</button>
            <button class="nav-filter-btn" onclick="viewCollection('acoes', 'Ações')">Ações</button>
        </div>

        <!-- Cabeçalho do Menu com Botão de Configurações -->
        <div style="margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: bold; color: var(--primary); font-size: 0.8rem; letter-spacing: 1px;">MENU</span>
            <a href="gestor.html" title="Configurações / Painel Admin" style="text-decoration: none; font-size: 1.1rem;">⚙️</a>
        </div>
        
        <div id="tree-menu">Carregando categorias...</div>
    </aside>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDPLJ4Ln3Ton-DxsJ0tEKeioWHnV01Plo0",
            authDomain: "politicalgame-30215.firebaseapp.com",
            projectId: "politicalgame-30215",
            storageBucket: "politicalgame-30215.firebasestorage.app",
            messagingSenderId: "736655823319",
            appId: "1:736655823319:web:60ebdc530e101784b9bb92"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allDocs = [];
        let currentTopicData = { posts: [], legislacoes: [], construcoes: [], acoes: [], name: "" };

        async function init() {
            const snap = await getDocs(query(collection(db, "docs"), orderBy("createdAt", "asc")));
            allDocs = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderSidebar();
        }

   function renderSidebar() {
    const menu = document.getElementById('tree-menu');
    menu.innerHTML = '';
    
    const pais = allDocs.filter(d => d.categoria === 'pai').sort((a,b) => a.ordem - b.ordem);
    
    pais.forEach(p => {
        const pDiv = document.createElement('div');
        const hasFilhos = allDocs.some(d => d.categoria === 'filho' && d.categoriaPai === p.nome);
        
        pDiv.innerHTML = `
            <div class="tree-parent menu-item" id="menu-${p.id}" onclick="toggleFolder('folder-${p.id}', '${p.id}')">
                ${hasFilhos ? '📁' : '📄'} ${p.nome}
            </div>
            <div class="tree-children" id="folder-${p.id}"></div>
        `;
        menu.appendChild(pDiv);

        const containerFilhos = pDiv.querySelector(`#folder-${p.id}`);
        const filhos = allDocs.filter(d => d.categoria === 'filho' && d.categoriaPai === p.nome).sort((a,b) => a.ordem - b.ordem);
        
        filhos.forEach(f => {
            const fDiv = document.createElement('div');
            const hasNetos = allDocs.some(d => d.categoria === 'neto' && d.categoriaFilho === f.nome);
            
            fDiv.innerHTML = `
                <div class="tree-child menu-item" id="menu-${f.id}" onclick="toggleFolder('folder-${f.id}', '${f.id}')">
                    ${hasNetos ? '📂' : '└'} ${f.nome}
                </div>
                <div class="tree-children" id="folder-${f.id}" style="margin-left:15px"></div>
            `;
            containerFilhos.appendChild(fDiv);

            const containerNetos = fDiv.querySelector(`#folder-${f.id}`);
            const netos = allDocs.filter(d => d.categoria === 'neto' && d.categoriaFilho === f.nome).sort((a,b) => a.ordem - b.ordem);
            
            netos.forEach(n => {
                const nDiv = document.createElement('div');
                const hasBis = allDocs.some(d => d.categoria === 'bisneto' && d.categoriaNeto === n.nome);
                
                nDiv.innerHTML = `
                    <div class="tree-child menu-item" id="menu-${n.id}" onclick="toggleFolder('folder-${n.id}', '${n.id}')">
                        ${hasBis ? '📜' : '└'} ${n.nome}
                    </div>
                    <div class="tree-children" id="folder-${n.id}" style="margin-left:15px"></div>
                `;
                containerNetos.appendChild(nDiv);

                const containerBis = nDiv.querySelector(`#folder-${n.id}`);
                const bis = allDocs.filter(d => d.categoria === 'bisneto' && d.categoriaNeto === n.nome).sort((a,b) => a.ordem - b.ordem);
                
                bis.forEach(b => {
                    const bDiv = document.createElement('div');
                    bDiv.className = 'tree-child menu-item';
                    bDiv.id = `menu-${b.id}`;
                    bDiv.innerHTML = `└ ${b.nome}`;
                    bDiv.onclick = (e) => { e.stopPropagation(); selectTopic(b.id); };
                    containerBis.appendChild(bDiv);
                });
            });
        });
    });
}


    // Função auxiliar para abrir/fechar pastas
window.toggleFolder = (folderId, docId) => {
    const target = document.getElementById(folderId);
    if(target) target.classList.toggle('show');
    selectTopic(docId);
};


// 2. Seleção de Tópico com persistência de Cards para Bisnetos
window.selectTopic = async (docId) => {
    const ref = allDocs.find(d => d.id === docId);
    if(!ref) return;

    // 1. Destaque Visual no Menu
    document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('tree-active'));
    const selectedMenu = document.getElementById(`menu-${docId}`);
    if(selectedMenu) selectedMenu.classList.add('tree-active');

    const backContainer = document.getElementById('back-container');
    const cards = document.getElementById('cards-container');
    const area = document.getElementById('content-area');
    const tabsContainer = document.getElementById('sub-tabs');
    const header = document.getElementById('topic-header');

    area.innerHTML = "Carregando...";
    tabsContainer.classList.add('hidden');
    backContainer.innerHTML = ''; // Limpa o botão voltar

    // --- LÓGICA DO BOTÃO VOLTAR ---
    if (ref.categoria !== 'pai') {
        let paiId = null;
        
        if (ref.categoria === 'filho') {
            const p = allDocs.find(d => d.categoria === 'pai' && d.nome === ref.categoriaPai);
            if(p) paiId = p.id;
        } else if (ref.categoria === 'neto') {
            const p = allDocs.find(d => d.categoria === 'filho' && d.nome === ref.categoriaFilho && d.categoriaPai === ref.categoriaPai);
            if(p) paiId = p.id;
        } else if (ref.categoria === 'bisneto') {
            const p = allDocs.find(d => d.categoria === 'neto' && d.nome === ref.categoriaNeto && d.categoriaFilho === ref.categoriaFilho);
            if(p) paiId = p.id;
        }

        if (paiId) {
            const btn = document.createElement('button');
            btn.className = 'btn-back';
            btn.innerHTML = `← Voltar`;
            btn.onclick = () => selectTopic(paiId);
            backContainer.appendChild(btn);
        }
    }

    // 2. FILTRO DE POSTS
    currentTopicData.posts = allDocs.filter(d => {
        const mesmoNome = d.nome === ref.nome;
        const mesmaCat = d.categoria === ref.categoria;
        let linhagemCorreta = true;
        if (ref.categoria === 'filho') linhagemCorreta = d.categoriaPai === ref.categoriaPai;
        else if (ref.categoria === 'neto') linhagemCorreta = d.categoriaPai === ref.categoriaPai && d.categoriaFilho === ref.categoriaFilho;
        else if (ref.categoria === 'bisneto') linhagemCorreta = d.categoriaPai === ref.categoriaPai && d.categoriaFilho === ref.categoriaFilho && d.categoriaNeto === ref.categoriaNeto;
        return mesmoNome && mesmaCat && linhagemCorreta;
    });

    // 3. FILTRO DE COLEÇÕES (Leis, Obras, etc)
    const collections = ['legislacoes', 'construcoes', 'acoes'];
    for (const col of collections) {
        const snap = await getDocs(collection(db, col));
        currentTopicData[col] = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(item => {
            return item.vinculos?.some(v => {
                if (ref.categoria === 'pai') return v.pai === ref.nome && !v.filho;
                if (ref.categoria === 'filho') return v.pai === ref.categoriaPai && v.filho === ref.nome && !v.neto;
                if (ref.categoria === 'neto') return v.pai === ref.categoriaPai && v.filho === ref.categoriaFilho && v.neto === ref.nome && !v.bisneto;
                if (ref.categoria === 'bisneto') return v.pai === ref.categoriaPai && v.filho === ref.categoriaFilho && v.neto === ref.categoriaNeto && v.bisneto === ref.nome;
                return false;
            });
        });
    }

    // 4. CARDS DE NAVEGAÇÃO
    let subItems = [];
    if (ref.categoria === 'bisneto') {
        subItems = allDocs.filter(d => d.categoria === 'bisneto' && d.categoriaNeto === ref.categoriaNeto);
    } else {
        if(ref.categoria === 'pai') subItems = allDocs.filter(d => d.categoria === 'filho' && d.categoriaPai === ref.nome);
        if(ref.categoria === 'filho') subItems = allDocs.filter(d => d.categoria === 'neto' && d.categoriaFilho === ref.nome);
        if(ref.categoria === 'neto') subItems = allDocs.filter(d => d.categoria === 'bisneto' && d.categoriaNeto === ref.nome);
    }

    cards.innerHTML = '';
    subItems.sort((a,b) => a.ordem - b.ordem).forEach(s => {
        const c = document.createElement('div');
        c.className = `nav-card ${s.id === docId ? 'active-card' : ''}`; 
        c.innerText = s.nome;
        c.onclick = () => selectTopic(s.id);
        cards.appendChild(c);
    });

    header.innerHTML = `<h1>${ref.nome}</h1>`;
    renderTabs();
    renderTabContent('tudo');
    document.querySelector('.main-content').scrollTop = 0;
};

  

   

        function renderTabs() {
            const tabsContainer = document.getElementById('sub-tabs');
            tabsContainer.innerHTML = '';
            const tabs = [{ id: 'tudo', label: 'Tudo' }];
            if(currentTopicData.legislacoes.length > 0) tabs.push({ id: 'legislacoes', label: `Leis (${currentTopicData.legislacoes.length})` });
            if(currentTopicData.construcoes.length > 0) tabs.push({ id: 'construcoes', label: `Obras (${currentTopicData.construcoes.length})` });
            if(currentTopicData.acoes.length > 0) tabs.push({ id: 'acoes', label: `Ações (${currentTopicData.acoes.length})` });

            if(tabs.length > 1) {
                tabsContainer.classList.remove('hidden');
                tabs.forEach(t => {
                    const btn = document.createElement('div');
                    btn.className = `tab-item ${t.id === 'tudo' ? 'active' : ''}`;
                    btn.innerText = t.label;
                    btn.onclick = () => {
                        document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
                        btn.classList.add('active'); renderTabContent(t.id);
                    };
                    tabsContainer.appendChild(btn);
                });
            }
        }

        function renderTabContent(tabId) {
            const area = document.getElementById('content-area');
            area.innerHTML = '';
            const renderItem = (i, color) => `<div class="item-list-card" style="border-left-color: ${color}"><h3>${i.nome}</h3><p>${i.descricao || 'Sem descrição.'}</p></div>`;

            if(tabId === 'tudo' || tabId === 'posts') currentTopicData.posts.forEach(p => area.innerHTML += `<div class="post-block">${p.textoHtml}</div>`);
            if(tabId === 'tudo' || tabId === 'legislacoes') currentTopicData.legislacoes.forEach(i => area.innerHTML += renderItem(i, '#6366f1'));
            if(tabId === 'tudo' || tabId === 'construcoes') currentTopicData.construcoes.forEach(i => area.innerHTML += renderItem(i, '#16a34a'));
            if(tabId === 'tudo' || tabId === 'acoes') currentTopicData.acoes.forEach(i => area.innerHTML += renderItem(i, '#f59e0b'));
            
            if(!area.innerHTML) area.innerHTML = "<p style='color:var(--text-muted)'>Nenhum conteúdo específico para este nível.</p>";
        }

        // --- LÓGICA DE ÚLTIMAS E COLEÇÕES GLOBAIS ---
        
        window.viewLatest = async () => {
            const area = document.getElementById('content-area');
            const header = document.getElementById('topic-header');
            document.getElementById('sub-tabs').classList.add('hidden');
            document.getElementById('cards-container').innerHTML = '';
            area.innerHTML = "Buscando novidades...";
            header.innerHTML = "<h1>Últimas Atualizações</h1>";

            const collections = ['docs', 'legislacoes', 'construcoes', 'acoes'];
            const promises = collections.map(col => getDocs(query(collection(db, col), orderBy("createdAt", "desc"), limit(5))));
            const snapshots = await Promise.all(promises);
            
            let combined = [];
            snapshots.forEach((snap, index) => {
                snap.forEach(d => combined.push({ ...d.data(), type: collections[index] }));
            });
            
            combined.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
            area.innerHTML = '';
            combined.forEach(item => {
                const label = item.type === 'docs' ? 'MANUAL' : item.type.toUpperCase();
                area.innerHTML += `
                    <div class="post-block">
                        <div style="margin-bottom:10px;"><span class="tag" style="background:var(--primary)">${label}</span></div>
                        ${item.type === 'docs' ? item.textoHtml : `<h3>${item.nome}</h3><p>${item.descricao || ''}</p>`}
                    </div>`;
            });
        };

        window.viewCollection = async (col, title) => {
            document.getElementById('sub-tabs').classList.add('hidden');
            document.getElementById('cards-container').innerHTML = '';
            const area = document.getElementById('content-area');
            const header = document.getElementById('topic-header');
            area.innerHTML = "Carregando...";
            header.innerHTML = `<h1>${title}</h1>`;
            
            const snap = await getDocs(query(collection(db, col), orderBy("nome", "asc")));
            area.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                area.innerHTML += `
                    <div class="item-list-card">
                        <h3>${data.nome}</h3>
                        <p>${data.descricao || 'Sem descrição cadastrada.'}</p>
                    </div>`;
            });
        };

        init();
    </script>
</body>
</html>
