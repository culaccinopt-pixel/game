<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual - Visualizador Completo</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <style>
        :root { 
            --primary: #6366f1; --bg: #0f172a; --sidebar-bg: #1e293b;
            --white: #f8fafc; --border: #334155; --text-muted: #94a3b8;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: var(--bg); color: var(--white); }
        
        .sidebar { width: 300px; background: var(--sidebar-bg); border-left: 1px solid var(--border); padding: 20px; order: 2; overflow-y: auto; display: flex; flex-direction: column; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; order: 1; scroll-behavior: smooth; }
        .content-wrapper { max-width: 1000px; margin: 0 auto; }

        /* Navegação Sidebar (4 Botões) */
        .sidebar-nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 25px; }
        .nav-filter-btn { background: #0f172a; border: 1px solid var(--border); color: var(--text-muted); padding: 10px 5px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: 0.3s; }
        .nav-filter-btn:hover { border-color: var(--primary); color: var(--white); }
        .nav-filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Menu de Árvore */
        .tree-parent { padding: 8px; cursor: pointer; font-weight: bold; border-radius: 6px; color: #e2e8f0; font-size: 0.9rem; margin-top: 5px; }
        .tree-parent:hover { background: #334155; color: var(--primary); }
        .tree-children { margin-left: 20px; display: none; border-left: 1px solid #475569; }
        .tree-children.show { display: block; }
        .tree-child { padding: 4px 15px; cursor: pointer; color: var(--text-muted); font-size: 0.8rem; }
        .tree-child:hover { color: var(--white); }

        /* Sub-Abas Dinâmicas */
        .sub-tabs-container { display: flex; gap: 15px; border-bottom: 1px solid var(--border); margin: 20px 0 30px 0; }
        .tab-item { padding: 10px 5px; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-item.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* Navegação por Cards Superior */
.cards-grid { 
    display: grid; 
    /* Diminuído de 160px para 120px para caberem mais na mesma linha */
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
    gap: 8px; 
    margin-bottom: 20px; 
}
        .nav-card { 
    background: #1e293b; 
    border: 1px solid var(--border); 
    /* Diminuído o padding de 18px para 8px */
    padding: 8px 10px; 
    border-radius: 6px; 
    cursor: pointer; 
    text-align: center; 
    font-weight: 600; 
    /* Diminuído levemente a fonte */
    font-size: 0.75rem; 
    transition: 0.3s; 
    /* Diminuído a altura mínima de 50px para 35px */
    min-height: 35px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
}

        .nav-card:hover { border-color: var(--primary); transform: translateY(-2px); background: #334155; }
        
        /* Blocos de Conteúdo */
        .post-block { background: #1e293b; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); line-height: 1.6; }
        .item-list-card { background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid var(--border); border-left: 4px solid var(--primary); margin-bottom: 15px; }
        .item-list-card h3 { margin: 0 0 8px 0; font-size: 1.1rem; color: var(--white); }
        .item-list-card p { margin: 0; color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }

        .tag { background: #312e81; color: #c7d2fe; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; margin-right: 8px; font-weight: 600; }
        h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 10px; margin-top: 0; }
        .hidden { display: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    
    /* Ajuste para múltiplos níveis na árvore */
.tree-children { margin-left: 15px; display: none; border-left: 1px solid #334155; }
.tree-children.show { display: block; }
.tree-child { padding: 4px 10px; cursor: pointer; color: var(--text-muted); font-size: 0.8rem; transition: 0.2s; }
.tree-child:hover { color: var(--primary); background: rgba(99, 102, 241, 0.1); }
.tree-child.active-text { color: var(--primary); font-weight: bold; }

/* Estilo para o card selecionado no topo */
.nav-card.active-card { border-color: var(--primary); background: var(--primary); color: white; }

/* Cor de destaque para o item selecionado no menu */
.tree-active { 
    color: var(--primary) !important; 
    font-weight: 700 !important;
    background: rgba(99, 102, 241, 0.1); /* Um fundo leve para destacar */
    border-radius: 4px;
}
.btn-back {
    background: #1e293b;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.75rem;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 15px;
    transition: 0.3s;
}

.btn-back:hover {
    background: #334155;
    color: var(--primary);
    border-color: var(--primary);
}

/* Estilo para o ícone de Check */
.card-check { position: absolute; top: 15px; right: 15px; cursor: pointer; color: #475569; font-size: 1.2rem; transition: 0.3s; z-index: 10; }
.card-check:hover { color: var(--primary); transform: scale(1.2); }
.card-check.checked { color: #16a34a; }

/* Estado Concluído */
.done-card { border: 2px solid #16a34a !important; background: rgba(22, 163, 74, 0.05) !important; }
.post-block, .item-list-card { position: relative; transition: 0.3s; }

/* Modal de Usuários */
#user-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 9999; }
.user-modal-content { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid var(--primary); width: 320px; max-height: 80vh; overflow-y: auto; }
.user-option { padding: 12px; margin-bottom: 8px; background: #0f172a; border-radius: 6px; cursor: pointer; transition: 0.2s; border: 1px solid var(--border); text-align: center; }
.user-option:hover { background: var(--primary); border-color: white; }


   :root { 
            --primary: #6366f1; --bg: #0f172a; --sidebar-bg: #1e293b;
            --white: #f8fafc; --border: #334155; --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            background: var(--bg); 
            color: var(--white); 
        }
        
        /* Nav Mobile */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 60px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
        }

        /* Sidebar (Gaveta no Mobile) */
        .sidebar { 
            width: 300px; 
            background: var(--sidebar-bg); 
            border-left: 1px solid var(--border); 
            padding: 20px; 
            order: 2; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .main-content { 
            flex: 1; 
            padding: 40px; 
            overflow-y: auto; 
            order: 1; 
            scroll-behavior: smooth; 
        }

        .content-wrapper { max-width: 1000px; margin: 0 auto; }

        /* Navegação Sidebar */
        .sidebar-nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 25px; }
        .nav-filter-btn { background: #0f172a; border: 1px solid var(--border); color: var(--text-muted); padding: 10px 5px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: 0.3s; }
        .nav-filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Menu de Árvore */
        .tree-parent { padding: 10px; cursor: pointer; font-weight: bold; border-radius: 6px; color: #e2e8f0; font-size: 0.9rem; margin-top: 5px; }
        .tree-child { padding: 8px 15px; cursor: pointer; color: var(--text-muted); font-size: 0.85rem; }
        .tree-active { color: var(--primary) !important; font-weight: 700 !important; background: rgba(99, 102, 241, 0.1); }

        /* Sub-Abas (Scrollable no Mobile) */
        .sub-tabs-container { 
            display: flex; 
            gap: 15px; 
            border-bottom: 1px solid var(--border); 
            margin: 20px 0 30px 0; 
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none; /* Firefox */
        }
        .sub-tabs-container::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .tab-item { padding: 10px 5px; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); border-bottom: 3px solid transparent; }
        .tab-item.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* Cards Superior */
        .cards-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 10px; 
            margin-bottom: 20px; 
        }

        .nav-card { 
            background: #1e293b; 
            border: 1px solid var(--border); 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            text-align: center; 
            font-weight: 600; 
            font-size: 0.8rem; 
            min-height: 45px;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-card.active-card { border-color: var(--primary); background: var(--primary); color: white; }

        /* Blocos de Conteúdo */
        .post-block { background: #1e293b; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); line-height: 1.6; position: relative; }
        .item-list-card { background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid var(--border); border-left: 4px solid var(--primary); margin-bottom: 15px; position: relative; }

        /* Check e Modais */
        .card-check { position: absolute; top: 15px; right: 15px; cursor: pointer; color: #475569; font-size: 1.3rem; }
        .card-check.checked { color: #16a34a; }
        .done-card { border: 2px solid #16a34a !important; background: rgba(22, 163, 74, 0.05) !important; }

        /* Overlay Mobile */
        .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 999; backdrop-filter: blur(3px); }

        /* RESPONSIVIDADE */
        @media (max-width: 1024px) {
            .mobile-header { display: flex; }
            
            .sidebar {
                position: fixed;
                top: 0; right: 0; bottom: 0;
                z-index: 1001;
                transform: translateX(100%); /* Escondido */
                width: 280px;
                order: unset;
            }
            .sidebar.active { transform: translateX(0); }
            .overlay.active { display: block; }

            .main-content { 
                padding: 80px 15px 40px 15px; 
                order: unset; 
                width: 100%;
            }

            h1 { font-size: 1.8rem; }
            
            .cards-grid {
                display: flex;
                overflow-x: auto;
                padding-bottom: 10px;
                scrollbar-width: none;
            }
            .nav-card { min-width: 130px; }
            
            .post-block { padding: 15px; }
        }

/* Estilo do Spinner */
.spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(99, 102, 241, 0.1);
    border-top: 4px solid var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Classe para esconder com transição */
.loader-hidden {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
}

.btn-load-more {
    display: block;
    width: 200px;
    margin: 20px auto;
    padding: 12px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}
.btn-load-more:hover {
    transform: translateY(-2px);
    filter: brightness(1.2);
}

.date-footer {
    display: block;
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 10px;
    text-align: right;
    font-style: italic;
    opacity: 0.8;
}


/* --- ESTILOS PARA TABELAS DENTRO DOS POSTS --- */
#content-area table {
    width: 100%;
    border-collapse: collapse;
    margin: 15px 0;
    background: #0f172a;
    color: #f8fafc;
    font-size: 0.85rem;
    border: 1px solid var(--border);
}

#content-area th {
    background: #1e293b;
    color: var(--primary);
    text-align: left;
    padding: 12px;
    border: 1px solid var(--border);
}

#content-area td {
    border: 1px solid var(--border);
    padding: 12px;
    vertical-align: middle;
}

/* Coluna de Check na Tabela */
.td-check {
    cursor: pointer;
    text-align: center;
    font-size: 1.1rem;
    user-select: none;
    transition: 0.2s;
    width: 60px;
}

.td-check:hover {
    background: rgba(99, 102, 241, 0.1);
}

/* Linha Concluída na Tabela */
tr.row-done {
    background-color: rgba(22, 163, 74, 0.1) !important;
    text-decoration: line-through;
    color: var(--text-muted);
}

tr.row-done td {
    border-color: rgba(22, 163, 74, 0.2);
}

/* Ajuste para o texto dentro do check na tabela */
.td-check small {
    display: block;
    font-size: 0.6rem;
    line-height: 1;
    margin-top: 3px;
    color: #16a34a;
    font-weight: bold;
    text-decoration: none !important; /* Não riscar o nome de quem fez */
}

/* Esconde botões de edição de tabela e títulos de edição no visualizador */
#table-tools-container, 
#editor-title,
.btn-close-editor,
button[onclick*="LinhaTabela"],
button[onclick*="adicionarLinhaTabela"],
button[onclick*="removerLinhaTabela"] {
    display: none !important;
}

/* Garante que o conteúdo da tabela ocupe o espaço correto sem as ferramentas */
.post-content-body table {
    margin-top: 5px !important;
}

/* Quando a linha da tabela for concluída */
tr.row-done {
    background-color: rgba(22, 163, 74, 0.1) !important; /* Verde bem clarinho */
}

tr.row-done td {
    text-decoration: line-through; /* Risca o texto */
    color: #94a3b8; /* Cor de texto "apagada" */
}

/* Garante que o nome de quem fez não fique riscado e seja legível */
.td-check small {
    text-decoration: none !important;
    display: block;
    margin-top: 4px;
}

    </style>
</head>

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        // Se não houver usuário logado, vai para o login
        window.location.href = "login.html";
    } else {
        try {
            // Busca os dados do usuário no Firestore para verificar o status
            const userRef = doc(db, "users", user.uid);

            if (userSnap.exists() && userSnap.data().status === true) {
                // --- USUÁRIO AUTORIZADO ---

                console.log("Usuário Autenticado:", loggedInUserName);

        let allDocs = [];

async function init() {
    showLoading(); // Começa mostrando
    try {
        const uSnap = await getDocs(collection(db, "users"));
        allUsers = uSnap.docs.map(d => ({ id: d.id, nome: d.data().nome }));
        
        const snap = await getDocs(query(collection(db, "docs"), orderBy("createdAt", "asc")));
        allDocs = snap.docs.map(d => ({id: d.id, ...d.data()}));
        renderSidebar();

}

const loader = document.getElementById('loading-screen');

function showLoading() {
    loader.classList.remove('loader-hidden');
}

function hideLoading() {
    loader.classList.add('loader-hidden');
}

   function renderSidebar() {

            containerFilhos.appendChild(fDiv);

            const containerNetos = fDiv.querySelector(`#folder-${f.id}`);
            const netos = allDocs.filter(d => d.categoria === 'neto' && d.categoriaFilho === f.nome).sort((a,b) => a.ordem - b.ordem);

// 2. Seleção de Tópico com persistência de Cards para Bisnetos
window.selectTopic = async (docId) => {
    if (typeof showLoading === 'function') showLoading();

    try {
        const ref = allDocs.find(d => d.id === docId);
        if (!ref) return;

        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('tree-active'));
        const selectedMenu = document.getElementById(`menu-${docId}`);
        if (selectedMenu) selectedMenu.classList.add('tree-active');

        const area = document.getElementById('content-area');
        const tabsContainer = document.getElementById('sub-tabs');
        const header = document.getElementById('topic-header');

        area.innerHTML = "";
        tabsContainer.classList.add('hidden');

        // FILTRO DE POSTS
        currentTopicData.posts = allDocs.filter(d => {
            const mesmoNome = d.nome === ref.nome;
            const mesmaCat = d.categoria === ref.categoria;
            let linhagemCorreta = true;
            if (ref.categoria === 'filho') linhagemCorreta = d.categoriaPai === ref.categoriaPai;
            else if (ref.categoria === 'neto') linhagemCorreta = d.categoriaPai === ref.categoriaPai && d.categoriaFilho === ref.categoriaFilho;
            else if (ref.categoria === 'bisneto') linhagemCorreta = d.categoriaPai === ref.categoriaPai && d.categoriaFilho === ref.categoriaFilho && d.categoriaNeto === ref.categoriaNeto;
            return mesmoNome && mesmaCat && linhagemCorreta;
        });

        // BUSCA NAS COLEÇÕES (Isso já estava ok no seu código)
        const collectionsList = ['legislacoes', 'construcoes', 'acoes', 'midia'];
        for (const col of collectionsList) {
            const snap = await getDocs(collection(db, col));
            currentTopicData[col] = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(item => {
                return item.vinculos?.some(v => {
                    if (ref.categoria === 'pai') return v.pai === ref.nome && !v.filho;
                    if (ref.categoria === 'filho') return v.pai === ref.categoriaPai && v.filho === ref.nome && !v.neto;
                    if (ref.categoria === 'neto') return v.pai === ref.categoriaPai && v.filho === ref.categoriaFilho && v.neto === ref.nome && !v.bisneto;
                    if (ref.categoria === 'bisneto') return v.pai === ref.categoriaPai && v.filho === ref.categoriaFilho && v.neto === ref.categoriaNeto && v.bisneto === ref.nome;
                    return false;
                });
            });
        }

        header.innerHTML = `<h1>${ref.nome}</h1>`;
        renderTabs();
        
        // AQUI É ONDE DESENHAMOS OS POSTS NA TELA - AGORA COM O DATA-ID
        area.innerHTML = '';
        currentTopicData.posts.forEach(p => {
            const isDone = p.status === 'done';
            area.innerHTML += `
                <div class="post-block ${isDone ? 'done-card' : ''}" data-id="${p.id}">
                    <div class="card-check ${isDone ? 'checked' : ''}" onclick="openCheckModal('docs', '${p.id}', ${isDone})">
                        ${isDone ? '✅' : '⬜'}
                    </div>
                    <div class="post-content-body">
                        ${p.textoHtml}
                    </div>
                </div>`;
        });

        document.querySelector('.main-content').scrollTop = 0;
    } catch (error) {
        console.error("Erro:", error);
    } finally {
        if (typeof hideLoading === 'function') hideLoading();
    }
};

window.viewLatest = async () => {
    showLoading();
    const area = document.getElementById('content-area');
    document.getElementById('topic-header').innerHTML = "<h1>Últimas Atualizações</h1>";
    document.getElementById('cards-container').innerHTML = '';
    document.getElementById('sub-tabs').classList.add('hidden');
    area.innerHTML = '';

    const collectionsList = ['docs', 'legislacoes', 'construcoes', 'acoes', 'midia'];
    const promises = collectionsList.map(col => getDocs(query(collection(db, col), orderBy("createdAt", "desc"), limit(30))));
    const snapshots = await Promise.all(promises);
    
    let combined = [];
    snapshots.forEach((snap, idx) => snap.forEach(d => combined.push({ id: d.id, ...d.data(), type: collectionsList[idx] })));
    combined.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));

    combined.forEach(item => {
        const isDone = item.status === 'done';
        const docId = item.id; // <--- CAPTURA O ID AQUI

        area.innerHTML += `
            <div class="post-block ${isDone ? 'done-card' : ''}" data-id="${docId}">
                <div class="card-check ${isDone ? 'checked' : ''}" onclick="openCheckModal('${item.type}', '${docId}', ${isDone})">
                    ${isDone ? '✅' : '⬜'}
                </div>
                <div class="post-content-body">
                    ${item.type === 'docs' ? item.textoHtml : `<h3>${item.nome}</h3><p>${item.descricao}</p>`}
                </div>
            </div>`;
    });
    hideLoading();
};

// Função unificada para Gravar ou Limpar o "Feito"
window.processarCheck = async (userName) => {
    try {
        const { col, docId } = currentTaskRef;
        const docRef = doc(db, col, docId); 
        
        const marcarComoFeito = userName !== null;

        const novosDados = marcarComoFeito 
            ? { 
                concluidoPor: userName, 
                userIdConcluiu: loggedInUserId,
                status: 'done',
                concluido: "sim"
              } 
            : { 
                concluidoPor: "", 
                userIdConcluiu: "",
                status: "",
                concluido: ""
              };

        // 1. Grava no Firebase
        await updateDoc(docRef, novosDados);

        // 2. Atualiza os dados no cache local (allDocs)
        const itemLocal = allDocs.find(d => d.id === docId);
        if (itemLocal) {
            itemLocal.status = novosDados.status;
            itemLocal.concluidoPor = novosDados.concluidoPor;
        }

        // 3. ATUALIZAÇÃO VISUAL "SILENCIOSA" (Sem recarregar a página)
        // Procura o card na tela pelo ID ou pela função de clique
        const cardsNaTela = document.querySelectorAll(`[onclick*="'${docId}'"]`);
        
        cardsNaTela.forEach(elementoClicavel => {
            // Acha o container principal do card (post-block ou item-list-card)
            const cardContainer = elementoClicavel.closest('.post-block') || elementoClicavel.closest('.item-list-card');
            
            if (cardContainer) {
                if (marcarComoFeito) {
                    cardContainer.classList.add('done-card');
                    elementoClicavel.classList.add('checked');
                    elementoClicavel.innerHTML = '✅';
                    
                    // Adiciona a nota de rodapé "Concluído por..." se não existir
                    if (!cardContainer.querySelector('.done-by-note')) {
                        const note = document.createElement('div');
                        note.className = 'done-by-note';
                        note.style.cssText = "font-size:0.7rem; color:#16a34a; margin-top:12px; font-weight:bold;";
                        note.innerHTML = `✅ Concluído por: ${userName}`;
                        cardContainer.appendChild(note);
                    }
                } else {
                    // Se estiver desfazendo
                    cardContainer.classList.remove('done-card');
                    elementoClicavel.classList.remove('checked');
                    elementoClicavel.innerHTML = '⬜';
                    const note = cardContainer.querySelector('.done-by-note');
                    if (note) note.remove();
                }
            }
        });

        // 4. Fecha os modais
        if(document.getElementById('user-modal')) document.getElementById('user-modal').style.display = 'none';
        if(document.getElementById('undo-modal')) document.getElementById('undo-modal').style.display = 'none';
        
        console.log("Check processado silenciosamente.");

    } catch (e) {
        console.error("Erro ao processar check:", e);
        alert("Erro ao salvar alteração.");
    }
};

const formatarData = (ts) => {
    if (!ts) return "Data não disponível";
    
    try {
        let date;
        // Se for o objeto Timestamp do Firestore (tem o método toDate)
        if (ts && typeof ts.toDate === 'function') {
            date = ts.toDate();
        } 
        // Se for um objeto com seconds (às vezes o Firebase retorna assim em cache)
        else if (ts && ts.seconds) {
            date = new Date(ts.seconds * 1000);
        }
        // Se já for uma instância de Date ou string/number
        else {
            date = new Date(ts);
        }

        // Verifica se a data é válida antes de formatar
        if (isNaN(date.getTime())) return "Data não disponível";

        return date.toLocaleDateString('pt-BR', { 
            day: '2-digit', 
            month: '2-digit', 
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    } catch (e) {
        console.error("Erro ao formatar data:", e, ts);
        return "Data não disponível";
    }
};

    if (!docId) {
        console.error("Erro: Não foi possível encontrar o atributo data-id no container:", container);
        alert("Erro técnico: O ID deste documento não foi carregado corretamente. Por favor, atualize a página.");
        return;
    }

    const row = cell.parentElement;

    // 2. Se a linha já estiver concluída, abre o modal de Desfazer
    if (row.classList.contains('row-done')) {
        // Configuramos a função de desfazer específica para esta célula/linha
        window.confirmarDesfazer = async () => {
            document.getElementById('undo-modal').style.display = 'none';
            await executarToggleTabela(docId, cell, row, false);
        };
        document.getElementById('undo-modal').style.display = 'flex';
    } else {
        // 3. Se não estiver concluída, marca agora
        await executarToggleTabela(docId, cell, row, true);
    }
});

// Função que altera o HTML e salva no Firebase
async function executarToggleTabela(docId, cell, row, marcarComoFeito) {
    // Referência ao corpo do conteúdo que será salvo
    const postBlock = cell.closest('.post-block');
    const contentBody = postBlock.querySelector('.post-content-body');

    if (marcarComoFeito) {
        row.classList.add('row-done');
        // Usa o nome do usuário capturado no onAuthStateChanged da página
        cell.innerHTML = `✅<br><small style="font-size:0.6rem; display:block; line-height:1; color:#16a34a; font-weight:bold; text-decoration:none !important;">${loggedInUserName}</small>`;
    } else {
        row.classList.remove('row-done');
        cell.innerHTML = `✔️`;
    }

    // 4. Salva o HTML modificado no Firebase
    try {
        const docRef = doc(db, "docs", docId);
        
        // Pegamos o HTML exatamente como está agora (com as novas classes e nomes)
        const novoTextoHtml = contentBody.innerHTML.trim();

        await updateDoc(docRef, {
            textoHtml: novoTextoHtml
        });

        console.log("Progresso da tabela salvo com sucesso!");
    } catch (error) {
        console.error("Erro ao salvar progresso da tabela:", error);
        alert("Houve um erro ao salvar o check na tabela. Verifique sua conexão.");
    }
}

// Função que realmente faz a mudança visual e salva no Firebase
async function executarAcaoTabela(docId, cell, row, marcarComoFeito) {
    if (marcarComoFeito) {
        row.classList.add('row-done');
        // Adiciona o ✅ e o nome do usuário logado embaixo
        cell.innerHTML = `✅<br><small style="font-size:0.6rem; display:block; line-height:1; color:#16a34a; font-weight:bold; text-decoration:none !important;">${loggedInUserName}</small>`;
    } else {
        row.classList.remove('row-done');
        cell.innerHTML = `✔️`;
    }

    // Identifica o bloco de conteúdo para salvar
    const postBlock = cell.closest('.post-block');
    const contentBody = postBlock.querySelector('.post-content-body');
    
    if (!contentBody) {
        console.error("Erro: Não foi possível encontrar o corpo do conteúdo para salvar.");
        return;
    }

    const novoHtmlParaSalvar = contentBody.innerHTML.trim();

    try {
        // Importação dinâmica para garantir que as funções do Firebase estejam disponíveis
        const { doc, updateDoc, getFirestore } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
        const db = getFirestore();
        
        await updateDoc(doc(db, "docs", docId), { 
            textoHtml: novoHtmlParaSalvar 
        });
        
        console.log("Tabela salva com sucesso no Firebase!");
    } catch (error) {
        console.error("Erro ao salvar tabela:", error);
    }
}

async function atualizarTabelaNoFirebase(docId, cell, row, marcarComoFeito) {
    if (marcarComoFeito) {
        row.classList.add('row-done');
        cell.innerHTML = `✅<br><small>${loggedInUserName}</small>`;
    } else {
        row.classList.remove('row-done');
        cell.innerHTML = `✔️`;
    }

    // Pega o HTML atualizado do bloco (com as novas classes e símbolos)
    const postBlock = cell.closest('.post-block');
    // Removemos os elementos que não devem ser salvos no HTML (como o ícone de check flutuante do card)
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = postBlock.innerHTML;
    
    // Limpa elementos de interface antes de salvar a string HTML
    const checkCard = tempDiv.querySelector('.card-check');
    if (checkCard) checkCard.remove();
    const footer = tempDiv.querySelector('.date-footer');
    if (footer) footer.remove();
    const userNote = tempDiv.querySelector('div[style*="color:#16a34a"]');
    if (userNote) userNote.remove();

    const novoHtml = tempDiv.innerHTML.trim();

    try {
        const { doc, updateDoc, getFirestore } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
        const db = getFirestore();
        await updateDoc(doc(db, "docs", docId), { textoHtml: novoHtml });
        console.log("Tabela atualizada no Firebase!");
    } catch (error) {
        console.error("Erro ao salvar tabela:", error);
        alert("Erro ao salvar progresso da tabela.");
    }
}
