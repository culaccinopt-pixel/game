<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual - Visualizador Pro</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <style>
        :root { 
            --primary: #6366f1; --bg: #0f172a; --sidebar-bg: #1e293b;
            --white: #f8fafc; --border: #334155; --text-muted: #94a3b8;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: var(--bg); color: var(--white); }
        
        .sidebar { width: 300px; background: var(--sidebar-bg); border-left: 1px solid var(--border); padding: 20px; order: 2; overflow-y: auto; display: flex; flex-direction: column; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; order: 1; scroll-behavior: smooth; }
        .content-wrapper { max-width: 1000px; margin: 0 auto; }

        /* Filtros Sidebar */
        .sidebar-nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 25px; }
        .nav-filter-btn { background: #0f172a; border: 1px solid var(--border); color: var(--text-muted); padding: 10px 5px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: 0.3s; }
        .nav-filter-btn:hover { border-color: var(--primary); color: var(--white); }
        .nav-filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Árvore Lateral */
        .tree-parent { padding: 8px; cursor: pointer; font-weight: bold; border-radius: 6px; color: #e2e8f0; font-size: 0.9rem; margin-top: 5px; }
        .tree-parent:hover { background: #334155; color: var(--primary); }
        .tree-children { margin-left: 20px; display: none; border-left: 1px solid #475569; }
        .tree-children.show { display: block; }
        .tree-child { padding: 4px 15px; cursor: pointer; color: var(--text-muted); font-size: 0.8rem; }
        .tree-child:hover { color: var(--white); }

        /* Sub-Abas */
        .sub-tabs-container { display: flex; gap: 15px; border-bottom: 1px solid var(--border); margin: 20px 0 30px 0; }
        .tab-item { padding: 10px 5px; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-item.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* Cards de Navegação (Agora mostram o próximo nível sempre) */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 40px; }
        .nav-card { background: #1e293b; border: 1px solid var(--border); padding: 18px 10px; border-radius: 8px; cursor: pointer; text-align: center; font-weight: 600; font-size: 0.85rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; min-height: 50px; }
        .nav-card:hover { border-color: var(--primary); transform: translateY(-2px); background: #334155; }
        
        .post-block { background: #1e293b; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); }
        .item-list-card { background: #1e293b; padding: 20px; border-radius: 10px; border-left: 4px solid var(--primary); margin-bottom: 15px; border: 1px solid var(--border); border-left-width: 4px; }
        
        h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 5px; }
        .hidden { display: none; }
        .tag { background: #312e81; color: #c7d2fe; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; margin-right: 8px; font-weight: 600; }
    </style>
</head>
<body>
    <main class="main-content">
        <div class="content-wrapper">
            <!-- Grid de Navegação Hierárquica -->
            <div id="cards-container" class="cards-grid"></div>
            
            <div id="main-display">
                <div id="topic-header">
                    <h1>Manual do Jogo</h1>
                    <p style="color: var(--text-muted);">Explore a documentação selecionando uma categoria.</p>
                </div>
                <div id="sub-tabs" class="sub-tabs-container hidden"></div>
                <div id="content-area"></div>
            </div>
        </div>
    </main>

    <aside class="sidebar">
        <div class="sidebar-nav-grid">
            <button class="nav-filter-btn" onclick="viewLatest()">Últimas</button>
            <button class="nav-filter-btn" onclick="viewCollection('legislacoes', 'Legislações')">Leis</button>
            <button class="nav-filter-btn" onclick="viewCollection('construcoes', 'Obras')">Obras</button>
            <button class="nav-filter-btn" onclick="viewCollection('acoes', 'Ações')">Ações</button>
        </div>
        <div id="tree-menu"></div>
    </aside>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDPLJ4Ln3Ton-DxsJ0tEKeioWHnV01Plo0",
            authDomain: "politicalgame-30215.firebaseapp.com",
            projectId: "politicalgame-30215",
            storageBucket: "politicalgame-30215.firebasestorage.app",
            messagingSenderId: "736655823319",
            appId: "1:736655823319:web:60ebdc530e101784b9bb92"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allDocs = [];
        let currentTopicData = { posts: [], legislacoes: [], construcoes: [], acoes: [], name: "" };

        async function init() {
            const snap = await getDocs(query(collection(db, "docs"), orderBy("createdAt", "asc")));
            allDocs = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderSidebar();
        }

        function renderSidebar() {
            const menu = document.getElementById('tree-menu');
            menu.innerHTML = '';
            const pais = [...new Set(allDocs.filter(d => d.categoria === 'pai').map(p => p.nome))];
            pais.forEach(pName => {
                const firstId = allDocs.find(d => d.nome === pName).id;
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="tree-parent" onclick="toggleFolder('${firstId}', '${pName}')">📁 ${pName}</div>
                    <div class="tree-children" id="child-of-${firstId}">
                        ${allDocs.filter(d => d.categoria === 'filho' && d.categoriaPai === pName)
                            .map(f => `<div class="tree-child" onclick="selectTopic('${f.nome}')">└ ${f.nome}</div>`).join('')}
                    </div>
                `;
                menu.appendChild(div);
            });
        }

        window.toggleFolder = (id, nome) => {
            const target = document.getElementById(`child-of-${id}`);
            if(target) {
                const isVisible = target.classList.contains('show');
                document.querySelectorAll('.tree-children').forEach(e => e.classList.remove('show'));
                if(!isVisible) target.classList.add('show');
            }
            selectTopic(nome);
        };

        window.selectTopic = async (nome) => {
            const cards = document.getElementById('cards-container');
            const tabsContainer = document.getElementById('sub-tabs');
            const area = document.getElementById('content-area');
            const header = document.getElementById('topic-header');
            
            cards.innerHTML = '';
            area.innerHTML = "Carregando...";
            tabsContainer.classList.add('hidden');

            const ref = allDocs.find(d => d.nome === nome);
            if(!ref) return;

            // 1. FILTRO ESTRITO (Match exato da hierarquia)
            const collections = ['legislacoes', 'construcoes', 'acoes'];
            for (const col of collections) {
                const snap = await getDocs(collection(db, col));
                currentTopicData[col] = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(item => {
                    return item.vinculos?.some(v => {
                        if (ref.categoria === 'pai') return v.pai === nome && (!v.filho || v.filho === "");
                        if (ref.categoria === 'filho') return v.pai === ref.categoriaPai && v.filho === nome && (!v.neto || v.neto === "");
                        if (ref.categoria === 'neto') return v.pai === ref.categoriaPai && v.filho === ref.categoriaFilho && v.neto === nome && (!v.bisneto || v.bisneto === "");
                        if (ref.categoria === 'bisneto') return v.pai === ref.categoriaPai && v.filho === ref.categoriaFilho && v.neto === ref.categoriaNeto && v.bisneto === nome;
                        return false;
                    });
                });
            }

            currentTopicData.posts = allDocs.filter(d => d.nome === nome);

            // 2. NAVEGAÇÃO DE CARDS (Próximo nível)
            let subItems = [];
            if(ref.categoria === 'pai') subItems = allDocs.filter(d => d.categoria === 'filho' && d.categoriaPai === nome);
            if(ref.categoria === 'filho') subItems = allDocs.filter(d => d.categoria === 'neto' && d.categoriaFilho === nome);
            if(ref.categoria === 'neto') subItems = allDocs.filter(d => d.categoria === 'bisneto' && d.categoriaNeto === nome);
            
            [...new Set(subItems.map(s => s.nome))].forEach(sName => {
                const c = document.createElement('div');
                c.className = 'nav-card';
                c.innerText = sName;
                c.onclick = () => selectTopic(sName);
                cards.appendChild(c);
            });

            header.innerHTML = `<h1>${nome}</h1>${ref.tags ? `<div>${ref.tags.split(',').map(t => `<span class="tag">#${t.trim()}</span>`).join('')}</div>` : ''}`;
            renderTabs();
            renderTabContent('tudo');
            document.querySelector('.main-content').scrollTop = 0;
        };

        function renderTabs() {
            const tabsContainer = document.getElementById('sub-tabs');
            tabsContainer.innerHTML = '';
            const tabs = [{ id: 'tudo', label: 'Tudo' }];
            if(currentTopicData.legislacoes.length > 0) tabs.push({ id: 'legislacoes', label: `Leis (${currentTopicData.legislacoes.length})` });
            if(currentTopicData.construcoes.length > 0) tabs.push({ id: 'construcoes', label: `Obras (${currentTopicData.construcoes.length})` });
            if(currentTopicData.acoes.length > 0) tabs.push({ id: 'acoes', label: `Ações (${currentTopicData.acoes.length})` });

            if(tabs.length > 1) {
                tabsContainer.classList.remove('hidden');
                tabs.forEach(t => {
                    const btn = document.createElement('div');
                    btn.className = `tab-item ${t.id === 'tudo' ? 'active' : ''}`;
                    btn.innerText = t.label;
                    btn.onclick = () => {
                        document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
                        btn.classList.add('active');
                        renderTabContent(t.id);
                    };
                    tabsContainer.appendChild(btn);
                });
            }
        }

        function renderTabContent(tabId) {
            const area = document.getElementById('content-area');
            area.innerHTML = '';
            const renderItem = (i, color) => `<div class="item-list-card" style="border-left-color: ${color}"><h3>${i.nome}</h3><p>${i.descricao || 'Sem descrição.'}</p></div>`;

            if(tabId === 'tudo' || tabId === 'posts') {
                currentTopicData.posts.forEach(p => area.innerHTML += `<div class="post-block">${p.textoHtml}</div>`);
            }
            if(tabId === 'tudo' || tabId === 'legislacoes') currentTopicData.legislacoes.forEach(i => area.innerHTML += renderItem(i, '#6366f1'));
            if(tabId === 'tudo' || tabId === 'construcoes') currentTopicData.construcoes.forEach(i => area.innerHTML += renderItem(i, '#16a34a'));
            if(tabId === 'tudo' || tabId === 'acoes') currentTopicData.acoes.forEach(i => area.innerHTML += renderItem(i, '#f59e0b'));
            
            if(!area.innerHTML) area.innerHTML = "<p style='color:var(--text-muted)'>Nenhum conteúdo vinculado diretamente a este nível.</p>";
        }

        // Funções da Sidebar
        window.viewCollection = async (col, title) => {
            document.getElementById('sub-tabs').classList.add('hidden');
            document.getElementById('cards-container').innerHTML = '';
            const area = document.getElementById('content-area');
            area.innerHTML = 'Carregando...';
            const snap = await getDocs(collection(db, col));
            document.getElementById('topic-header').innerHTML = `<h1>${title}</h1>`;
            area.innerHTML = '';
            snap.forEach(d => { area.innerHTML += `<div class="item-list-card"><h3>${d.data().nome}</h3><p>${d.data().descricao || ''}</p></div>`; });
        };

        init();
    </script>
</body>
</html>
