<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual - Visualizador Completo</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <style>
        :root { 
            --primary: #6366f1; --bg: #0f172a; --sidebar-bg: #1e293b;
            --white: #f8fafc; --border: #334155; --text-muted: #94a3b8;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: var(--bg); color: var(--white); }
        
        .sidebar { width: 300px; background: var(--sidebar-bg); border-left: 1px solid var(--border); padding: 20px; order: 2; overflow-y: auto; display: flex; flex-direction: column; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; order: 1; scroll-behavior: smooth; }
        .content-wrapper { max-width: 1000px; margin: 0 auto; }

        /* Navegação Sidebar (4 Botões) */
        .sidebar-nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 25px; }
        .nav-filter-btn { background: #0f172a; border: 1px solid var(--border); color: var(--text-muted); padding: 10px 5px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: 0.3s; }
        .nav-filter-btn:hover { border-color: var(--primary); color: var(--white); }
        .nav-filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Menu de Árvore */
        .tree-parent { padding: 8px; cursor: pointer; font-weight: bold; border-radius: 6px; color: #e2e8f0; font-size: 0.9rem; margin-top: 5px; }
        .tree-parent:hover { background: #334155; color: var(--primary); }
        .tree-children { margin-left: 20px; display: none; border-left: 1px solid #475569; }
        .tree-children.show { display: block; }
        .tree-child { padding: 4px 15px; cursor: pointer; color: var(--text-muted); font-size: 0.8rem; }
        .tree-child:hover { color: var(--white); }

        /* Sub-Abas Dinâmicas */
        .sub-tabs-container { display: flex; gap: 15px; border-bottom: 1px solid var(--border); margin: 20px 0 30px 0; }
        .tab-item { padding: 10px 5px; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-item.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* Navegação por Cards Superior */
.cards-grid { 
    display: grid; 
    /* Diminuído de 160px para 120px para caberem mais na mesma linha */
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
    gap: 8px; 
    margin-bottom: 20px; 
}
        .nav-card { 
    background: #1e293b; 
    border: 1px solid var(--border); 
    /* Diminuído o padding de 18px para 8px */
    padding: 8px 10px; 
    border-radius: 6px; 
    cursor: pointer; 
    text-align: center; 
    font-weight: 600; 
    /* Diminuído levemente a fonte */
    font-size: 0.75rem; 
    transition: 0.3s; 
    /* Diminuído a altura mínima de 50px para 35px */
    min-height: 35px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
}

        .nav-card:hover { border-color: var(--primary); transform: translateY(-2px); background: #334155; }
        
        /* Blocos de Conteúdo */
        .post-block { background: #1e293b; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); line-height: 1.6; }
        .item-list-card { background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid var(--border); border-left: 4px solid var(--primary); margin-bottom: 15px; }
        .item-list-card h3 { margin: 0 0 8px 0; font-size: 1.1rem; color: var(--white); }
        .item-list-card p { margin: 0; color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }

        .tag { background: #312e81; color: #c7d2fe; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; margin-right: 8px; font-weight: 600; }
        h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 10px; margin-top: 0; }
        .hidden { display: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    
    /* Ajuste para múltiplos níveis na árvore */
.tree-children { margin-left: 15px; display: none; border-left: 1px solid #334155; }
.tree-children.show { display: block; }
.tree-child { padding: 4px 10px; cursor: pointer; color: var(--text-muted); font-size: 0.8rem; transition: 0.2s; }
.tree-child:hover { color: var(--primary); background: rgba(99, 102, 241, 0.1); }
.tree-child.active-text { color: var(--primary); font-weight: bold; }

/* Estilo para o card selecionado no topo */
.nav-card.active-card { border-color: var(--primary); background: var(--primary); color: white; }

/* Cor de destaque para o item selecionado no menu */
.tree-active { 
    color: var(--primary) !important; 
    font-weight: 700 !important;
    background: rgba(99, 102, 241, 0.1); /* Um fundo leve para destacar */
    border-radius: 4px;
}
.btn-back {
    background: #1e293b;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.75rem;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 15px;
    transition: 0.3s;
}

.btn-back:hover {
    background: #334155;
    color: var(--primary);
    border-color: var(--primary);
}

/* Estilo para o ícone de Check */
.card-check { position: absolute; top: 15px; right: 15px; cursor: pointer; color: #475569; font-size: 1.2rem; transition: 0.3s; z-index: 10; }
.card-check:hover { color: var(--primary); transform: scale(1.2); }
.card-check.checked { color: #16a34a; }

/* Estado Concluído */
.done-card { border: 2px solid #16a34a !important; background: rgba(22, 163, 74, 0.05) !important; }
.post-block, .item-list-card { position: relative; transition: 0.3s; }

/* Modal de Usuários */
#user-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 9999; }
.user-modal-content { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid var(--primary); width: 320px; max-height: 80vh; overflow-y: auto; }
.user-option { padding: 12px; margin-bottom: 8px; background: #0f172a; border-radius: 6px; cursor: pointer; transition: 0.2s; border: 1px solid var(--border); text-align: center; }
.user-option:hover { background: var(--primary); border-color: white; }


   :root { 
            --primary: #6366f1; --bg: #0f172a; --sidebar-bg: #1e293b;

        }

            padding: 20px; 
            order: 2; 
            overflow-y: auto; 
            display: flex;

        }

        .main-content { 
            flex: 1; 
            padding: 40px; 
            overflow-y: auto;

            scroll-behavior: smooth; 
        }

        .content-wrapper { max-width: 1000px; margin: 0 auto; }

        /* Navegação Sidebar */
        .sidebar-nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 25px; }
        .nav-filter-btn { background: #0f172a; border: 1px solid var(--border); color: var(--text-muted); padding: 10px 5px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: 0.3s; }
        .nav-filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Menu de Árvore */
        .tree-parent { padding: 10px; cursor: pointer; font-weight: bold; border-radius: 6px; color: #e2e8f0; font-size: 0.9rem; margin-top: 5px; }
        .tree-child { padding: 8px 15px; cursor: pointer; color: var(--text-muted); font-size: 0.85rem; }
        .tree-active { color: var(--primary) !important; font-weight: 700 !important; background: rgba(99, 102, 241, 0.1); }

        /* Sub-Abas (Scrollable no Mobile) */
        .sub-tabs-container { 
            display: flex; 
            gap: 15px; 
            border-bottom: 1px solid var(--border); 
            margin: 20px 0 30px 0; 
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none; /* Firefox */
        }
        .sub-tabs-container::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .tab-item { padding: 10px 5px; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); border-bottom: 3px solid transparent; }
        .tab-item.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* Cards Superior */
        .cards-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 10px; 
            margin-bottom: 20px; 
        }

        .nav-card { 
            background: #1e293b; 
            border: 1px solid var(--border); 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            text-align: center; 
            font-weight: 600; 
            font-size: 0.8rem; 
            min-height: 45px;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-card.active-card { border-color: var(--primary); background: var(--primary); color: white; }

        /* Blocos de Conteúdo */
        .post-block { background: #1e293b; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); line-height: 1.6; position: relative; }
        .item-list-card { background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid var(--border); border-left: 4px solid var(--primary); margin-bottom: 15px; position: relative; }

        /* Check e Modais */
        .card-check { position: absolute; top: 15px; right: 15px; cursor: pointer; color: #475569; font-size: 1.3rem; }
        .card-check.checked { color: #16a34a; }
        .done-card { border: 2px solid #16a34a !important; background: rgba(22, 163, 74, 0.05) !important; }

        /* Overlay Mobile */
        .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 999; backdrop-filter: blur(3px); }

        /* RESPONSIVIDADE */
        @media (max-width: 1024px) {
            .mobile-header { display: flex; }
            
            .sidebar {
                position: fixed;
                top: 0; right: 0; bottom: 0;
                z-index: 1001;
                transform: translateX(100%); /* Escondido */
                width: 280px;
                order: unset;
            }
            .sidebar.active { transform: translateX(0); }
            .overlay.active { display: block; }

            .main-content { 
                padding: 80px 15px 40px 15px; 
                order: unset; 
                width: 100%;
            }

            h1 { font-size: 1.8rem; }
            
            .cards-grid {
                display: flex;
                overflow-x: auto;
                padding-bottom: 10px;
                scrollbar-width: none;
            }
            .nav-card { min-width: 130px; }
            
            .post-block { padding: 15px; }
        }

/* Estilo do Spinner */
.spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(99, 102, 241, 0.1);
    border-top: 4px solid var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Classe para esconder com transição */
.loader-hidden {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
}

.btn-load-more {
    display: block;
    width: 200px;

}

.date-footer {
    display: block;
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 10px;
    text-align: right;
    font-style: italic;
    opacity: 0.8;
}

<body>

<!-- Modal de Confirmação para Desfazer -->

    <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"; // Adicione getAuth e onAuthStateChanged
import { getFirestore, collection, getDocs, query, orderBy, limit, doc, getDoc, updateDoc, startAfter } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"; // Adicione getDoc


        const firebaseConfig = {
            apiKey: "AIzaSyDPLJ4Ln3Ton-DxsJ0tEKeioWHnV01Plo0",
            authDomain: "politicalgame-30215.firebaseapp.com",
            projectId: "politicalgame-30215",
            storageBucket: "politicalgame-30215.firebasestorage.app",
            messagingSenderId: "736655823319",
            appId: "1:736655823319:web:60ebdc530e101784b9bb92"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);


        // --- BLOCO DE SEGURANÇA ---
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        // Se não estiver logado, manda para o login
        window.location.href = "login.html";
    } else {
        // Se estiver logado, verifica o status no banco de dados
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists() || userSnap.data().status !== true) {
            alert("Acesso negado. Sua conta não está ativa.");
            await signOut(auth);
            window.location.href = "login.html";
        } else {
            // Usuário autorizado, inicia o app
            init();
        }
    }
});



        let allDocs = [];
        let currentTopicData = { posts: [], legislacoes: [], construcoes: [], acoes: [], midia: [], name: "" };
let allUsers = []; // Variável global para usuários
let currentTaskRef = null; // Para saber qual card estamos marcando
let lastVisibleDoc = null; // Para controlar o último documento carregado
let currentViewType = ''; // 'latest', 'collection' ou 'manual'
let currentCollectionName = '';
let manualLimit = 50;




async function init() {
    showLoading(); // Começa mostrando
    try {
        const uSnap = await getDocs(collection(db, "users"));
        allUsers = uSnap.docs.map(d => ({ id: d.id, nome: d.data().nome }));
        
        const snap = await getDocs(query(collection(db, "docs"), orderBy("createdAt", "asc")));
        allDocs = snap.docs.map(d => ({id: d.id, ...d.data()}));
        renderSidebar();
    } catch (e) {
        console.error(e);
    } finally {
        hideLoading(); // Esconde quando terminar (mesmo se der erro)
    }
}

const loader = document.getElementById('loading-screen');

function showLoading() {
    loader.classList.remove('loader-hidden');
}

function hideLoading() {
    loader.classList.add('loader-hidden');
}

   function renderSidebar() {
    const menu = document.getElementById('tree-menu');
    menu.innerHTML = '';
    
    const pais = allDocs.filter(d => d.categoria === 'pai').sort((a,b) => a.ordem - b.ordem);
    
    pais.forEach(p => {
        const pDiv = document.createElement('div');
        const hasFilhos = allDocs.some(d => d.categoria === 'filho' && d.categoriaPai === p.nome);
        
        pDiv.innerHTML = `
            <div class="tree-parent menu-item" id="menu-${p.id}" onclick="toggleFolder('folder-${p.id}', '${p.id}')">
                ${hasFilhos ? '📁' : '📄'} ${p.nome}
            </div>
            <div class="tree-children" id="folder-${p.id}"></div>
        `;
        menu.appendChild(pDiv);

        const containerFilhos = pDiv.querySelector(`#folder-${p.id}`);
        const filhos = allDocs.filter(d => d.categoria === 'filho' && d.categoriaPai === p.nome).sort((a,b) => a.ordem - b.ordem);
        
        filhos.forEach(f => {
            const fDiv = document.createElement('div');
            const hasNetos = allDocs.some(d => d.categoria === 'neto' && d.categoriaFilho === f.nome);
            
            fDiv.innerHTML = `
                <div class="tree-child menu-item" id="menu-${f.id}" onclick="toggleFolder('folder-${f.id}', '${f.id}')">
                    ${hasNetos ? '📂' : '└'} ${f.nome}
                </div>
                <div class="tree-children" id="folder-${f.id}" style="margin-left:15px"></div>
            `;
            containerFilhos.appendChild(fDiv);

            const containerNetos = fDiv.querySelector(`#folder-${f.id}`);
            const netos = allDocs.filter(d => d.categoria === 'neto' && d.categoriaFilho === f.nome).sort((a,b) => a.ordem - b.ordem);
            
            netos.forEach(n => {
                const nDiv = document.createElement('div');
                const hasBis = allDocs.some(d => d.categoria === 'bisneto' && d.categoriaNeto === n.nome);
                
                nDiv.innerHTML = `
                    <div class="tree-child menu-item" id="menu-${n.id}" onclick="toggleFolder('folder-${n.id}', '${n.id}')">
                        ${hasBis ? '📜' : '└'} ${n.nome}
                    </div>
                    <div class="tree-children" id="folder-${n.id}" style="margin-left:15px"></div>
                `;
                containerNetos.appendChild(nDiv);

                const containerBis = nDiv.querySelector(`#folder-${n.id}`);
                const bis = allDocs.filter(d => d.categoria === 'bisneto' && d.categoriaNeto === n.nome).sort((a,b) => a.ordem - b.ordem);
                
                bis.forEach(b => {
                    const bDiv = document.createElement('div');
                    bDiv.className = 'tree-child menu-item';
                    bDiv.id = `menu-${b.id}`;
                    bDiv.innerHTML = `└ ${b.nome}`;
                    bDiv.onclick = (e) => { e.stopPropagation(); selectTopic(b.id); };
                    containerBis.appendChild(bDiv);
                });
            });
        });
    });
}


    // Função auxiliar para abrir/fechar pastas
window.toggleFolder = (folderId, docId) => {
    const target = document.getElementById(folderId);
    if(target) target.classList.toggle('show');
    selectTopic(docId);
};


// 2. Seleção de Tópico com persistência de Cards para Bisnetos
window.selectTopic = async (docId) => {
    // 1. Inicia o carregamento (bloqueia a tela)
    if (typeof showLoading === 'function') showLoading();

    try {
        const ref = allDocs.find(d => d.id === docId);
        if (!ref) return;

        // 2. Destaque Visual no Menu Lateral
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('tree-active'));
        const selectedMenu = document.getElementById(`menu-${docId}`);
        if (selectedMenu) selectedMenu.classList.add('tree-active');

        const backContainer = document.getElementById('back-container');
        const cards = document.getElementById('cards-container');
        const area = document.getElementById('content-area');
        const tabsContainer = document.getElementById('sub-tabs');
        const header = document.getElementById('topic-header');

        area.innerHTML = "Processando informações...";
        tabsContainer.classList.add('hidden');
        backContainer.innerHTML = ''; 

        // 3. Lógica do Botão Voltar (Navegação Hierárquica)
        if (ref.categoria !== 'pai') {
            let paiId = null;
            if (ref.categoria === 'filho') {
                const p = allDocs.find(d => d.categoria === 'pai' && d.nome === ref.categoriaPai);
                if(p) paiId = p.id;
            } else if (ref.categoria === 'neto') {
                const p = allDocs.find(d => d.categoria === 'filho' && d.nome === ref.categoriaFilho && d.categoriaPai === ref.categoriaPai);
                if(p) paiId = p.id;
            } else if (ref.categoria === 'bisneto') {
                const p = allDocs.find(d => d.categoria === 'neto' && d.nome === ref.categoriaNeto && d.categoriaFilho === ref.categoriaFilho);
                if(p) paiId = p.id;
            }

            if (paiId) {
                const btn = document.createElement('button');
                btn.className = 'btn-back';
                btn.innerHTML = `← Voltar`;
                btn.onclick = () => selectTopic(paiId);
                backContainer.appendChild(btn);
            }
        }

        // 4. Filtro de Posts (Manual do Jogo)
        currentTopicData.posts = allDocs.filter(d => {
            const mesmoNome = d.nome === ref.nome;
            const mesmaCat = d.categoria === ref.categoria;
            let linhagemCorreta = true;
            if (ref.categoria === 'filho') linhagemCorreta = d.categoriaPai === ref.categoriaPai;
            else if (ref.categoria === 'neto') linhagemCorreta = d.categoriaPai === ref.categoriaPai && d.categoriaFilho === ref.categoriaFilho;
            else if (ref.categoria === 'bisneto') linhagemCorreta = d.categoriaPai === ref.categoriaPai && d.categoriaFilho === ref.categoriaFilho && d.categoriaNeto === ref.categoriaNeto;
            return mesmoNome && mesmaCat && linhagemCorreta;
        });

        // 5. Busca Assíncrona nas Coleções Vinculadas (Firebase)
        const collectionsList = ['legislacoes', 'construcoes', 'acoes', 'midia'];
        for (const col of collectionsList) {
            const snap = await getDocs(collection(db, col));
            currentTopicData[col] = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(item => {
                return item.vinculos?.some(v => {
                    if (ref.categoria === 'pai') return v.pai === ref.nome && !v.filho;
                    if (ref.categoria === 'filho') return v.pai === ref.categoriaPai && v.filho === ref.nome && !v.neto;
                    if (ref.categoria === 'neto') return v.pai === ref.categoriaPai && v.filho === ref.categoriaFilho && v.neto === ref.nome && !v.bisneto;
                    if (ref.categoria === 'bisneto') return v.pai === ref.categoriaPai && v.filho === ref.categoriaFilho && v.neto === ref.categoriaNeto && v.bisneto === ref.nome;
                    return false;
                });
            });
        }

        // 6. Cards de Navegação Superior
        let subItems = [];
        if (ref.categoria === 'bisneto') {
            subItems = allDocs.filter(d => d.categoria === 'bisneto' && d.categoriaNeto === ref.categoriaNeto);
        } else {
            if(ref.categoria === 'pai') subItems = allDocs.filter(d => d.categoria === 'filho' && d.categoriaPai === ref.nome);
            if(ref.categoria === 'filho') subItems = allDocs.filter(d => d.categoria === 'neto' && d.categoriaFilho === ref.nome);
            if(ref.categoria === 'neto') subItems = allDocs.filter(d => d.categoria === 'bisneto' && d.categoriaNeto === ref.nome);
        }

        cards.innerHTML = '';
        subItems.sort((a,b) => a.ordem - b.ordem).forEach(s => {
            const c = document.createElement('div');
            c.className = `nav-card ${s.id === docId ? 'active-card' : ''}`; 
            c.innerText = s.nome;
            c.onclick = () => selectTopic(s.id);
            cards.appendChild(c);
        });

        // 7. Renderização Final da UI
        header.innerHTML = `<h1>${ref.nome}</h1>`;
        renderTabs();
        renderTabContent('tudo');
        
        // Scroll para o topo
        document.querySelector('.main-content').scrollTop = 0;

        // Se estiver no mobile, fecha o menu lateral após selecionar
        if (window.innerWidth <= 1024 && typeof toggleMenu === 'function') {
            const sb = document.getElementById('sidebar');
            if(sb.classList.contains('active')) toggleMenu();
        }

    } catch (error) {
        console.error("Erro ao carregar tópico:", error);
        area.innerHTML = "<p style='color:red'>Erro ao carregar conteúdo. Tente novamente.</p>";
    } finally {
        // 8. Esconde o carregamento (libera a tela)
        if (typeof hideLoading === 'function') hideLoading();
    }
};

window.viewLatest = async () => {
    showLoading();
    const area = document.getElementById('content-area');
    const header = document.getElementById('topic-header');
    const cards = document.getElementById('cards-container');
    const tabsContainer = document.getElementById('sub-tabs');
    
    tabsContainer.classList.add('hidden');
    cards.innerHTML = '';
    header.innerHTML = "<h1>Últimas Atualizações</h1>";
    area.innerHTML = '';

    const collectionsList = ['docs', 'legislacoes', 'construcoes', 'acoes', 'midia'];
    const promises = collectionsList.map(col => 
        getDocs(query(collection(db, col), orderBy("createdAt", "desc"), limit(50)))
    );

    const snapshots = await Promise.all(promises);
    let combined = [];
    snapshots.forEach((snap, index) => {
        snap.forEach(d => {
            combined.push({ id: d.id, ...d.data(), type: collectionsList[index] });
        });
    });

    // --- FILTRO: Remove itens sem conteúdo ---
    combined = combined.filter(item => {
        if (item.type === 'docs') {
            // Remove se não tiver textoHtml ou se for apenas espaços/tags vazias
            return item.textoHtml && item.textoHtml.replace(/<[^>]*>?/gm, '').trim() !== '';
        } else {
            // Para as outras coleções, remove se não tiver nome
            return item.nome && item.nome.trim() !== '';
        }
    });
    
    combined.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
    
    const toDisplay = combined.slice(0, 50);

    toDisplay.forEach(item => {
        const isDone = item.status === 'done';
        const labelMap = { 'docs': 'MANUAL', 'legislacoes': 'LEIS', 'construcoes': 'OBRAS', 'acoes': 'AÇÕES', 'midia': 'MÍDIA' };
        const dataFormatada = formatarData(item.createdAt);
        
        area.innerHTML += `
            <div class="post-block ${isDone ? 'done-card' : ''}">
                <div class="card-check ${isDone ? 'checked' : ''}" onclick="openCheckModal('${item.type}', '${item.id}', ${isDone})">
                    ${isDone ? '✅' : '⬜'}
                </div>
                <div style="margin-bottom:12px;">
                    <span class="tag">${labelMap[item.type]}</span>
                </div>
                ${item.type === 'docs' ? item.textoHtml : `<h3>${item.nome}</h3><p>${item.descricao}</p>`}
                <span class="date-footer">Criado: ${dataFormatada}</span>
            </div>`;
    });

    hideLoading();
};



    window.viewCollection = async (col, title, loadMore = false) => {

    // Remove o botão anterior se existir
    const existingBtn = document.getElementById('btn-more');
    if (existingBtn) existingBtn.remove();

    let q;
    if (lastVisibleDoc) {
        q = query(collection(db, col), orderBy("nome", "asc"), startAfter(lastVisibleDoc), limit(50));
    } else {
        q = query(collection(db, col), orderBy("nome", "asc"), limit(50));
    }

const snap = await getDocs(q);
    lastVisibleDoc = snap.docs[snap.docs.length - 1];

    snap.forEach(d => {

// Função unificada para Gravar ou Limpar o "Feito"
window.processarCheck = async (userName) => {
    try {
        const { col, docId } = currentTaskRef;
        const docRef = doc(db, col, docId); 
        
        const novosDados = userName 
            ? { concluidoPor: userName, status: 'done' } 
            : { concluidoPor: "", status: "" };

        await updateDoc(docRef, novosDados);

        // Atualiza localmente
        const atualizarListaLocal = (lista) => {
            const item = lista.find(d => d.id === docId);
            if (item) {
                item.status = novosDados.status;
                item.concluidoPor = novosDados.concluidoPor;
            }
        };

        [allDocs, currentTopicData.posts, currentTopicData.legislacoes, 
         currentTopicData.construcoes, currentTopicData.acoes, currentTopicData.midia]
        .forEach(atualizarListaLocal);

        document.getElementById('user-modal').style.display = 'none';
        refreshView(col); // Atualiza a tela

    } catch (e) {
        console.error(e);
        alert("Erro ao processar.");
    }
};

// Função auxiliar para re-renderizar a tela atual
window.refreshView = (col) => {
    const header = document.getElementById('topic-header').innerText;
    if (header.includes("Últimas")) {
        viewLatest();
    } else if (document.getElementById('sub-tabs').classList.contains('hidden') && header !== "Manual do Jogo") {
        viewCollection(col, header);
    } else {
        const abaAtiva = document.querySelector('.tab-item.active');
        const tabId = abaAtiva ? abaAtiva.innerText.split(' ')[0].toLowerCase() : 'tudo';
        const mapTabs = { 'leis': 'legislacoes', 'obras': 'construcoes', 'ações': 'acoes', 'mídia': 'midia', 'tudo': 'tudo' };
        renderTabContent(mapTabs[tabId] || tabId);
    }
};

window.confirmCheck = async (userName) => {
    try {
        const { col, docId } = currentTaskRef;
        const docRef = doc(db, col, docId); 
        
        // 1. Grava no Firebase
        await updateDoc(docRef, { 
            concluidoPor: userName,
            status: 'done'
        });
        
        // 2. Atualiza os dados localmente (para refletir a mudança sem refresh)
        const atualizarListaLocal = (lista) => {
            const item = lista.find(d => d.id === docId);
            if (item) {
                item.status = 'done';
                item.concluidoPor = userName;
            }
        };

        atualizarListaLocal(allDocs);
        atualizarListaLocal(currentTopicData.posts);
        atualizarListaLocal(currentTopicData.legislacoes);
        atualizarListaLocal(currentTopicData.construcoes);
        atualizarListaLocal(currentTopicData.acoes);
        atualizarListaLocal(currentTopicData.midia);

        // 3. Fecha o Modal

const formatarData = (ts) => {
    if (!ts) return "Data não disponível";
    
    try {
        let date;
        // Se for o objeto Timestamp do Firestore (tem o método toDate)
        if (ts && typeof ts.toDate === 'function') {
            date = ts.toDate();
        } 
        // Se for um objeto com seconds (às vezes o Firebase retorna assim em cache)
        else if (ts && ts.seconds) {
            date = new Date(ts.seconds * 1000);
        }
        // Se já for uma instância de Date ou string/number
        else {
            date = new Date(ts);
        }

        // Verifica se a data é válida antes de formatar
        if (isNaN(date.getTime())) return "Data não disponível";

        return date.toLocaleDateString('pt-BR', { 
            day: '2-digit', 
            month: '2-digit', 
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    } catch (e) {
        console.error("Erro ao formatar data:", e, ts);
        return "Data não disponível";
    }
};
