<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual do Jogo</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --white: #ffffff; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: var(--bg); }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; order: 1; }
        .sidebar { width: 280px; background: var(--white); border-left: 1px solid var(--border); padding: 20px; order: 2; overflow-y: auto; }
        .tree-parent { padding: 10px; cursor: pointer; font-weight: bold; border-radius: 6px; }
        .tree-parent:hover { background: #f1f5f9; }
        .tree-children { margin-left: 20px; display: none; }
        .tree-children.show { display: block; }
        .tree-child { padding: 5px 10px; cursor: pointer; color: #64748b; }
        .tree-child:hover { color: var(--primary); }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 30px; }
        .nav-card { background: white; border: 1px solid var(--border); padding: 15px; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; }
        .nav-card:hover { border-color: var(--primary); color: var(--primary); }
        .post-block { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
        .tag { background: #e0e7ff; color: #4338ca; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; margin-right: 5px; }
    </style>
</head>
<body>
    <main class="main-content">
        <div id="cards-container" class="cards-grid"></div>
        <div id="content-area">
            <h1>Manual do Jogo</h1>
            <p>Selecione um tópico na lateral.</p>
        </div>
    </main>

    <aside class="sidebar">
        <a href="gestor.html" style="font-size: 0.7rem; color: #ccc; text-decoration: none;">⚙ Admin</a>
        <h3>Menu</h3>
        <div id="tree-menu">Carregando...</div>
    </aside>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDPLJ4Ln3Ton-DxsJ0tEKeioWHnV01Plo0",
            authDomain: "politicalgame-30215.firebaseapp.com",
            projectId: "politicalgame-30215",
            storageBucket: "politicalgame-30215.firebasestorage.app",
            messagingSenderId: "736655823319",
            appId: "1:736655823319:web:60ebdc530e101784b9bb92"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allDocs = [];

        async function init() {
            const snap = await getDocs(query(collection(db, "docs"), orderBy("createdAt", "asc")));
            allDocs = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderSidebar();
        }

        function renderSidebar() {
            const menu = document.getElementById('tree-menu');
            menu.innerHTML = '';
            const pais = allDocs.filter(d => d.categoria === 'pai');
            const uniquePais = [...new Set(pais.map(p => p.nome))];

            uniquePais.forEach(pName => {
                const firstDoc = allDocs.find(d => d.nome === pName);
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="tree-parent" onclick="toggleAndSelect('${firstDoc.id}', '${pName}')">${pName}</div>
                    <div class="tree-children" id="child-of-${firstDoc.id}">
                        ${allDocs.filter(d => d.categoria === 'filho' && d.categoriaPai === pName)
                            .map(f => `<div class="tree-child" onclick="selectItem('${f.nome}')">${f.nome}</div>`).join('')}
                    </div>
                `;
                menu.appendChild(div);
            });
        }

        window.toggleAndSelect = (id, nome) => {
            document.querySelectorAll('.tree-children').forEach(e => e.classList.remove('show'));
            document.getElementById(`child-of-${id}`).classList.add('show');
            selectItem(nome);
        };

        window.selectItem = (nome) => {
            const posts = allDocs.filter(d => d.nome === nome);
            const content = document.getElementById('content-area');
            const cards = document.getElementById('cards-container');
            cards.innerHTML = '';

            // Lógica de Cards (Netos/Bisnetos)
            const ref = posts[0];
            let subItems = [];
            if(ref.categoria === 'filho') subItems = allDocs.filter(d => d.categoria === 'neto' && d.categoriaFilho === nome);
            if(ref.categoria === 'neto') subItems = allDocs.filter(d => d.categoria === 'bisneto' && d.categoriaNeto === nome);
            
            const uniqueSub = [...new Set(subItems.map(s => s.nome))];
            uniqueSub.forEach(sName => {
                const c = document.createElement('div');
                c.className = 'nav-card';
                c.innerText = sName;
                c.onclick = () => selectItem(sName);
                cards.appendChild(c);
            });

            // Conteúdo (Postagens)
            let html = `<h1>${nome}</h1>`;
            if(ref.tags) html += `<div>${ref.tags.split(',').map(t => `<span class="tag">${t}</span>`).join('')}</div><br>`;
            posts.forEach(p => html += `<div class="post-block">${p.textoHtml}</div>`);
            content.innerHTML = html;
        };

        init();
    </script>
</body>
</html>
