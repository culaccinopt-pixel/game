<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Edit - Gestor Master</title>
    <style>
        :root { 
            --primary: #1e293b; --accent: #6366f1; --bg: #0f172a; 
            --white: #f8fafc; --border: #334155; --card-bg: #1e293b;
            --danger: #ef4444; --success: #16a34a; --warning: #f59e0b;
        }
        
        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--white); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        header { 
            background: var(--primary); 
            padding: 10px 15px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            flex-shrink: 0;
        }
        .nav-btns { display: flex; gap: 8px; }
        
        .world-container { 
            display: flex; 
            flex: 1; 
            overflow: hidden; 
            position: relative;
        }

        .column { 
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: none; 
            flex-direction: column; 
            padding: 15px;
            background: var(--bg);
            z-index: 1;
            overflow-y: auto; /* Permite scroll em cada coluna */
        }

        /* Desktop: 3 colunas fixas */
        @media (min-width: 1025px) {
            .column { 
                position: relative; 
                display: flex !important; 
                border-right: 1px solid var(--border);
            }
            .col-temas { width: 280px; background: #1e293b; }
            .col-pages { width: 320px; background: #1a2235; }
            .col-content { flex: 1; }
            .btn-mobile-back { display: none !important; }
        }

        @media (max-width: 1024px) {
            .column.active { display: flex; z-index: 10; }
        }

        /* UI Elements */
        .btn { border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; padding: 10px 12px; text-decoration: none; font-size: 0.85rem; display: inline-flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-accent { background: var(--accent); }
        .btn-gray { background: #334155; }
.btn-add { 
    background: #8b5cf6; /* Roxo vibrante */
    width: 100%; 
    margin-bottom: 15px; 
    padding: 12px; 
    flex-shrink: 0;
    transition: background 0.3s ease;
}

/* Efeito de hover para o roxo */
.btn-add:hover {
    background: #7c3aed; /* Roxo um pouco mais escuro ao passar o mouse */
}

        .btn-mobile-back { background: transparent; border: 1px solid var(--border); width: fit-content; margin-bottom: 15px; }

        .list-item { 
            background: #1e293b; padding: 12px; border-radius: 10px; margin-bottom: 8px; 
            border: 1px solid var(--border); cursor: pointer; 
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
        }
        .list-item:hover { border-color: var(--accent); }
        .list-item.active { border-color: var(--accent); background: #334155; }
        
        .item-name { flex: 1; font-size: 0.95rem; }
        .btn-edit-small { 
            background: rgba(255,255,255,0.05); border: none; color: var(--accent); 
            padding: 6px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
        }
        .btn-edit-small:hover { background: var(--accent); color: white; }

        /* Post Content Area */
        #lista-posts { 
            padding-bottom: 150px; /* Gap no final para ver bem o último post */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .post-card { background: #1e293b; border: 1px solid var(--border); padding: 15px; border-radius: 10px; }

        /* Editor */
        .toolbar { background: #1e293b; padding: 8px; border-radius: 8px 8px 0 0; border: 1px solid var(--border); display: flex; gap: 4px; flex-wrap: wrap; }
        .toolbar button { background: #0f172a; border: 1px solid var(--border); color: white; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
        #post-editor { min-height: 150px; background: #0f172a; border: 1px solid var(--border); border-top: none; padding: 15px; border-radius: 0 0 8px 8px; outline: none; color: white; }

        /* Modal */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid var(--accent); }
        input { width: 100%; background: #0f172a; border: 1px solid var(--border); color: white; padding: 12px; margin: 10px 0; border-radius: 8px; }
  /* Classe para itens concluídos */
.list-item.done {
    background-color: #16a34a !important; /* Verde var(--success) */
    border-color: #22c55e;
}
/* Cor de fundo para posts concluídos */
.post-card.done {
    background: #16a34a !important; /* Verde */
    border-color: #22c55e;
}

/* Ajuste opcional para o texto dentro de posts verdes (para melhor contraste) */
.post-card.done * {
    color: white !important;
}

  </style>
</head>
<body>

    <header>
        <div class="nav-btns">
            <a href="index.html" class="btn btn-gray">🏠</a>
            <a href="gestor.html" class="btn btn-gray">Gestor</a>
        </div>
        <span style="font-weight: bold; color: var(--accent); font-size: 0.9rem;">WORLD EDIT</span>
    </header>

    <div class="world-container">
        <!-- Coluna 1: Temas -->
        <div class="column col-temas active" id="view-temas">
            <h3 style="margin-top:0">Temas</h3>
            <button class="btn btn-add" onclick="openModal('tema')">+ Novo Tema</button>
            <div id="lista-temas"></div>
        </div>

        <!-- Coluna 2: Páginas -->
        <div class="column col-pages" id="view-pages">
            <button class="btn btn-mobile-back" onclick="changeView('temas')">← Temas</button>
            <div id="pages-header" style="margin-bottom:10px"></div>
            <button class="btn btn-add" onclick="openModal('page')">+ Nova Página</button>
            <div id="lista-paginas"></div>
        </div>

        <!-- Coluna 3: Conteúdo -->
        <div class="column col-content" id="view-content">
            <button class="btn btn-mobile-back" onclick="changeView('pages')">← Páginas</button>
            <div id="content-header" style="margin-bottom: 15px;"></div>
            
            <div id="editor-area" style="display: none; margin-bottom: 25px;">
                <div class="toolbar">
                    <button onclick="format('bold')">B</button>
                    <button onclick="format('italic')">I</button>
                    <button onclick="execCommand('formatBlock', 'h3')">T</button>
                </div>
                <div id="post-editor" contenteditable="true"></div>
                <div style="margin-top:10px; display: flex; gap: 8px;">
                    <button class="btn btn-accent" style="flex:1" onclick="savePost()">Salvar</button>
                    <button class="btn btn-gray" onclick="toggleEditor(false)">X</button>
                </div>
            </div>

            <button id="btn-show-editor" class="btn btn-add" onclick="toggleEditor(true)">+ Novo Post</button>
            <div id="lista-posts"></div>
        </div>
    </div>

    <!-- Modal para Criar/Editar -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-top:0">Adicionar</h3>
            <input type="text" id="modal-input" placeholder="Digite o nome...">
            <div style="display:flex; gap:10px">
                <button class="btn btn-accent" style="flex:1" onclick="handleModalSave()">Gravar</button>
                <button class="btn btn-gray" style="flex:1" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, serverTimestamp, doc, getDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPLJ4Ln3Ton-DxsJ0tEKeioWHnV01Plo0",
        authDomain: "politicalgame-30215.firebaseapp.com",
        projectId: "politicalgame-30215",
        storageBucket: "politicalgame-30215.firebasestorage.app",
        messagingSenderId: "736655823319",
        appId: "1:736655823319:web:60ebdc530e101784b9bb92"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUserId = null; // ARMAZENA O ID DO USER
    let modalType = ''; 
    let editingId = null;
    let currentTemaId = null;
    let currentPageId = null;
    let editingPostId = null; // NOVO: Para saber se estamos a editar um post

    // --- BLOCO DE SEGURANÇA ---
 onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "login.html";
        } else {
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists() && userSnap.data().status === true) {
                currentUserId = user.uid;
                await loadTemas(); // Espera os temas carregarem
                checkDeepLink();   // Verifica se há uma página na URL para abrir
            } else {
                alert("Acesso negado.");
                await signOut(auth);
                window.location.href = "login.html";
            }
        }
    });

    window.changeView = (view) => {
        if(window.innerWidth > 1024) return;
        document.querySelectorAll('.column').forEach(c => c.classList.remove('active'));
        document.getElementById(`view-${view}`).classList.add('active');
    };

   

    window.selectTema = (id, nome) => {
        currentTemaId = id;
        document.querySelectorAll('.col-temas .list-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`tema-${id}`).classList.add('active');
        document.getElementById('pages-header').innerHTML = `<h2 style="margin:0; font-size:1.1rem">${nome}</h2>`;
        loadPages();
        changeView('pages');
    };

 

    window.selectPage = (id, titulo) => {
        currentPageId = id;
        document.querySelectorAll('.col-pages .list-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`page-${id}`).classList.add('active');
        document.getElementById('content-header').innerHTML = `<h2 style="margin:0; font-size:1.1rem">${titulo}</h2>`;
        loadPosts();
        changeView('content');
        document.getElementById('view-content').scrollTo(0,0);
    };

    // --- FUNÇÃO PARA MARCAR COMO FEITO (GENÉRICA) ---
window.toggleFeito = async (colecao, id, statusAtual) => {
    try {
        const novoStatus = statusAtual === 'yes' ? 'no' : 'yes';
        const docRef = doc(db, colecao, id);
        await updateDoc(docRef, { feito: novoStatus });
        
        // Recarrega a lista apropriada
        if (colecao === 'temas') loadTemas();
        else loadPages();
    } catch (e) {
        console.error("Erro ao atualizar status:", e);
    }
};

// --- ATUALIZAÇÃO DA CARGA DE TEMAS ---
async function loadTemas() {
    const q = query(collection(db, "temas"), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    const container = document.getElementById('lista-temas');
    container.innerHTML = '';
    snap.forEach(d => {
        const tema = d.data();
        const isDone = tema.feito === 'yes';
        const div = document.createElement('div');
        div.className = `list-item ${isDone ? 'done' : ''}`;
        div.id = `tema-${d.id}`;
        div.innerHTML = `
            <span class="item-name" onclick="selectTema('${d.id}', '${tema.nome}')">${tema.nome}</span>
            <div style="display:flex; gap:5px">
                <button class="btn-edit-small" onclick="toggleFeito('temas', '${d.id}', '${tema.feito}')">
                    ${isDone ? '✅' : '✔️'}
                </button>
                <button class="btn-edit-small" onclick="openModal('tema', '${d.id}', '${tema.nome}')">✏️</button>
            </div>
        `;
        container.appendChild(div);
    });
}


// --- FUNÇÃO PARA ABRIR PÁGINA VIA URL ---
    async function checkDeepLink() {
        const urlParams = new URLSearchParams(window.location.search);
        const targetPageId = urlParams.get('pageId');

        if (targetPageId) {
            try {
                // 1. Busca os dados da página referenciada
                const pageRef = doc(db, "world_pages", targetPageId);
                const pageSnap = await getDoc(pageRef);

                if (pageSnap.exists()) {
                    const pageData = pageSnap.data();
                    
                    // 2. Busca os dados do tema dessa página
                    const temaRef = doc(db, "temas", pageData.temaId);
                    const temaSnap = await getDoc(temaRef);

                    if (temaSnap.exists()) {
                        // 3. Executa as seleções visualmente
                        window.selectTema(pageData.temaId, temaSnap.data().nome);
                        window.selectPage(targetPageId, pageData.titulo);
                        
                        console.log("Página aberta via link direto:", pageData.titulo);
                    }
                }
            } catch (e) {
                console.error("Erro ao carregar link direto:", e);
            }
        }
    }
    
// --- ATUALIZAÇÃO DA CARGA DE PÁGINAS ---
async function loadPages() {
    if(!currentTemaId) return;
    
    // A consulta precisa de um índice: temaId (ASC) + createdAt (DESC)
    const q = query(
        collection(db, "world_pages"), 
        where("temaId", "==", currentTemaId), 
        orderBy("createdAt", "desc") 
    );
    
    try {
        const snap = await getDocs(q);
        const container = document.getElementById('lista-paginas');
        container.innerHTML = '';
        
        snap.forEach(d => {
            const page = d.data();
            const isDone = page.feito === 'yes';
            const div = document.createElement('div');
            div.className = `list-item ${isDone ? 'done' : ''}`;
            div.id = `page-${d.id}`;
            div.innerHTML = `
                <span class="item-name" onclick="selectPage('${d.id}', '${page.titulo}')">${page.titulo}</span>
                <div style="display:flex; gap:5px">
                    <button class="btn-edit-small" onclick="toggleFeito('world_pages', '${d.id}', '${page.feito}')">
                        ${isDone ? '✅' : '✔️'}
                    </button>
                    <button class="btn-edit-small" onclick="openModal('page', '${d.id}', '${page.titulo}')">✏️</button>
                </div>
            `;
            container.appendChild(div);
        });
    } catch (error) {
        console.error("Erro ao carregar páginas: ", error);
        // Se cair aqui, o link para criar o índice aparecerá no console do navegador
    }
}

    // --- POSTS ---
async function loadPosts() {
    if(!currentPageId) return;
    const q = query(collection(db, "world_posts"), where("pageId", "==", currentPageId), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    const container = document.getElementById('lista-posts');
    container.innerHTML = '';
    
    snap.forEach(d => {
        const post = d.data();
        const card = document.createElement('div');
        
        // Verifica se está marcado como feito
        const isDone = post.feito === true;
        card.className = `post-card ${isDone ? 'done' : ''}`;
        
        const isAuthor = post.userId === currentUserId;

        let botoesAcao = '';
        if (isAuthor) {
            botoesAcao = `
                <div style="margin-top:10px; text-align:right">
                    <!-- Botão Feito -->
                    <button style="background:none; border:none; color:${isDone ? '#fff' : 'var(--accent)'}; font-size:12px; cursor:pointer; margin-right:10px; font-weight:bold" 
                            onclick="togglePostFeito('${d.id}', ${isDone})">
                        ${isDone ? '✅ Concluído' : '✔️ Marcar Feito'}
                    </button>
                    
                    <button style="background:none; border:none; color:${isDone ? '#fff' : 'var(--accent)'}; font-size:12px; cursor:pointer; margin-right:10px" 
                            onclick="editPost('${d.id}')">Editar</button>
                    
                    <button style="background:none; border:none; color:${isDone ? '#ffcccc' : 'var(--danger)'}; font-size:12px; cursor:pointer" 
                            onclick="deletePost('${d.id}')">Excluir</button>
                </div>
            `;
        }

        card.innerHTML = `
            <div style="font-size:0.95rem">${post.contentHtml}</div>
            ${botoesAcao}
        `;
        container.appendChild(card);
    });
}

    // Função para carregar o post no editor
    window.editPost = async (id) => {
        const snap = await getDoc(doc(db, "world_posts", id));
        if (snap.exists()) {
            // Segurança extra: verificar se é mesmo o autor antes de abrir o editor
            if (snap.data().userId !== currentUserId) {
                alert("Não tens permissão para editar este post.");
                return;
            }
            
            editingPostId = id;
            document.getElementById('post-editor').innerHTML = snap.data().contentHtml;
            toggleEditor(true);
            document.getElementById('view-content').scrollTo({ top: 0, behavior: 'smooth' });
        }
    };

    window.savePost = async () => {
        const html = document.getElementById('post-editor').innerHTML;
        if(!html || html === '<br>') return;

        try {
            if (editingPostId) {
                // Ao editar, mantemos o userId original e adicionamos updatedBy
                await updateDoc(doc(db, "world_posts", editingPostId), { 
                    contentHtml: html, 
                    updatedBy: currentUserId,
                    updatedAt: serverTimestamp() 
                });
            } else {
                // Ao criar novo
                await addDoc(collection(db, "world_posts"), { 
                    pageId: currentPageId, 
                    contentHtml: html, 
                    userId: currentUserId, // Registo do autor
                    createdAt: serverTimestamp() 
                });
            }

            document.getElementById('post-editor').innerHTML = '';
            editingPostId = null;
            toggleEditor(false);
            loadPosts();
        } catch (e) {
            console.error(e);
            alert("Erro ao salvar post.");
        }
    };

    window.togglePostFeito = async (id, statusAtual) => {
    try {
        const novoStatus = !statusAtual; // Inverte entre true e false
        await updateDoc(doc(db, "world_posts", id), { 
            feito: novoStatus 
        });
        loadPosts(); // Recarrega a lista
    } catch (e) {
        console.error("Erro ao atualizar post:", e);
    }
};

    window.deletePost = async (id) => {
        // Busca o documento para validar o autor antes de apagar (segurança)
        const snap = await getDoc(doc(db, "world_posts", id));
        if (snap.exists() && snap.data().userId === currentUserId) {
            if(confirm("Desejas excluir permanentemente este post?")) {
                await deleteDoc(doc(db, "world_posts", id));
                loadPosts();
            }
        } else {
            alert("Ação não permitida.");
        }
    };

    // --- MODAL LOGIC (CRIAR E EDITAR TEMAS/PÁGINAS) ---
    window.openModal = (type, id = null, currentVal = '') => {
        modalType = type;
        editingId = id;
        const input = document.getElementById('modal-input');
        const title = document.getElementById('modal-title');
        
        if(id) {
            title.innerText = type === 'tema' ? 'Editar Tema' : 'Editar Página';
            input.value = currentVal;
        } else {
            title.innerText = type === 'tema' ? 'Novo Tema' : 'Nova Página';
            input.value = '';
        }
        
        document.getElementById('modal').classList.add('active');
        input.focus();
    };

    window.handleModalSave = async () => {
        const val = document.getElementById('modal-input').value;
        if(!val) return;

        try {
            if(editingId) {
                // EDITAR
                const docRef = doc(db, modalType === 'tema' ? "temas" : "world_pages", editingId);
                await updateDoc(docRef, {
                    ...(modalType === 'tema' ? { nome: val } : { titulo: val }),
                    updatedBy: currentUserId // GRAVA QUEM EDITOU
                });
            } else {
                // CRIAR
                if(modalType === 'tema') {
                    await addDoc(collection(db, "temas"), { 
                        nome: val, 
                        userId: currentUserId, // GRAVA QUEM CRIOU
                        createdAt: serverTimestamp() 
                    });
                } else {
                    await addDoc(collection(db, "world_pages"), { 
                        temaId: currentTemaId, 
                        titulo: val, 
                        userId: currentUserId, // GRAVA QUEM CRIOU
                        createdAt: serverTimestamp() 
                    });
                }
            }
            
            modalType === 'tema' ? loadTemas() : loadPages();
            closeModal();
        } catch (e) {
            console.error(e);
            alert("Erro ao gravar.");
        }
    };

    window.closeModal = () => {
        document.getElementById('modal').classList.remove('active');
        editingId = null;
    };

    // --- OUTROS ---
    window.toggleEditor = (show) => {
        if (!show) {
            editingPostId = null;
            document.getElementById('post-editor').innerHTML = '';
        }
        document.getElementById('editor-area').style.display = show ? 'block' : 'none';
        document.getElementById('btn-show-editor').style.display = show ? 'none' : 'inline-flex';
    };
    
    window.format = (cmd) => document.execCommand(cmd, false, null);
    window.execCommand = (cmd, val) => document.execCommand(cmd, false, val);

// Impede a formatação ao colar no editor
const editor = document.getElementById('post-editor');

editor.addEventListener('paste', (e) => {
    // Cancela o comportamento padrão de colar (que traz o HTML)
    e.preventDefault();

    // Pega apenas o texto puro da área de transferência
    const text = (e.originalEvent || e).clipboardData.getData('text/plain');

    // Insere o texto puro no local onde o cursor está
    document.execCommand('insertText', false, text);
});

</script>

</body>
</html>
