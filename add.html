<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Firebase Moderno</title>
    
    <!-- Estilização CSS -->
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --border: #d1d5db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 700px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.5rem;
            text-align: center;
            color: var(--primary);
        }

        /* Layout Grid para economizar espaço vertical */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .full-width {
            grid-column: span 2;
        }

        .field-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #4b5563;
        }

        input, select, .editor-container {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1);
        }

        /* Campos Condicionais */
        .hidden {
            display: none;
        }

        /* Toolbar do Editor de Texto */
        .editor-toolbar {
            display: flex;
            gap: 5px;
            background: #f9fafb;
            border: 1px solid var(--border);
            border-bottom: none;
            padding: 5px;
            border-radius: 6px 6px 0 0;
        }

        .editor-toolbar button {
            background: white;
            border: 1px solid #d1d5db;
            padding: 2px 8px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .editor-toolbar button:hover {
            background: #e5e7eb;
        }

        #editor {
            min-height: 100px;
            border: 1px solid var(--border);
            border-radius: 0 0 6px 6px;
            padding: 10px;
            overflow-y: auto;
        }

        .btn-submit {
            background-color: var(--primary);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .btn-submit:disabled {
            background-color: #9ca3af;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Cadastrar Documento</h2>
    
    <form id="meuFormulario">
        <div class="form-grid">
            <!-- Nome -->
            <div class="field-group">
                <label>Nome</label>
                <input type="text" id="nome" required placeholder="Ex: João Silva">
            </div>

            <!-- Categoria Principal -->
            <div class="field-group">
                <label>Categoria</label>
                <select id="categoria" required>
                    <option value="pai">Pai</option>
                    <option value="filho">Filho</option>
                    <option value="neto">Neto</option>
                    <option value="bisneto">Bisneto</option>
                </select>
            </div>

            <!-- Campo Condicional: Categoria Pai -->
            <div class="field-group hidden" id="group-pai">
                <label>Categoria Pai</label>
                <input type="text" id="catPai" placeholder="Nome do pai">
            </div>

            <!-- Campo Condicional: Categoria Filho -->
            <div class="field-group hidden" id="group-filho">
                <label>Categoria Filho</label>
                <input type="text" id="catFilho" placeholder="Nome do filho">
            </div>

            <!-- Campo Condicional: Categoria Neto -->
            <div class="field-group hidden" id="group-neto">
                <label>Categoria Neto</label>
                <input type="text" id="catNeto" placeholder="Nome do neto">
            </div>

            <!-- Ordem -->
            <div class="field-group">
                <label>Ordem</label>
                <input type="text" id="ordem" placeholder="Ex: 001">
            </div>

            <!-- Tags -->
            <div class="field-group full-width">
                <label>Tags (Opcional)</label>
                <input type="text" id="tags" placeholder="tag1, tag2, tag3">
            </div>

            <!-- Editor de Texto -->
            <div class="field-group full-width">
                <label>Texto (Conteúdo)</label>
                <div class="editor-toolbar">
                    <button type="button" onclick="formatDoc('bold')">B</button>
                    <button type="button" onclick="formatDoc('italic')">I</button>
                    <button type="button" onclick="formatDoc('formatBlock', 'h2')">H2</button>
                    <button type="button" onclick="formatDoc('formatBlock', 'h3')">H3</button>
                    <button type="button" onclick="formatDoc('formatBlock', 'p')">P</button>
                </div>
                <div id="editor" contenteditable="true"></div>
            </div>
        </div>

        <button type="submit" class="btn-submit" id="btnGravar">Gravar no Firebase</button>
    </form>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Configuração do Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDPLJ4Ln3Ton-DxsJ0tEKeioWHnV01Plo0",
        authDomain: "politicalgame-30215.firebaseapp.com",
        projectId: "politicalgame-30215",
        storageBucket: "politicalgame-30215.firebasestorage.app",
        messagingSenderId: "736655823319",
        appId: "1:736655823319:web:60ebdc530e101784b9bb92"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Seletores
    const form = document.getElementById('meuFormulario');
    const categoriaSelect = document.getElementById('categoria');
    const groupPai = document.getElementById('group-pai');
    const groupFilho = document.getElementById('group-filho');
    const groupNeto = document.getElementById('group-neto');

    // Lógica para mostrar/esconder campos baseada na hierarquia
    categoriaSelect.addEventListener('change', (e) => {
        const val = e.target.value;
        
        // Reset
        groupPai.classList.add('hidden');
        groupFilho.classList.add('hidden');
        groupNeto.classList.add('hidden');

        if (val === 'filho') {
            groupPai.classList.remove('hidden');
        } else if (val === 'neto') {
            groupPai.classList.remove('hidden');
            groupFilho.classList.remove('hidden');
        } else if (val === 'bisneto') {
            groupPai.classList.remove('hidden');
            groupFilho.classList.remove('hidden');
            groupNeto.classList.remove('hidden');
        }
    });

    // Função para Formatação de Texto (Inline)
    window.formatDoc = (cmd, value = null) => {
        if (value) {
            document.execCommand(cmd, false, value);
        } else {
            document.execCommand(cmd, false, null);
        }
    };

    // Submissão do Formulário
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnGravar');
        btn.disabled = true;
        btn.innerText = "Gravando...";

        const dados = {
            nome: document.getElementById('nome').value,
            categoria: categoriaSelect.value,
            categoriaPai: document.getElementById('catPai').value || null,
            categoriaFilho: document.getElementById('catFilho').value || null,
            categoriaNeto: document.getElementById('catNeto').value || null,
            ordem: document.getElementById('ordem').value,
            tags: document.getElementById('tags').value,
            textoHtml: document.getElementById('editor').innerHTML,
            createdAt: serverTimestamp()
        };

        try {
            const docRef = await addDoc(collection(db, "docs"), dados);
            alert("Documento gravado com sucesso! ID: " + docRef.id);
            form.reset();
            document.getElementById('editor').innerHTML = "";
            // Esconder campos novamente
            groupPai.classList.add('hidden');
            groupFilho.classList.add('hidden');
            groupNeto.classList.add('hidden');
        } catch (error) {
            console.error("Erro ao gravar:", error);
            alert("Erro ao gravar documento.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Gravar no Firebase";
        }
    });
</script>

</body>
</html>
