<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Tópico - Dark Mode</title>
    <style>
        :root { 
            --primary: #818cf8; 
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --text: #f8fafc; 
            --text-muted: #94a3b8;
            --border: #334155; 
            --input-bg: #0f172a;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 700px; border: 1px solid var(--border); }
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .btn-nav { text-decoration: none; background: var(--border); color: var(--text); padding: 8px 15px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; transition: 0.3s; }
        .btn-nav:hover { background: #475569; }
        h2 { margin: 0 0 20px 0; color: var(--primary); text-align: center; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full-width { grid-column: span 2; }
        .field-group { display: flex; flex-direction: column; }
        label { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; color: var(--text-muted); }
        input, select { padding: 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--input-bg); color: var(--text); outline: none; min-height: 38px; }
        input:focus, select:focus { border-color: var(--primary); }
        .hidden { display: none; }
        .toolbar { display: flex; gap: 5px; background: #334155; border: 1px solid var(--border); border-bottom: none; padding: 5px; border-radius: 6px 6px 0 0; }
        .toolbar button { cursor: pointer; border: 1px solid #475569; background: #1e293b; color: white; padding: 2px 10px; border-radius: 4px; font-weight: bold; }
        #editor { min-height: 120px; border: 1px solid var(--border); border-radius: 0 0 6px 6px; padding: 10px; background: var(--input-bg); overflow-y: auto; }
        .btn-submit { background: var(--primary); color: white; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.3s; }
        .btn-submit:hover { background: #6366f1; }
        .auto-info { font-size: 0.7rem; color: #22c55e; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <a href="index.html" class="btn-nav">← Ver Manual</a>
            <a href="gestor.html" class="btn-nav">Ir para Gestor →</a>
        </div>
        <h2>Novo Tópico</h2>
        <form id="meuFormulario">
            <div class="form-grid">
                <div class="field-group full-width">
                    <label>Nome do Novo Tópico</label>
                    <input type="text" id="nome" required placeholder="Ex: Movimentação">
                </div>

                <div class="field-group full-width">
                    <label>Nível da Categoria</label>
                    <select id="categoria" required>
                        <option value="pai">Pai (Raiz)</option>
                        <option value="filho">Filho</option>
                        <option value="neto">Neto</option>
                        <option value="bisneto">Bisneto</option>
                    </select>
                </div>

                <div class="field-group hidden" id="group-pai">
                    <label>Vincular ao Pai</label>
                    <select id="catPai"><option value="">Carregando...</option></select>
                </div>

                <div class="field-group hidden" id="group-filho">
                    <label>Vincular ao Filho</label>
                    <select id="catFilho"><option value="">Carregando...</option></select>
                </div>

                <div class="field-group hidden" id="group-neto">
                    <label>Vincular ao Neto</label>
                    <select id="catNeto"><option value="">Carregando...</option></select>
                </div>

                <div class="field-group">
                    <label>Ordem</label>
                    <input type="number" id="ordem" placeholder="Auto-preenchido">
                    <span id="ordem-info" class="auto-info">Sugerido automaticamente</span>
                </div>
                
                <div class="field-group"><label>Tags</label><input type="text" id="tags" placeholder="combate, naval"></div>

                <div class="field-group full-width">
                    <label>Conteúdo Inicial</label>
                    <div class="toolbar">
                        <button type="button" onclick="formatDoc('bold')">B</button>
                        <button type="button" onclick="formatDoc('italic')">I</button>
                        <button type="button" onclick="formatDoc('formatBlock', 'h2')">Título</button>
                    </div>
                    <div id="editor" contenteditable="true"></div>
                </div>
            </div>
            <button type="submit" class="btn-submit" id="btnGravar">Gravar no Firebase</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDPLJ4Ln3Ton-DxsJ0tEKeioWHnV01Plo0",
            authDomain: "politicalgame-30215.firebaseapp.com",
            projectId: "politicalgame-30215",
            storageBucket: "politicalgame-30215.firebasestorage.app",
            messagingSenderId: "736655823319",
            appId: "1:736655823319:web:60ebdc530e101784b9bb92"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let localData = [];
        const categoriaSelect = document.getElementById('categoria');
        const ordemInput = document.getElementById('ordem');
        const selects = {
            pai: document.getElementById('catPai'),
            filho: document.getElementById('catFilho'),
            neto: document.getElementById('catNeto')
        };

        async function loadExistingData() {
            const querySnapshot = await getDocs(collection(db, "docs"));
            localData = querySnapshot.docs.map(doc => doc.data());
            
            const populate = (id, categoriaFiltro) => {
                const dropdown = selects[id];
                const nomesUnicos = [...new Set(localData.filter(d => d.categoria === categoriaFiltro).map(d => d.nome))];
                dropdown.innerHTML = '<option value="">Selecione...</option>';
                nomesUnicos.sort().forEach(nome => {
                    const opt = document.createElement('option');
                    opt.value = nome; opt.innerText = nome; dropdown.appendChild(opt);
                });
            };

            populate('pai', 'pai');
            populate('filho', 'filho');
            populate('neto', 'neto');
            
            calculateOrdem(); // Calcula inicial
        }

        function calculateOrdem() {
            const level = categoriaSelect.value;
            let count = 0;

            if (level === 'pai') {
                // Conta quantos pais únicos existem
                const uniqueNames = [...new Set(localData.filter(d => d.categoria === 'pai').map(d => d.nome))];
                count = uniqueNames.length;
            } else if (level === 'filho') {
                const parentValue = selects.pai.value;
                if(parentValue) {
                    const uniqueNames = [...new Set(localData.filter(d => d.categoria === 'filho' && d.categoriaPai === parentValue).map(d => d.nome))];
                    count = uniqueNames.length;
                }
            } else if (level === 'neto') {
                const childValue = selects.filho.value;
                if(childValue) {
                    const uniqueNames = [...new Set(localData.filter(d => d.categoria === 'neto' && d.categoriaFilho === childValue).map(d => d.nome))];
                    count = uniqueNames.length;
                }
            } else if (level === 'bisneto') {
                const netoValue = selects.neto.value;
                if(netoValue) {
                    const uniqueNames = [...new Set(localData.filter(d => d.categoria === 'bisneto' && d.categoriaNeto === netoValue).map(d => d.nome))];
                    count = uniqueNames.length;
                }
            }

            ordemInput.value = count + 1;
        }

        // Event Listeners para recalculado automático
        categoriaSelect.addEventListener('change', (e) => {
            const v = e.target.value;
            document.getElementById('group-pai').classList.toggle('hidden', v === 'pai');
            document.getElementById('group-filho').classList.toggle('hidden', v === 'pai' || v === 'filho');
            document.getElementById('group-neto').classList.toggle('hidden', v !== 'bisneto');
            calculateOrdem();
        });

        selects.pai.addEventListener('change', calculateOrdem);
        selects.filho.addEventListener('change', calculateOrdem);
        selects.neto.addEventListener('change', calculateOrdem);

        window.formatDoc = (cmd, val = null) => document.execCommand(cmd, false, val);

        document.getElementById('meuFormulario').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGravar');
            btn.disabled = true;

            const dados = {
                nome: document.getElementById('nome').value,
                categoria: categoriaSelect.value,
                categoriaPai: selects.pai.value || null,
                categoriaFilho: selects.filho.value || null,
                categoriaNeto: selects.neto.value || null,
                ordem: parseInt(ordemInput.value),
                tags: document.getElementById('tags').value,
                textoHtml: document.getElementById('editor').innerHTML,
                createdAt: serverTimestamp()
            };

            try {
                await addDoc(collection(db, "docs"), dados);
                alert("Gravado com sucesso!");
                location.reload();
            } catch (err) { alert("Erro ao salvar!"); btn.disabled = false; }
        });

        loadExistingData();
    </script>
</body>
</html>
